<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__DASHBOARD_TITLE__</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg: #060b14;
  --bg1: #091120;
  --bg2: #0c1628;
  --panel: #0f1e33;
  --panel2: #152540;
  --panel3: #1a2d4a;
  --border: #1e3554;
  --border2: #234065;
  --border3: #2a4d78;
  --accent: #1a9fff;
  --accent2: #4db8ff;
  --accent3: #80d0ff;
  --green: #00d68f;
  --green2: #00ff9d;
  --yellow: #ffcc00;
  --yellow2: #ffe033;
  --red: #ff4040;
  --red2: #ff6666;
  --purple: #9d6fff;
  --orange: #ff8c33;
  --cyan: #00e5ff;
  --text: #cce4ff;
  --text2: #7fa8cc;
  --text3: #4a6e8a;
  --text4: #2d4a60;

  /* Entity type colors */
  --c-user: #4db8ff;
  --c-svc: #00d68f;
  --c-db: #ffcc00;
  --c-mw: #9d6fff;
  --c-api: #ff8c33;
  --c-compute: #7fa8cc;
  --c-alert: #ff4040;
  --c-domain: #00e5ff;

  /* Relation colors */
  --r-access: #4db8ff;
  --r-call: #00d68f;
  --r-lb: #9d6fff;
  --r-host: #7fa8cc;
  --r-monitor: #ff4040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ===== HEADER ===== */
.header {
  height: 48px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.header-divider { width: 1px; height: 20px; background: var(--border2); }
.header-subtitle { font-size: 12px; color: var(--text3); font-family: 'IBM Plex Mono'; }
.header-badges { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.badge {
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-family: 'IBM Plex Mono';
  letter-spacing: 0.02em;
}
.badge-blue { background: rgba(26,159,255,0.12); color: var(--accent2); border: 1px solid rgba(26,159,255,0.25); }
.badge-green { background: rgba(0,214,143,0.12); color: var(--green); border: 1px solid rgba(0,214,143,0.25); }
.badge-yellow { background: rgba(255,204,0,0.12); color: var(--yellow); border: 1px solid rgba(255,204,0,0.25); }
.badge-red { background: rgba(255,64,64,0.12); color: var(--red); border: 1px solid rgba(255,64,64,0.25); }
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
  50% { opacity: 0.5; box-shadow: 0 0 2px var(--green); }
}

/* ===== TOOLBAR ===== */
.toolbar {
  height: 46px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
  overflow-x: auto;
}
.toolbar::-webkit-scrollbar { height: 0; }
.tb-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.tb-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
.tb-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.tb-spacer { flex: 1; }

select, .search-input {
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  height: 28px;
}
select:focus, .search-input:focus { border-color: var(--accent); background: var(--panel2); }
select option { background: var(--panel2); color: var(--text); }

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 8px;
  color: var(--text3);
  font-size: 11px;
  pointer-events: none;
}
.search-input { padding-left: 24px; width: 160px; }

.btn {
  height: 28px;
  padding: 0 12px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-default { background: var(--panel); color: var(--text2); }
.btn-default:hover { background: var(--panel2); color: var(--text); border-color: var(--accent); }
.btn-primary { background: rgba(26,159,255,0.15); color: var(--accent2); border-color: rgba(26,159,255,0.35); }
.btn-primary:hover { background: rgba(26,159,255,0.25); }
.btn-danger { background: rgba(255,64,64,0.12); color: var(--red2); border-color: rgba(255,64,64,0.3); }
.btn-danger:hover { background: rgba(255,64,64,0.2); }
.btn-active { background: rgba(0,214,143,0.12); color: var(--green); border-color: rgba(0,214,143,0.3); }

/* ===== MAIN LAYOUT ===== */
.main { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ===== LEFT SIDEBAR ===== */
.sidebar {
  width: 250px;
  flex-shrink: 0;
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: 'IBM Plex Mono';
}
.sidebar-count {
  font-size: 11px;
  color: var(--text3);
  font-family: 'IBM Plex Mono';
}
.sidebar-body { flex: 1; overflow-y: auto; }

/* Entity type group */
.etype-group { border-bottom: 1px solid var(--border); }
.etype-header {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.etype-header:hover { background: var(--panel); }
.etype-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.etype-name { font-size: 12px; flex: 1; }
.etype-num { font-size: 10px; font-family: 'IBM Plex Mono'; color: var(--text3); }
.etype-arrow { font-size: 9px; color: var(--text4); transition: transform 0.18s; }
.etype-arrow.open { transform: rotate(90deg); }

.entity-list { display: none; padding: 2px 0; }
.entity-list.open { display: block; }

.entity-row {
  padding: 5px 12px 5px 28px;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 11px;
  color: var(--text2);
}
.entity-row:hover { background: rgba(26,159,255,0.06); color: var(--text); }
.entity-row.active { background: rgba(26,159,255,0.1); color: var(--accent2); }

.health-indicator {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.hi-ok { background: var(--green); box-shadow: 0 0 4px var(--green); }
.hi-warn { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
.hi-err { background: var(--red); box-shadow: 0 0 4px var(--red); }

.entity-row-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entity-row-proj { font-size: 9px; color: var(--text4); font-family: 'IBM Plex Mono'; flex-shrink: 0; }

/* ===== CANVAS AREA ===== */
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.canvas-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(circle 600px at 15% 30%, rgba(26,159,255,0.03) 0%, transparent 70%),
    radial-gradient(circle 400px at 85% 70%, rgba(157,111,255,0.025) 0%, transparent 70%);
  pointer-events: none;
}

/* Grid dots background */
.canvas-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(30,53,84,0.8) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  opacity: 0.4;
}

#graph-svg { width: 100%; height: 100%; display: block; }

/* Canvas controls */
.canvas-controls {
  position: absolute;
  bottom: 18px;
  right: 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 10;
}
.cc-btn {
  width: 30px; height: 30px;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 15px;
  font-weight: 600;
  transition: all 0.12s;
  user-select: none;
}
.cc-btn:hover { background: var(--panel2); color: var(--accent2); border-color: var(--accent); }

/* Minimap */
.minimap-wrap {
  position: absolute;
  bottom: 18px;
  left: 260px;
  width: 168px;
  height: 106px;
  background: rgba(9,17,32,0.9);
  border: 1px solid var(--border2);
  border-radius: 6px;
  overflow: hidden;
  z-index: 10;
  backdrop-filter: blur(4px);
}
.minimap-label {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 9px;
  font-family: 'IBM Plex Mono';
  color: var(--text4);
  pointer-events: none;
  z-index: 1;
}
#minimap-svg { width: 100%; height: 100%; }

/* Stats bar */
.stats-bar {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border2);
  z-index: 10;
}
.stat-item {
  padding: 5px 14px;
  background: var(--panel);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'IBM Plex Mono';
}
.stat-label { color: var(--text3); }
.stat-val { color: var(--text); font-weight: 500; }

/* ===== RIGHT DETAIL PANEL ===== */
.detail-panel {
  width: 0;
  flex-shrink: 0;
  background: var(--bg1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
}
.detail-panel.open { width: 280px; }
.detail-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.detail-title-bar { display: flex; align-items: center; gap: 7px; }
.detail-type-dot { width: 10px; height: 10px; border-radius: 2px; }
.detail-title-text { font-size: 13px; font-weight: 500; }
.detail-close { cursor: pointer; color: var(--text3); font-size: 14px; transition: color 0.12s; }
.detail-close:hover { color: var(--text); }
.detail-body { flex: 1; overflow-y: auto; padding: 0; }
.detail-section { border-bottom: 1px solid var(--border); }
.detail-section-title {
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  font-family: 'IBM Plex Mono';
  background: rgba(0,0,0,0.15);
}
.detail-row {
  display: flex;
  align-items: flex-start;
  padding: 5px 14px;
  gap: 8px;
  border-bottom: 1px solid rgba(30,53,84,0.5);
}
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 11px; color: var(--text3); min-width: 80px; flex-shrink: 0; padding-top: 1px; }
.detail-val { font-size: 11px; color: var(--text); font-family: 'IBM Plex Mono'; word-break: break-all; }
.detail-val.ok { color: var(--green); }
.detail-val.warn { color: var(--yellow); }
.detail-val.err { color: var(--red); }

/* ===== TOOLTIP ===== */
.tooltip-el {
  position: fixed;
  background: var(--panel2);
  border: 1px solid var(--border3);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 9999;
  max-width: 240px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(26,159,255,0.08);
  backdrop-filter: blur(8px);
}
.tooltip-el.visible { opacity: 1; }
.tt-name { font-weight: 600; color: var(--accent2); margin-bottom: 7px; font-size: 12px; }
.tt-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 3px; }
.tt-key { color: var(--text3); }
.tt-val { color: var(--text); font-family: 'IBM Plex Mono'; }

/* ===== LEGEND ===== */
.legend-wrap {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(9,17,32,0.88);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px 12px;
  z-index: 10;
  backdrop-filter: blur(6px);
}
.legend-title { font-size: 9px; font-family: 'IBM Plex Mono'; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
.legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.legend-swatch { width: 12px; height: 8px; border-radius: 2px; }
.legend-label { font-size: 11px; color: var(--text2); }
.legend-sep { height: 1px; background: var(--border); margin: 6px 0; }

/* ===== STATUS BAR ===== */
.statusbar {
  height: 24px;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 18px;
  flex-shrink: 0;
}
.sb-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'IBM Plex Mono'; color: var(--text3); }
.sb-val { color: var(--text2); }
.sb-spacer { flex: 1; }
.sb-time { color: var(--text4); }

/* ===== D3 NODE STYLES ===== */
.node-g { cursor: pointer; }
.node-shadow { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
.node-body {
  rx: 5;
  ry: 5;
  transition: filter 0.2s;
}
.node-g:hover .node-body { filter: brightness(1.25); }
.node-g.selected .node-body { filter: brightness(1.3) drop-shadow(0 0 10px currentColor); }
.node-g.dimmed { opacity: 0.18; }

.edge-path { fill: none; transition: stroke-opacity 0.2s, stroke-width 0.2s; }
.edge-path.dimmed { stroke-opacity: 0.03 !important; }
.edge-path.highlighted { stroke-opacity: 0.92 !important; stroke-width: 2px !important; }
.edge-path.edge-cross { stroke-opacity: 0.28; }
.edge-path.edge-thin { stroke-width: 1.1px; }
.edge-label { opacity: 0; transition: opacity 0.15s; }
.edge-label.edge-label-active { opacity: 0.9; }
/* ── AGGREGATE MODE ──────────────────────────────────── */
.agg-node-g { cursor: pointer; }
.agg-node-g:hover .agg-body { filter: brightness(1.3); }
.agg-mode-active #agg-toggle-btn { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Aggregate edge label pill */
.agg-edge-pill { pointer-events: none; opacity: 0; transition: opacity 0.15s; }
.agg-edge-pill.visible { opacity: 0.9; }

/* ── ENTITY LIST DRAWER (slides in from left over sidebar) ───────────── */
.entity-drawer {
  position: absolute;
  top: 0; left: 0;
  width: 260px; height: 100%;
  background: var(--panel);
  border-right: 1px solid var(--border3);
  z-index: 500;
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  box-shadow: 4px 0 20px rgba(0,0,0,0.4);
}
.entity-drawer.open { transform: translateX(0); }
.entity-drawer-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.entity-drawer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.entity-drawer-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.entity-drawer-count { font-size: 11px; color: var(--text3); }
.entity-drawer-close {
  width:22px; height:22px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text3); font-size:14px; border-radius:4px;
  transition: background 0.15s, color 0.15s;
}
.entity-drawer-close:hover { background:rgba(255,64,64,0.15); color:var(--red); }
.entity-drawer-body { flex:1; overflow-y:auto; padding:8px 0; }
.drawer-entity-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer;
  transition: background 0.12s;
  border-left: 3px solid transparent;
}
.drawer-entity-row:hover { background: rgba(26,159,255,0.08); }
.drawer-entity-row.active { background: rgba(26,159,255,0.12); border-left-color: var(--accent); }
.drawer-entity-row .der-name { font-size: 12px; color: var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.drawer-entity-row .der-proj { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; flex-shrink:0; }
.drawer-entity-row .der-health { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.der-health.ok { background: var(--green); }
.der-health.warn { background: var(--yellow); }
.der-health.err { background: var(--red); }
.drawer-rel-section { padding: 6px 14px 4px; border-top: 1px solid var(--border); margin-top: 4px; }
.drawer-rel-title { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; margin-bottom: 6px; }
.drawer-rel-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; cursor: pointer; font-size: 11px; color: var(--text2);
  transition: color 0.12s;
}
.drawer-rel-row:hover { color: var(--text); }
.drawer-rel-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-family: 'IBM Plex Mono', monospace; flex-shrink:0; }

/* Subgraph mode breadcrumb */
.breadcrumb-bar {
  display: none; align-items: center; gap: 6px;
  padding: 5px 14px; background: rgba(26,159,255,0.07);
  border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text3);
  flex-shrink: 0;
}
.breadcrumb-bar.visible { display: flex; }
.breadcrumb-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
.breadcrumb-link:hover { color: var(--accent2); }
/* All edges flow — both normal and cross-project */
/* Collapsed group node in normal view */
.coll-node-g { cursor:pointer; }
.coll-node-g:hover .coll-body { filter:brightness(1.25); }


/* ══════════════════════════════════════════════════════════════
   SKILL PANELS — 部署架构图 & 数据链路图
   Full-screen overlay with its own SVG canvas
   ══════════════════════════════════════════════════════════════ */
.skill-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 2000;
  background: var(--bg);
  flex-direction: column;
}
.skill-overlay.visible { display: flex; }

.skill-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border3);
  flex-shrink: 0;
}
.skill-topbar-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  font-family: 'Noto Sans SC', sans-serif; flex: 1;
}
.skill-topbar-sub {
  font-size: 11px; color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
}
.skill-topbar .btn { flex-shrink: 0; }

.skill-canvas {
  flex: 1; overflow: hidden; position: relative;
}
.skill-canvas svg { width: 100%; height: 100%; }

/* Legend strip at bottom */
.skill-legend {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 7px 18px;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.skill-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
}
.skill-legend-dot {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
}
.skill-legend-line {
  width: 22px; height: 2px; flex-shrink: 0; border-radius: 1px;
}
.edge-path.edge-flow { animation: edge-flow 2.4s linear infinite; }
.dep-edge-flow { animation: dep-flow 2s linear infinite; }
@keyframes dep-flow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
@keyframes edge-flow { to { stroke-dashoffset: -24; } }
/* Health-based dash patterns set inline; flowing animation works on top */

.project-bg { pointer-events: none; }

/* ===== CONTEXT MENU ===== */
.ctx-menu {
  position: fixed;
  background: var(--panel2);
  border: 1px solid var(--border3);
  border-radius: 6px;
  padding: 4px 0;
  z-index: 9990;
  min-width: 150px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}
.ctx-menu.visible { display: block; }
.ctx-item {
  padding: 7px 14px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background 0.1s;
}
.ctx-item:hover { background: rgba(26,159,255,0.1); color: var(--text); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 9900;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: var(--panel);
  border: 1px solid var(--border3);
  border-radius: 10px;
  padding: 24px 28px;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.modal-title { font-size: 16px; font-weight: 600; color: var(--accent2); margin-bottom: 16px; }
.modal-body { font-size: 13px; color: var(--text2); line-height: 1.7; }
.modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 8px; }

/* ===== NOTIFICATION ===== */
.notif {
  position: fixed;
  top: 60px;
  right: 14px;
  background: var(--panel2);
  border: 1px solid var(--green);
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--green);
  z-index: 9999;
  opacity: 0;
  transform: translateX(20px);
  transition: all 0.25s;

}
.notif.show { opacity: 1; transform: translateX(0); }
.notif.warn { color: var(--yellow); border-color: var(--yellow); }
.notif.err { color: var(--red); border-color: var(--red); }

/* Project multi-select styling */
#proj-select { height: 28px; min-width: 120px; }

<script>
// ============================================================
//  ╔══════════════════════════════════════════════════════════╗
//  ║  GRAPH_DATA  —  唯一数据入口，可直接替换此 JSON 更新图谱  ║
//  ║                                                          ║
//  ║  结构说明：                                              ║
//  ║  • nodes[]:    实体节点列表（必填字段见下方说明）         ║
//  ║  • relations[]: 关系边列表（必填字段见下方说明）          ║
//  ║                                                          ║
//  ║  nodes 必填字段：                                        ║
//  ║    entity_id        唯一标识                             ║
//  ║    entity_name      显示名称                             ║
//  ║    entity_type      类型（见 ETYPE_CONFIG）              ║
//  ║    project_id       所属项目（global=全局节点）          ║
//  ║    health_status    健康状态文本（资源两态；alarm为空）   ║
//  ║    health_level     正常 | 告警（资源两态；alarm为空）    ║
//  ║    created_at       创建时间                             ║
//  ║    updated_at       更新时间                             ║
//  ║                                                          ║
//  ║  relations 必填字段：                                    ║
//  ║    relation_id      唯一标识                             ║
//  ║    relation_type    类型（见 RTYPE_CONFIG）              ║
//  ║    source_entity_id 源端 entity_id                       ║
//  ║    target_entity_id 目标端 entity_id                     ║
//  ║    health_status    兼容字段，当前固定留空               ║
//  ║    health_level     兼容字段，当前固定留空               ║
//  ║    created_at       创建时间                             ║
//  ║    updated_at       更新时间                             ║
//  ╚══════════════════════════════════════════════════════════╝
// ============================================================

let GRAPH_DATA = __GRAPH_DATA_JSON__;


// ============================================================
//  ╔══════════════════════════════════════════════════════════╗
//  ║  APP_CONFIG  —  图谱配置入口，替换此处即可快速调整项目   ║
//  ║              实体类型、关系类型和布局参数                ║
//  ╚══════════════════════════════════════════════════════════╝
//
//  sections:
//    projects   → 项目 ID / 名称 / 主色 / 背景色 / 边框色
//                 新增项目：在此数组追加一项，GRAPH_DATA 即可引用该 project_id
//    entityTypes → 实体节点类型及颜色（对应 GRAPH_DATA.nodes[].entity_type）
//                  顺序即图谱从左到右的层次顺序
//    relationTypes → 关系边类型及颜色（对应 GRAPH_DATA.relations[].relation_type）
//    layout     → 节点尺寸、间距、行带间隔等布局参数（单位：像素）
//    healthStates → 可用健康状态列表（资源仅 正常 / 告警）
// ============================================================

let APP_CONFIG = __APP_CONFIG_JSON__;
let SKILL_STATE = __SKILL_STATE_JSON__;
const DEFAULT_SKILL_FILTERS = {
  project: 'all',
  entityType: 'all',
  relationType: 'all',
  health: 'all',
  keyword: '',
  resourceType: 'all',
  expandNeighbors: false
};

// ── Derived runtime constants — rebuilt whenever live session state changes ──
let PROJ_CONFIG = {};
let ETYPE_CONFIG = [];
let RTYPE_CONFIG = [];
let LAYER_ORDER = [];
let HEALTH_LIST = [];
let ETYPE_MAP = {};
let RTYPE_MAP = {};
let NODE_W = 118;
let NODE_H = 42;
let NODE_V_GAP = 22;
let BAND_MARGIN_V = 28;
let BAND_GAP = 56;
let CANVAS_TOP = 54;
let COL_SPAN = 168;
let MARGIN_L = 90;
let COLLAPSE_THRESHOLD = 20;
let SKILL_COLL_THRESH = 10;
let CELL_H = NODE_H + NODE_V_GAP;
let PROJS = [];
let APP_ALIAS_MAP = {};
let liveSessionError = '';
let liveSessionBusy = false;
let liveSessionPollTimer = null;
let liveSessionVersion = 0;
let liveSessionDataVersion = 0;
const INVALID_PROJECT_IDS = new Set(['', 'global', 'UNKNOWN']);

function cloneJson(value){
  return JSON.parse(JSON.stringify(value || {}));
}

function normalizeGraphDataShape(value){
  const graph = value && typeof value === 'object' ? value : {};
  return {
    nodes: Array.isArray(graph.nodes) ? graph.nodes : [],
    relations: Array.isArray(graph.relations) ? graph.relations : []
  };
}

function rebuildRuntimeConfig(){
  const safeGraph = normalizeGraphDataShape(GRAPH_DATA);
  const safeConfig = APP_CONFIG && typeof APP_CONFIG === 'object' ? APP_CONFIG : {};
  const safeProjects = Array.isArray(safeConfig.projects) ? safeConfig.projects : [];
  const safeEntityTypes = Array.isArray(safeConfig.entityTypes) ? safeConfig.entityTypes : [];
  const safeRelationTypes = Array.isArray(safeConfig.relationTypes) ? safeConfig.relationTypes : [];
  const layout = safeConfig.layout && typeof safeConfig.layout === 'object' ? safeConfig.layout : {};

  PROJ_CONFIG = Object.fromEntries(safeProjects.map(p => [p.id, p]));
  ETYPE_CONFIG = safeEntityTypes;
  RTYPE_CONFIG = safeRelationTypes;
  LAYER_ORDER = safeEntityTypes.map(e => e.type);
  HEALTH_LIST = Array.isArray(safeConfig.healthStates) && safeConfig.healthStates.length ? safeConfig.healthStates : ['正常', '告警'];
  ETYPE_MAP = Object.fromEntries(ETYPE_CONFIG.map(e => [e.type, e.color]));
  RTYPE_MAP = Object.fromEntries(RTYPE_CONFIG.map(r => [r.type, r.color]));
  NODE_W = layout.nodeWidth || 118;
  NODE_H = layout.nodeHeight || 42;
  NODE_V_GAP = layout.nodeVGap || 22;
  BAND_MARGIN_V = layout.bandMarginV || 28;
  BAND_GAP = layout.bandGap || 56;
  CANVAS_TOP = layout.canvasTop || 54;
  COL_SPAN = layout.colSpan || 168;
  MARGIN_L = layout.marginLeft || 90;
  COLLAPSE_THRESHOLD = layout.collapseThreshold || 20;
  SKILL_COLL_THRESH = layout.skillCollapseThreshold || 10;
  CELL_H = NODE_H + NODE_V_GAP;
  PROJS = [...new Set(
    safeGraph.nodes.map(n => n.project_id).filter(p => p && !INVALID_PROJECT_IDS.has(String(p)))
  )].sort();
  APP_ALIAS_MAP = (SKILL_STATE && SKILL_STATE.appAliases) || {};
  const liveState = (SKILL_STATE && SKILL_STATE.liveSession) || {};
  liveSessionVersion = Number(liveState.version || liveSessionVersion || 0);
  liveSessionDataVersion = Number(liveState.dataVersion || liveSessionDataVersion || 0);
}

rebuildRuntimeConfig();

const TEXT_MEASURE_CTX = document.createElement('canvas').getContext('2d');

function measureTextWidth(text, font){
  const value = String(text || '');
  if(!value) return 0;
  if(TEXT_MEASURE_CTX){
    TEXT_MEASURE_CTX.font = font;
    return TEXT_MEASURE_CTX.measureText(value).width;
  }
  return value.length * 7;
}

function truncateTextByWidth(text, maxWidth, font){
  const value = String(text || '');
  if(!value || maxWidth <= 0) return '';
  if(measureTextWidth(value, font) <= maxWidth) return value;
  const ellipsis = '…';
  const ellipsisWidth = measureTextWidth(ellipsis, font);
  if(ellipsisWidth >= maxWidth) return ellipsis;

  let lo = 0;
  let hi = value.length;
  while(lo < hi){
    const mid = Math.ceil((lo + hi) / 2);
    const candidate = value.slice(0, mid) + ellipsis;
    if(measureTextWidth(candidate, font) <= maxWidth) lo = mid;
    else hi = mid - 1;
  }
  return value.slice(0, lo) + ellipsis;
}

function appendProjectBadge(group, opts = {}){
  const rawLabel = String(opts.label || '').trim();
  const maxWidth = Number(opts.maxWidth || 0);
  if(!rawLabel || maxWidth <= 0) return null;

  const fontSize = Number(opts.fontSize || 7);
  const height = Number(opts.height || 11);
  const paddingX = Number(opts.paddingX || 5);
  const minWidth = Number(opts.minWidth || 28);
  const font = `${fontSize}px IBM Plex Mono, monospace`;
  const textWidth = Math.max(8, maxWidth - paddingX * 2);
  const label = truncateTextByWidth(rawLabel, textWidth, font);
  const badgeWidth = Math.min(
    maxWidth,
    Math.max(minWidth, Math.ceil(measureTextWidth(label, font) + paddingX * 2))
  );
  const x = Number(opts.x || 0);
  const y = Number(opts.y || 0);
  const fill = opts.fill || '#1a9fff';
  const opacity = opts.opacity === undefined ? 0.16 : opts.opacity;
  const textOpacity = opts.textOpacity === undefined ? 0.82 : opts.textOpacity;

  group.append('rect')
    .attr('x', x)
    .attr('y', y)
    .attr('width', badgeWidth)
    .attr('height', height)
    .attr('rx', Math.min(4, height / 2))
    .attr('fill', fill)
    .attr('opacity', opacity);

  group.append('text')
    .attr('x', x + badgeWidth / 2)
    .attr('y', y + height - 2)
    .attr('text-anchor', 'middle')
    .attr('font-size', fontSize)
    .attr('font-family', 'IBM Plex Mono, monospace')
    .attr('fill', fill)
    .attr('opacity', textOpacity)
    .attr('pointer-events', 'none')
    .text(label);

  return { width: badgeWidth, label };
}

function getProjectKey(item){
  const raw = item && typeof item === 'object' ? String(item.project_id || '').trim() : String(item || '').trim();
  if(!raw || INVALID_PROJECT_IDS.has(raw)) return 'global';
  return raw;
}

function hasProjectKey(item){
  return getProjectKey(item) !== 'global';
}

function getProjectLabel(item, fallback='-'){
  const key = getProjectKey(item);
  if(key === 'global') return fallback;
  const cfg = PROJ_CONFIG[key];
  return cfg ? (cfg.name || key) : key;
}

function getTypeOrderIndex(type){

function compareTypeOrder(a, b){
  const ia = getTypeOrderIndex(a);
  const ib = getTypeOrderIndex(b);
  if(ia !== ib) return ia - ib;
  return String(a || '').localeCompare(String(b || ''), 'zh-CN');
}

function buildFlowCurveGeometry(sx, sy, tx, ty, laneOffset = 0, opts = {}){
  const labelLift = Number(opts.labelLift || 8);
  const minCp = Number(opts.minCp || 42);
  const loopPad = Number(opts.loopPad || 68);
  const lanePull = laneOffset * 0.8;
  if(tx >= sx + 20){
    const cp = Math.max(minCp, (tx - sx) * 0.45);
    return {
      path: `M${sx},${sy} C${sx + cp},${sy + lanePull} ${tx - cp},${ty + lanePull} ${tx},${ty}`,
      labelX: (sx + tx) / 2,
      labelY: (sy + ty) / 2 - labelLift + lanePull * 0.35,
      forward: true
    };
  }
  const bendX = Math.max(sx, tx) + Math.max(loopPad, Math.abs(tx - sx) * 0.6 + 36);
  return {
    path: `M${sx},${sy} C${bendX},${sy + lanePull} ${bendX},${ty + lanePull} ${tx},${ty}`,
    labelX: bendX - 18,
    labelY: (sy + ty) / 2 - labelLift * 0.35 + lanePull * 0.45,
    forward: false
  };
}

function computeStronglyConnectedComponents(keys, outMap){
  let index = 0;
  const stack = [];
  const onStack = new Set();
  const indices = {};
  const lowLink = {};
  const components = [];

  function strongConnect(nodeId){
    indices[nodeId] = index;
    lowLink[nodeId] = index;
    index += 1;
    stack.push(nodeId);
    onStack.add(nodeId);

    (outMap[nodeId] || []).forEach(nextId => {
      if(indices[nextId] === undefined){
        strongConnect(nextId);
        lowLink[nodeId] = Math.min(lowLink[nodeId], lowLink[nextId]);
      } else if(onStack.has(nextId)){
        lowLink[nodeId] = Math.min(lowLink[nodeId], indices[nextId]);
      }
    });

    if(lowLink[nodeId] === indices[nodeId]){
      const component = [];
      while(stack.length){
        const popped = stack.pop();
        onStack.delete(popped);
        component.push(popped);
        if(popped === nodeId) break;
      }
      components.push(component);
    }
  }

  keys.forEach(nodeId => {
    if(indices[nodeId] === undefined){
      strongConnect(nodeId);
    }
  });
  return components;
}

function buildTypeColumnPlan(typeList, weightedEdges = {}){
  const types = Array.from(new Set((typeList || []).filter(Boolean)));
  types.sort(compareTypeOrder);
  if(!types.length){
    return { orderedTypes: [], typeIndex: {} };
  }

  const outMap = {};
  const reverseMap = {};
  types.forEach(type => {
    outMap[type] = new Set();
    reverseMap[type] = new Set();
  });

  types.forEach(srcType => {
    Object.entries(weightedEdges[srcType] || {}).forEach(([tgtType, rawCount]) => {
      const count = Number(rawCount || 0);
      if(count <= 0 || !outMap[srcType] || !outMap[tgtType] || srcType === tgtType) return;
      outMap[srcType].add(tgtType);
      reverseMap[tgtType].add(srcType);
    });
  });

  const components = computeStronglyConnectedComponents(types, outMap);
  const componentByType = {};
  components.forEach((compTypes, compId) => {
    compTypes.forEach(type => { componentByType[type] = compId; });
  });

  const compOut = {};
  const compIn = {};
  const compInDegree = {};
  const compMeta = {};
  components.forEach((compTypes, compId) => {
    compOut[compId] = new Set();
    compIn[compId] = new Set();
    compInDegree[compId] = 0;
    compMeta[compId] = { id: compId, types: compTypes.slice() };
  });

  const compEdgeWeights = {};
  types.forEach(srcType => {
    Object.entries(weightedEdges[srcType] || {}).forEach(([tgtType, rawCount]) => {
      const count = Number(rawCount || 0);
      const srcComp = componentByType[srcType];
      const tgtComp = componentByType[tgtType];
      if(count <= 0 || srcComp === undefined || tgtComp === undefined || srcComp === tgtComp) return;
      compEdgeWeights[srcComp] = compEdgeWeights[srcComp] || {};
      if(!compEdgeWeights[srcComp][tgtComp]){
        compEdgeWeights[srcComp][tgtComp] = 0;
        if(!compOut[srcComp].has(tgtComp)){
          compOut[srcComp].add(tgtComp);
          compIn[tgtComp].add(srcComp);
          compInDegree[tgtComp] += 1;
        }
      }
      compEdgeWeights[srcComp][tgtComp] += count;
    });
  });

  function compareComponentMeta(aId, bId){
    const aTypes = compMeta[aId].types.slice().sort(compareTypeOrder);
    const bTypes = compMeta[bId].types.slice().sort(compareTypeOrder);
    const rankDiff = compareTypeOrder(aTypes[0], bTypes[0]);
    if(rankDiff !== 0) return rankDiff;
    return aTypes.join('|').localeCompare(bTypes.join('|'), 'zh-CN');
  }

  Object.values(compMeta).forEach(meta => {
    if(meta.types.length <= 1){
      meta.types.sort(compareTypeOrder);
      return;
    }
    const scoreCache = {};
    function typeScore(type){
      if(scoreCache[type] !== undefined) return scoreCache[type];
      let out = 0;
      let incoming = 0;
      meta.types.forEach(otherType => {
        if(otherType === type) return;
        out += Number((weightedEdges[type] || {})[otherType] || 0);
        incoming += Number((weightedEdges[otherType] || {})[type] || 0);
      });
      scoreCache[type] = out - incoming;
      return scoreCache[type];
    }
    meta.types.sort((aType, bType) => {
      const aScore = typeScore(aType);
      const bScore = typeScore(bType);
      if(aScore !== bScore) return bScore - aScore;
      return compareTypeOrder(aType, bType);
    });
  });

  const indegree = { ...compInDegree };
  const queue = Object.keys(compMeta)
    .map(Number)
    .filter(compId => indegree[compId] === 0)
    .sort(compareComponentMeta);
  const topo = [];
  while(queue.length){
    const compId = queue.shift();
    topo.push(compId);
    Array.from(compOut[compId] || []).sort(compareComponentMeta).forEach(nextId => {
      indegree[nextId] -= 1;
      if(indegree[nextId] === 0){
        queue.push(nextId);
        queue.sort(compareComponentMeta);
      }
    });
  }
  Object.keys(compMeta).map(Number).sort(compareComponentMeta).forEach(compId => {
    if(!topo.includes(compId)) topo.push(compId);
  });

  const layerByComp = {};
  Object.keys(compMeta).forEach(compId => { layerByComp[compId] = 0; });
  topo.forEach(compId => {
    Array.from(compOut[compId] || []).forEach(nextId => {
      layerByComp[nextId] = Math.max(layerByComp[nextId] || 0, (layerByComp[compId] || 0) + 1);
    });
  });

  const compOrderIndex = {};
  const orderedCompIds = [];
  const layerIds = Array.from(new Set(Object.values(layerByComp).map(Number))).sort((a, b) => a - b);
  const reverseCompWeights = {};
  Object.entries(compEdgeWeights).forEach(([srcComp, targets]) => {
    Object.entries(targets || {}).forEach(([tgtComp, count]) => {
      reverseCompWeights[tgtComp] = reverseCompWeights[tgtComp] || {};
      reverseCompWeights[tgtComp][srcComp] = Number(count || 0);
    });
  });

  layerIds.forEach(layerId => {
    const compsInLayer = Object.keys(compMeta)
      .map(Number)
      .filter(compId => Number(layerByComp[compId] || 0) === Number(layerId));
    compsInLayer.sort((aId, bId) => {
      const predA = Object.entries(reverseCompWeights[aId] || {})
        .filter(([predId]) => compOrderIndex[predId] !== undefined);
      const predB = Object.entries(reverseCompWeights[bId] || {})
        .filter(([predId]) => compOrderIndex[predId] !== undefined);
      const scoreA = predA.length
        ? predA.reduce((sum, [predId, count]) => sum + compOrderIndex[predId] * Number(count || 0), 0) /
          predA.reduce((sum, [, count]) => sum + Number(count || 0), 0)
        : null;
      const scoreB = predB.length
        ? predB.reduce((sum, [predId, count]) => sum + compOrderIndex[predId] * Number(count || 0), 0) /
          predB.reduce((sum, [, count]) => sum + Number(count || 0), 0)
        : null;
      if(scoreA !== null || scoreB !== null){
        if(scoreA === null) return 1;
        if(scoreB === null) return -1;
        if(scoreA !== scoreB) return scoreA - scoreB;
      }
      return compareComponentMeta(aId, bId);
    });
    compsInLayer.forEach((compId, idx) => {
      compOrderIndex[compId] = orderedCompIds.length + idx;
    });
    orderedCompIds.push(...compsInLayer);
  });

  const orderedTypes = [];
  orderedCompIds.forEach(compId => {
    orderedTypes.push(...compMeta[compId].types);
  });

  return {
    orderedTypes,
    typeIndex: Object.fromEntries(orderedTypes.map((type, idx) => [type, idx]))
  };
}

function orderNodesByTypeColumns(orderedTypes, nodesByType, edges, nodeTypeIndex){
  const typeIndex = nodeTypeIndex || Object.fromEntries(orderedTypes.map((type, idx) => [type, idx]));
  const neighborMap = {};
  const nodeLookup = {};

  orderedTypes.forEach(type => {
    (nodesByType[type] || []).forEach(node => {
      neighborMap[node.entity_id] = neighborMap[node.entity_id] || new Set();
      nodeLookup[node.entity_id] = node;
    });
  });

  (edges || []).forEach(edge => {
    const src = edge.source_entity_id;
    const tgt = edge.target_entity_id;
    if(!neighborMap[src] || !neighborMap[tgt]) return;
    neighborMap[src].add(tgt);
    neighborMap[tgt].add(src);
  });

  function baseNodeCompare(aNode, bNode){
    const aProj = getProjectKey(aNode);
    const bProj = getProjectKey(bNode);
    if(aProj !== bProj) return aProj.localeCompare(bProj, 'zh-CN');
    const aName = String(aNode.entity_name || '');
    const bName = String(bNode.entity_name || '');
    const nameDiff = aName.localeCompare(bName, 'zh-CN');
    if(nameDiff !== 0) return nameDiff;
    return String(aNode.entity_id || '').localeCompare(String(bNode.entity_id || ''), 'zh-CN');
  }

  const rankMap = {};
  orderedTypes.forEach(type => {
    (nodesByType[type] || []).sort(baseNodeCompare);
    (nodesByType[type] || []).forEach((node, idx) => { rankMap[node.entity_id] = idx; });
  });

  function baryScore(node, direction){
    const currentType = String(node.entity_type || '');
    const currentColumn = typeIndex[currentType];
    const neighbors = Array.from(neighborMap[node.entity_id] || []);
    const relevant = neighbors.filter(otherId => {
      const other = nodeLookup[otherId];
      if(!other) return false;
      const otherColumn = typeIndex[String(other.entity_type || '')];
      if(otherColumn === undefined || currentColumn === undefined) return false;
      return direction === 'left' ? otherColumn < currentColumn : otherColumn > currentColumn;
    });
    if(!relevant.length) return null;
    return relevant.reduce((sum, otherId) => sum + Number(rankMap[otherId] || 0), 0) / relevant.length;
  }

  for(let iter = 0; iter < 4; iter++){
    orderedTypes.forEach(type => {
      (nodesByType[type] || []).sort((aNode, bNode) => {
        const aScore = baryScore(aNode, 'left');
        const bScore = baryScore(bNode, 'left');
        if(aScore !== null || bScore !== null){
          if(aScore === null) return 1;
          if(bScore === null) return -1;
          if(aScore !== bScore) return aScore - bScore;
        }
        return baseNodeCompare(aNode, bNode);
      });
      (nodesByType[type] || []).forEach((node, idx) => { rankMap[node.entity_id] = idx; });
    });

    orderedTypes.slice().reverse().forEach(type => {
      (nodesByType[type] || []).sort((aNode, bNode) => {
        const aScore = baryScore(aNode, 'right');
        const bScore = baryScore(bNode, 'right');
        if(aScore !== null || bScore !== null){
          if(aScore === null) return 1;
          if(bScore === null) return -1;
          if(aScore !== bScore) return aScore - bScore;
        }
        return baseNodeCompare(aNode, bNode);
      });
      (nodesByType[type] || []).forEach((node, idx) => { rankMap[node.entity_id] = idx; });
    });
  }

  return nodesByType;
}

// ── Build aggregate graph from visNodes / visEdges ───────────────────────
// aggNodes: one virtual node per entity_type (aggregated across all projects)
// aggEdges: one virtual edge per (srcType, tgtType, relation_type) triple, with count
function buildAggregateGraph(){
  // 1. Build aggNodes
  const typeMap = {};  // type -> { entityType, color, nodes[], ok, warn, alarmNodes }
  visNodes.forEach(n => {
    const t = n.entity_type || '未知';
    if(!typeMap[t]){
      typeMap[t] = { entityType: t, color: ETYPE_MAP[t]||'#64748b', nodes: [], ok:0, warn:0, alarmNodes:0 };
    }
    typeMap[t].nodes.push(n);
    if(isAlarmNode(n)){
      typeMap[t].alarmNodes++;
      return;
    }
    const level = getHealthLevel(n);
    if(level==='正常')      typeMap[t].ok++;
    else if(level==='告警') typeMap[t].warn++;
  });

  const aggNodes = Object.values(typeMap).map(t => ({
    _aggId:       `AGG::${t.entityType}`,
    entityType:   t.entityType,
    color:        t.color,
    nodes:        t.nodes,
    count:        t.nodes.length,
    ok:           t.ok, warn: t.warn, alarmNodes: t.alarmNodes,
    _x: undefined, _y: undefined,
  }));

  // 2. Build aggEdges — grouped by (srcType, tgtType) only.
  //    Each aggEdge carries a byRelType breakdown: { relType -> { count, color, rels[] } }
  const edgeMap = {};
  const idToType = {};
  visNodes.forEach(n => { idToType[n.entity_id] = n.entity_type || '未知'; });

  visEdges.forEach(r => {
    const st = idToType[r.source_entity_id];
    const tt = idToType[r.target_entity_id];
    if(!st || !tt || st === tt) return;   // skip same-type self-loops
    // Canonical key: always smaller string first so A→B and B→A don't create two entries
    // But we do preserve direction for rendering, so use directed key
    const key = `${st}||${tt}`;
    if(!edgeMap[key]){
      edgeMap[key] = {
        _aggRelId: `AGGREL::${key}`,
        srcType: st, tgtType: tt,
        count: 0,
        byRelType: {},   // relType -> { count, color, rels[] }
        rels: [],
      };
    }
    const ae = edgeMap[key];
    ae.count++;
    ae.rels.push(r);
    if(!ae.byRelType[r.relation_type]){
      ae.byRelType[r.relation_type] = {
        count: 0,
        color: RTYPE_MAP[r.relation_type] || '#64748b',
        rels: [],
      };
    }
    ae.byRelType[r.relation_type].count++;
    ae.byRelType[r.relation_type].rels.push(r);
  });

  // Derive a dominant color: use the relType with the most relations
  Object.values(edgeMap).forEach(ae => {
    const dominant = Object.entries(ae.byRelType)
      .sort((a,b) => b[1].count - a[1].count)[0];
    ae.color         = dominant ? dominant[1].color : '#64748b';
    ae.relation_type = dominant ? dominant[0] : '';   // kept for tooltip / marker fallback
  });

  const aggEdges = Object.values(edgeMap);
  return { aggNodes, aggEdges };
}

// ── Render aggregate graph ─────────────────────────────────────────────────
function renderAggregateGraph(){
  if(!g) initSVG();
  g.selectAll('*').remove();

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;

  const { aggNodes, aggEdges } = buildAggregateGraph();
  window._dispNodes = aggNodes;
  window._dispEdges = aggEdges;
  const aggCount = aggNodes.length;
  const aggEdgeCount = aggEdges.length;
  if(!aggCount){
    refreshMinimap();
    return;
  }

  const aggScale = (() => {
    let scale = 1;
    if(aggCount <= 4) scale = 1.85;
    else if(aggCount <= 6) scale = 1.6;
    else if(aggCount <= 9) scale = 1.35;
    else if(aggCount <= 12) scale = 1.2;
    const density = aggEdgeCount / Math.max(1, aggCount);
    if(density > 3) scale += 0.1;
    if(density > 5) scale += 0.1;
    return Math.max(1.05, Math.min(2.1, scale));
  })();

  const AGG_W = 140, AGG_H = 64;
  const AGG_COL_SPAN = Math.round(Math.max(AGG_W + 96, 220 * aggScale));
  const AGG_EDGE_DENSE = aggEdgeCount > 8;
  const aggNodeById = Object.fromEntries(aggNodes.map(an => [an.entityType, an]));
  const aggTypeWeights = {};
  aggEdges.forEach(ae => {
    aggTypeWeights[ae.srcType] = aggTypeWeights[ae.srcType] || {};
    aggTypeWeights[ae.srcType][ae.tgtType] = (aggTypeWeights[ae.srcType][ae.tgtType] || 0) + Number(ae.count || 1);
  });
  const aggPlan = buildTypeColumnPlan(aggNodes.map(an => an.entityType), aggTypeWeights);
  const orderedTypes = aggPlan.orderedTypes.length ? aggPlan.orderedTypes : aggNodes.map(an => an.entityType).sort(compareTypeOrder);
  const totalSpan = (orderedTypes.length - 1) * AGG_COL_SPAN;
  const startX = orderedTypes.length === 1
    ? W / 2
    : Math.max(AGG_W / 2 + 32, W / 2 - totalSpan / 2);
  const centerY = Math.max(CANVAS_TOP + AGG_H / 2 + 18, H / 2);

  orderedTypes.forEach((type, idx) => {
    const node = aggNodeById[type];
    if(!node) return;
    node._x = startX + idx * AGG_COL_SPAN;
    node._y = centerY;
  });

  // ── Draw aggregate edges ─────────────────────────────────────────────────
  // Add agg-specific arrow markers
  const defs = svg.select('defs');
  aggEdges.forEach(ae => {
    const mid = ae.relation_type.replace(/\s/g,'_');
    if(svg.select(`#arrow-end-${mid}`).empty()){
      defs.append('marker').attr('id',`arrow-end-${mid}`)
        .attr('viewBox','0 -3 8 6').attr('refX',7).attr('refY',0)
        .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
        .append('path').attr('d','M0,-3L8,0L0,3Z').attr('fill',ae.color).attr('opacity',0.75);
    }
  });

  function aggEdgeGeometry(ae){
    const sn = aggNodeById[ae.srcType];
    const tn = aggNodeById[ae.tgtType];
    if(!sn || !tn) return null;
    return buildFlowCurveGeometry(
      sn._x + AGG_W / 2,
      sn._y,
      tn._x - AGG_W / 2,
      tn._y,
      0,
      { labelLift: 13, minCp: 56, loopPad: 96 }
    );
  }

  // ── Draw edges ───────────────────────────────────────────────────────────
  const edgeGrp = g.append('g').attr('class','agg-edges');
  aggEdges.forEach(ae => {
    const geo = aggEdgeGeometry(ae);
    if(!geo) return;

    // Use dominant color for the line; stroke-width scales with total count
    const pathEl = edgeGrp.append('path')
      .datum(ae)
      .attr('id', `agg-path-${ae._aggRelId.replace(/[^a-z0-9]/gi,'_')}`)
      .attr('class','edge-path')
      .attr('d', geo.path)
      .attr('stroke', ae.color)
      .attr('stroke-width', 1.2)
      .attr('stroke-opacity', AGG_EDGE_DENSE ? 0.2 : 0.55)
      .attr('marker-end',`url(#arrow-end-${ae.relation_type.replace(/\s/g,'_')})`)
      .on('click', (ev,d) => { ev.stopPropagation(); showAggEdgeDetail(d); })
      .on('mousemove', (ev,d) => {
        // Tooltip: show per-relType breakdown
        const rows = Object.entries(d.byRelType)
          .sort((a,b) => b[1].count - a[1].count)
          .map(([rt,v]) =>
            `<span style="color:${v.color};font-size:10px">▸ ${rt}</span> <b>${v.count}</b> 条`)
          .join('<br>');
        showRawTooltip(ev,
          `<b style="color:${d.color}">${d.srcType} → ${d.tgtType}</b><br>` +
          `共 <b>${d.count}</b> 条关系<br>${rows}`);
      })
      .on('mouseleave', hideTooltip);

    // ── Pill: stack one tag per relation type ─────────────────────────────
    const pill = edgeGrp.append('g')
      .datum(ae)
      .attr('class','agg-edge-pill')
      .attr('transform', `translate(${geo.labelX},${geo.labelY})`);

    const relTypes = Object.entries(ae.byRelType)
      .sort((a,b) => b[1].count - a[1].count);   // most common first
    const TAG_H = 14, TAG_GAP = 3;
    const totalPillH = relTypes.length * TAG_H + (relTypes.length-1) * TAG_GAP;
    let tagY = -totalPillH / 2;

    relTypes.forEach(([rt, rv]) => {
      const label = `${rt} ×${rv.count}`;
      const tagW  = Math.max(52, label.length * 6 + 12);
      const tg = pill.append('g');
      tg.append('rect')
        .attr('x', -tagW/2).attr('y', tagY)
        .attr('width', tagW).attr('height', TAG_H)
        .attr('rx', 4)
        .attr('fill', `${rv.color}20`)
        .attr('stroke', rv.color)
        .attr('stroke-width', 0.7);
      tg.append('text')
        .attr('x', 0).attr('y', tagY + TAG_H - 3)
        .attr('text-anchor','middle')
        .attr('font-size', 8)
        .attr('font-family','Noto Sans SC,sans-serif')
        .attr('fill', rv.color)
        .attr('pointer-events','none')
        .text(label);
      tagY += TAG_H + TAG_GAP;
    });

    pathEl
      .on('mouseenter', () => pill.classed('visible', true))
      .on('mouseleave', () => pill.classed('visible', false));
  });

  // ── Helper: refresh all edges connected to a moved agg node ─────────────
  function refreshAggEdges(movedType){
    edgeGrp.selectAll('path.edge-path').each(function(ae){
      if(ae.srcType !== movedType && ae.tgtType !== movedType) return;
      const geo = aggEdgeGeometry(ae);
      if(!geo) return;
      d3.select(this).attr('d', geo.path);
    });
    edgeGrp.selectAll('g.agg-edge-pill').each(function(ae){
      if(ae.srcType !== movedType && ae.tgtType !== movedType) return;
      const geo = aggEdgeGeometry(ae);
      if(!geo) return;
      d3.select(this).attr('transform', `translate(${geo.labelX},${geo.labelY})`);
    });
  }

  // ── Draw aggregate nodes ─────────────────────────────────────────────────
  const nodeGrp = g.append('g').attr('class','agg-nodes');
  function setAggFocus(type){
    if(!AGG_EDGE_DENSE){
      edgeGrp.selectAll('path.edge-path').classed('dimmed', false).classed('highlighted', false);
      edgeGrp.selectAll('g.agg-edge-pill').classed('visible', false);
      return;
    }
    edgeGrp.selectAll('path.edge-path').classed('dimmed', d => d.srcType !== type && d.tgtType !== type);
    edgeGrp.selectAll('path.edge-path').classed('highlighted', d => d.srcType === type || d.tgtType === type);
    edgeGrp.selectAll('g.agg-edge-pill').classed('visible', d => d.srcType === type || d.tgtType === type);
  }

  aggNodes.forEach(an => {
    const c = an.color;
    const ng = nodeGrp.append('g')
      .datum(an)
      .attr('class','agg-node-g')
      .attr('transform',`translate(${an._x - AGG_W/2},${an._y - AGG_H/2})`);

    // Shadow
    ng.append('rect').attr('x',3).attr('y',3).attr('width',AGG_W).attr('height',AGG_H)
      .attr('rx',10).attr('fill','rgba(0,0,0,0.5)');
    // Body
    ng.append('rect').attr('class','agg-body').attr('width',AGG_W).attr('height',AGG_H)
      .attr('rx',10).attr('fill','#0f1e33').attr('stroke',c).attr('stroke-width',2);
    // Left bar
    ng.append('rect').attr('x',0).attr('y',0).attr('width',5).attr('height',AGG_H)
      .attr('rx',4).attr('fill',c);
    // Type name
    ng.append('text').attr('x',AGG_W/2+3).attr('y',AGG_H/2-6)
      .attr('text-anchor','middle').attr('font-size',13).attr('font-weight',600)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
      .attr('pointer-events','none').text(an.entityType);
    // Count
    ng.append('text').attr('x',AGG_W/2+3).attr('y',AGG_H/2+10)
      .attr('text-anchor','middle').attr('font-size',11)
      .attr('font-family','IBM Plex Mono,monospace').attr('fill',c)
      .attr('pointer-events','none').text(`${an.count} 个实体`);
    // Health mini-bar
    const barX = AGG_W-14, barH = AGG_H-16, barY = 8, total = an.count||1;
    let yOff = barY;
    [['ok',an.ok,'#00d68f'],['warn',an.warn,'#ffcc00']].forEach(([,v,col])=>{
      if(!v) return;
      const h = Math.max(3, barH*v/total);
      ng.append('rect').attr('x',barX).attr('y',yOff).attr('width',5).attr('height',h)
        .attr('rx',2).attr('fill',col).attr('opacity',0.85);
      yOff += h+1;
    });

    // ── Drag ───────────────────────────────────────────────────────────────
    let _dragging = false;
    const aggDrag = d3.drag()
      .on('start', function(ev){
        _dragging = false;
        d3.select(this).raise();
        ev.sourceEvent.stopPropagation();
      })
      .on('drag', function(ev, d){
        _dragging = true;
        d._x += ev.dx;
        d._y += ev.dy;
        d3.select(this).attr('transform', `translate(${d._x - AGG_W/2},${d._y - AGG_H/2})`);
        refreshAggEdges(d.entityType);
        refreshMinimap();
      })
      .on('end', function(ev, d){
        d3.select(this).style('cursor','grab');
      });

    ng.call(aggDrag).style('cursor','grab');

    // ── Click (fires only when not dragging) ───────────────────────────────
    ng.on('click', (ev, d) => {
      if(_dragging){ _dragging = false; return; }
      ev.stopPropagation();
      openEntityDrawer(d);
    });
    ng.on('mouseenter', () => setAggFocus(an.entityType));
    ng.on('mousemove', (ev,d) => {
      const alarmNodeText = d.alarmNodes ? `<span style="color:var(--red)">告警节点 ${d.alarmNodes}</span>` : '';
      showRawTooltip(ev,
        `<b style="color:${d.color}">${d.entityType}</b><br>` +
        `实体数量: <b>${d.count}</b><br>` +
        `<span style="color:var(--green)">正常 ${d.ok}</span>  ` +
        `<span style="color:var(--yellow)">告警 ${d.warn}</span>` +
        (alarmNodeText ? `  ${alarmNodeText}` : ''));
    });
    ng.on('mouseleave', () => {
      hideTooltip();
      setAggFocus('');
    });
  });

  setTimeout(fitView, 80);
  refreshMinimap();
}

// ── Entity drawer: show all entities of a type ────────────────────────────
function openEntityDrawer(aggNode){
  const drawer = document.getElementById('entity-drawer');
  document.getElementById('ed-dot').style.background = aggNode.color;
  document.getElementById('ed-title').textContent = aggNode.entityType;
  document.getElementById('ed-count').textContent = `${aggNode.count} 个`;

  const body = document.getElementById('ed-body');
  body.innerHTML = '';

  // ── Entity list ───────────────────────────────────────────────────────
  const listSec = document.createElement('div');
  listSec.style.cssText = 'padding:4px 0 8px';

  listTitle.className = 'drawer-rel-title';
  listTitle.style.cssText = 'padding:6px 14px 4px';

  listSec.appendChild(listTitle);

  aggNode.nodes.forEach(n => {
    const row = document.createElement('div');
    row.className = 'drawer-entity-row';
    const hc = getHealthTone(n);
    row.innerHTML = `
      <div class="der-health ${hc}"></div>
      <span class="der-name" title="${n.entity_name}">${n.entity_name}</span>
      <span class="der-proj">${getProjectLabel(n, '')}</span>`;
    row.onclick = () => {
      body.querySelectorAll('.drawer-entity-row').forEach(r=>r.classList.remove('active'));
      row.classList.add('active');
      enterSubgraph(n);
    };
    listSec.appendChild(row);
  });
  body.appendChild(listSec);

  // ── Relation summary for this type ───────────────────────────────────
  const rels = visEdges.filter(r => {
    const sn = visNodes.find(n=>n.entity_id===r.source_entity_id);
