  const live = getLiveSessionConfig();
  return Boolean(live && live.enabled && live.controlUrl && live.stateUrl);
}

function applyLiveSessionState(statePayload, options = {}){
  const payload = statePayload && typeof statePayload === 'object' ? statePayload : {};
  const nextPrompt = String(payload.prompt !== undefined ? payload.prompt : ((payload.skillState && payload.skillState.prompt) || skillPromptText));
  resetViewStateAfterDatasetChange();
  syncRuntimeDataset(payload.graphData || GRAPH_DATA, payload.appConfig || APP_CONFIG, payload.skillState || SKILL_STATE, nextPrompt);
  applyDashboardBootstrap({

    notify: options.notify,
    toastText: options.toastText || ''
  });
}

async function pullLiveSessionState(force = false){
  if(!liveSessionEnabled() || liveSessionBusy) return null;

  liveSessionBusy = true;
  try {
    const live = getLiveSessionConfig();
    const control = await fetchLiveJson(live.controlUrl);
    const nextVersion = Number(control.version || 0);
    if(!force && nextVersion <= liveSessionVersion){
      return control;
    }

    updateSyncBadge('同步中…', 'yellow');
    const state = await fetchLiveJson(live.stateUrl);
    const hadError = Boolean(liveSessionError);
    liveSessionError = '';
    liveSessionVersion = Number(state.version || control.version || nextVersion || liveSessionVersion);
    liveSessionDataVersion = Number(state.dataVersion || control.dataVersion || liveSessionDataVersion || 0);

    applyLiveSessionState(state, {
      forceAggMode: null,
      notify: force || nextVersion > 0,
      toastText: force ? '已同步最新看板状态' : `看板已更新：${String(state.prompt || control.prompt || '').slice(0, 24) || '新状态'}`
    });

    updateSyncBadge(control.refreshedData === false ? '筛选已更新' : '实时同步', control.refreshedData === false ? 'yellow' : 'green');
    if(hadError){
      setTimeout(() => showNotif('会话同步已恢复'), 300);
    }
    return control;
  } catch (err) {
    liveSessionError = err && err.message ? err.message : String(err || 'unknown error');
    updateSyncBadge('同步异常', 'red');
    console.warn('[ops-dashboard] live session sync failed:', err);
    return null;
  } finally {
    liveSessionBusy = false;
  }
}

function startLiveSessionPolling(){
  if(liveSessionPollTimer){
    clearInterval(liveSessionPollTimer);
    liveSessionPollTimer = null;
  }
  if(!liveSessionEnabled()) return;

  const live = getLiveSessionConfig();
  const pollMs = Math.max(600, Number(live.pollMs || 1500));
  updateSyncBadge('实时同步', 'green');
  liveSessionPollTimer = setInterval(() => {
    pullLiveSessionState(false);
  }, pollMs);
}

function resolveProjectToken(token) {
  const raw = String(token || '').trim();
  if (!raw) return '';

  const upper = raw.toUpperCase();
  const lower = raw.toLowerCase();
  const aliasKeys = Object.keys(APP_ALIAS_MAP || {});
  const aliasMatch = aliasKeys.find((key) => String(key || '').trim().toLowerCase() === lower);
  if (aliasMatch) {
    return String(APP_ALIAS_MAP[aliasMatch] || '').trim();
  }

  for (const project of PROJS) {
    const current = String(project || '').trim();
    if (!current) continue;
    if (current === raw || current.toUpperCase() === upper || current.toLowerCase() === lower) {
      return current;
    }
  }

  const sorted = PROJS.slice().sort((a, b) => String(b).length - String(a).length);
  for (const project of sorted) {
    const current = String(project || '').trim();
    if (!current) continue;
    const currentUpper = current.toUpperCase();
    if (upper.includes(currentUpper) || currentUpper.includes(upper)) {
      return current;
    }
  }

  return PROJS.length ? '' : raw;
}

function extractExplicitProjectToken(text) {
  const value = String(text || '').trim();
  if (!value) return '';

  const patterns = [
    /\bapp[\s_-]*id\b\s*[:=：]?\s*([A-Za-z0-9._/-]+)/i,
    /\bapp[\s_-]*user\b\s*[:=：]?\s*([A-Za-z0-9._/-]+)/i,
    /(?:应用|项目)\s*(?:id|名称|编码)?\s*[:=：]?\s*([A-Za-z0-9._/-]+)/i,
    /([A-Za-z0-9._/-]+)\s*(?:应用|项目)/i,
    /(?:应用|项目)\s*(?:名|名称)?\s*[:=：]?\s*([A-Za-z0-9._/\-\u4e00-\u9fff]{2,40})/i,
    /([A-Za-z0-9._/\-\u4e00-\u9fff]{2,40})\s*(?:应用|项目)/i
  ];

  for (const pattern of patterns) {
    const match = value.match(pattern);
    if (match && match[1]) {
      return resolveProjectToken(match[1]);
    }
  }

  return '';
}

function matchAliasInPrompt(text) {
  const value = String(text || '').trim().toLowerCase();
  if (!value) return '';

  const aliases = Object.entries(APP_ALIAS_MAP || {})
    .filter(([key, target]) => String(key || '').trim() && String(target || '').trim())
    .sort((a, b) => String(b[0]).length - String(a[0]).length);

  for (const [alias, target] of aliases) {
    if (value.includes(String(alias).trim().toLowerCase())) {
      return String(target).trim();
    }
  }

  return '';
}

function normalizeSkillFilterPatch(patch){
  const input = patch && typeof patch === 'object' ? patch : {};
  const next = {};
  const projectSet = new Set(PROJS);
  const entitySet = new Set(APP_CONFIG.entityTypes.map(e => e.type));
  const relationSet = new Set(APP_CONFIG.relationTypes.map(r => r.type));

  if(input.project !== undefined && input.project !== null){
    const raw = String(input.project).trim();
    const upper = raw.toUpperCase();
    const resolved = resolveProjectToken(raw);
    if(!raw || raw === 'all' || raw === '全部') next.project = 'all';
    else if(projectSet.has(raw)) next.project = raw;
    else if(projectSet.has(upper)) next.project = upper;
    else if(projectSet.has(resolved)) next.project = resolved;
  }

  if(input.entityType !== undefined && input.entityType !== null){
    const raw = String(input.entityType).trim().toLowerCase();
    const mapped = ENTITY_ALIAS[raw];
    if(!raw || raw === 'all' || raw === '全部') next.entityType = 'all';
    else if(mapped && entitySet.has(mapped)) next.entityType = mapped;
  }

  if(input.relationType !== undefined && input.relationType !== null){
    const raw = String(input.relationType).trim().toLowerCase();
    const mapped = RELATION_ALIAS[raw];
    if(!raw || raw === 'all' || raw === '全部') next.relationType = 'all';
    else if(mapped === 'cross') next.relationType = 'cross';
    else if(mapped && relationSet.has(mapped)) next.relationType = mapped;
  }

  if(input.health !== undefined && input.health !== null){
    const raw = String(input.health).trim().toLowerCase();
    const mapped = HEALTH_ALIAS[raw];
    if(!raw || raw === 'all' || raw === '全部') next.health = 'all';
    else if(mapped === '正常' || mapped === '告警') next.health = mapped;
  }

  if(input.keyword !== undefined && input.keyword !== null){
    next.keyword = String(input.keyword).trim().slice(0, 80);
  }

  if(input.resourceType !== undefined && input.resourceType !== null){
    const raw = String(input.resourceType).trim().toLowerCase();
    if(!raw || raw === 'all' || raw === '全部') next.resourceType = 'all';
    else {
      const tokens = raw.split(/[,\s，/]+/).map(t => t.trim()).filter(Boolean);
      const mapped = [];
      tokens.forEach(token => {
        const resolved = RESOURCE_ALIAS[token] || token;
        if(resolved && resolved !== 'all' && !mapped.includes(resolved)){
          mapped.push(resolved);
        }
      });
      next.resourceType = mapped.length ? mapped.join(',') : 'all';
    }
  }

  if(input.expandNeighbors !== undefined && input.expandNeighbors !== null){
    const raw = String(input.expandNeighbors).trim().toLowerCase();
    next.expandNeighbors = raw === 'true' || raw === '1' || raw === 'yes' || raw === 'on';
  }

  return next;
}

function inferSkillFiltersFromPrompt(promptText){
  const text = String(promptText || '').trim();
  if(!text) return {};

  const low = text.toLowerCase();
  const inferred = {};

  const relationHints = [
    ['包含', ['包含', '归属', 'contains']],
    ['调用', ['调用', 'call', 'calls']],
    ['同一资源', ['同一', '等同', 'same_as', 'sameas']],
    ['访问', ['访问']],
    ['负载均衡', ['负载', 'lb']],
    ['承载', ['承载', '部署到', '运行在']],
    ['监控', ['监控']]
  ];
  for(const [label, hints] of relationHints){
    if(hints.some(h => low.includes(h))){
      inferred.relationType = label;
      break;
    }
  }

  if(/告警|warn|warning/.test(low)) inferred.health = '告警';
  else if(/正常|healthy|\bok\b/.test(low)) inferred.health = '正常';

  if(/上下游|上游|下游|依赖|链路|调用链|upstream|downstream/.test(low)){
    inferred.expandNeighbors = true;
  }

  const resourceHints = [
    ['ec2', ['ec2']],
    ['ecs', ['ecs']],
    ['docker', ['docker', '容器']],
    ['redis', ['redis']],
    ['kafka', ['kafka']],
    ['elasticsearch', ['elasticsearch', 'es']],
    ['mysql', ['mysql']],
    ['postgres', ['postgres', 'postgresql']],
    ['oracle', ['oracle']],
    ['rabbitmq', ['rabbitmq']],
    ['rocketmq', ['rocketmq']],
    ['esfs', ['esfs']]
  ];
  for(const [resourceType, hints] of resourceHints){
    if(hints.some(h => low.includes(h))){
      inferred.resourceType = resourceType;
      break;
    }
  }

  const explicitKeyword = text.match(/(?:关键词|关键字|搜索|查找)\s*[:：]?\s*([^\n,，;；]+)/i);
  if(explicitKeyword && explicitKeyword[1]){
    inferred.keyword = explicitKeyword[1].trim().slice(0, 80);
  } else {
    const quoted = text.match(/["“]([^"”]{1,80})["”]/);
    if(quoted && quoted[1]) inferred.keyword = quoted[1].trim().slice(0, 80);
  }

  return normalizeSkillFilterPatch(inferred);
}

function getCurrentUiFilters(){
  const projSel = document.getElementById('proj-select');
  const selectedProjects = Array.from(projSel.selectedOptions).map(o => o.value);
  const project = selectedProjects.length && !selectedProjects.includes('all') ? selectedProjects[0] : 'all';
  return {
    project,
    entityType: document.getElementById('etype-filter').value || 'all',
    relationType: document.getElementById('rtype-filter').value || 'all',
    health: document.getElementById('health-filter').value || 'all',
    keyword: document.getElementById('search-inp').value.trim(),
    resourceType: skillResourceType || 'all',
    expandNeighbors: Boolean(skillExpandNeighbors)
  };
}

function setUiFilters(filters){
  const merged = { ...DEFAULT_SKILL_FILTERS, ...(filters || {}) };
  skillResourceType = merged.resourceType && merged.resourceType !== 'all'
    ? String(merged.resourceType).trim()
    : '';
  const expandRaw = String(merged.expandNeighbors).trim().toLowerCase();
  skillExpandNeighbors = expandRaw === 'true' || expandRaw === '1' || expandRaw === 'yes' || expandRaw === 'on';
  const projSel = document.getElementById('proj-select');
  const project = merged.project && merged.project !== 'all' ? merged.project : 'all';
  const hasProject = project !== 'all' && Array.from(projSel.options).some(o => o.value === project);
  Array.from(projSel.options).forEach(o => {
    o.selected = hasProject ? o.value === project : o.value === 'all';
  });

  const etypeSel = document.getElementById('etype-filter');
  etypeSel.value = Array.from(etypeSel.options).some(o => o.value === merged.entityType) ? merged.entityType : 'all';

  const rtypeSel = document.getElementById('rtype-filter');
  rtypeSel.value = Array.from(rtypeSel.options).some(o => o.value === merged.relationType) ? merged.relationType : 'all';

  const healthSel = document.getElementById('health-filter');
  healthSel.value = Array.from(healthSel.options).some(o => o.value === merged.health) ? merged.health : 'all';

  document.getElementById('search-inp').value = String(merged.keyword || '');
}

function getSkillSummary(){
  const f = getCurrentUiFilters();
  const extra = [];
  if(f.resourceType && f.resourceType !== 'all') extra.push(`资源:${f.resourceType}`);
  if(f.expandNeighbors) extra.push('上下游:1跳');
  return `项目:${f.project} 实体:${f.entityType} 关系:${f.relationType} 健康:${f.health} 关键词:${f.keyword || '(none)'}${extra.length ? ' ' + extra.join(' ') : ''}`;
}

function applySkillRun(filtersPatch, promptText){
  const normalized = normalizeSkillFilterPatch(filtersPatch || {});
  const merged = { ...getCurrentUiFilters(), ...normalized };
  if(typeof promptText === 'string'){
    skillPromptText = promptText;
  }
  if(normalized.resourceType !== undefined){
    skillResourceType = normalized.resourceType === 'all' ? '' : normalized.resourceType;
  }
  if(normalized.expandNeighbors !== undefined){
    skillExpandNeighbors = Boolean(normalized.expandNeighbors);
  }
  setUiFilters(merged);
  applyFilters();
  return {
    applied: Object.keys(normalized).length > 0 || Boolean(promptText),
    prompt: skillPromptText,
    filters: getCurrentUiFilters(),
    summary: getSkillSummary(),
    counts: {
      nodeCount: visNodes.length,
      relationCount: visEdges.length
    }
  };
}

function runSkillPayload(payload){
  const data = payload && typeof payload === 'object' ? payload : {};
  if(data.prompt || data.text){
    const prompt = String(data.prompt || data.text || '');
    const inferred = inferSkillFiltersFromPrompt(prompt);
    const patch = { ...inferred, ...normalizeSkillFilterPatch(data.filters || {}) };
    return applySkillRun(patch, prompt);
  }
  const patchSource = data.filters && typeof data.filters === 'object' ? data.filters : data;
  return applySkillRun(patchSource, '');
}

function handleSkillMessage(event){
  const data = event && event.data;
  if(!data || typeof data !== 'object') return;
  const type = String(data.type || data.action || '');
  if(!type.startsWith('opsgraph.')) return;

  let result;
  if(type === 'opsgraph.run'){
    result = runSkillPayload(data.payload || data);
  } else if(type === 'opsgraph.applyPrompt'){
    result = runSkillPayload({ prompt: data.prompt || data.text || '', filters: data.filters || {} });
  } else if(type === 'opsgraph.setFilters'){
    result = runSkillPayload({ filters: data.filters || data.payload || {} });
  } else if(type === 'opsgraph.getState'){
    result = {
      applied: true,
      prompt: skillPromptText,
      filters: getCurrentUiFilters(),
      summary: getSkillSummary(),
      counts: {
        nodeCount: visNodes.length,
        relationCount: visEdges.length
      }
    };
  } else {
    return;
  }

  if(event && event.source && typeof event.source.postMessage === 'function'){
    event.source.postMessage({
      type: 'opsgraph.result',
      requestId: data.requestId || null,
      ...result
    }, '*');
  }
}

window.__OPS_DASHBOARD_SKILL__ = {

function getDeployLayerName(node){
  if(!node || typeof node !== 'object') return '未分层';
  const raw = String(node.layer_type || node.layer || '').trim();
  if(raw) return raw;
  const fallback = String(node.entity_type || node.resource_type || '').trim();
  return fallback || '未分层';
}

function getDeployLayerPriority(label){
  const value = String(label || '').trim();
  const low = value.toLowerCase();
  if(!value) return 999;
  if(value === '未分层') return 998;
  const groups = [
    ['接入','入口','访问','边缘','公网','前端','客户端','域名','用户','access','entry','edge','front'],
    ['网关','gateway','ingress','代理','路由','api gateway'],
    ['应用','服务','业务','service','app','logic'],
    ['中间件','缓存','消息','mq','queue','middleware','cache','redis','kafka'],
    ['数据','数据库','存储','db','data','storage','mysql','postgres','oracle'],
    ['基础设施','基础','计算','容器','主机','infra','infrastructure','compute','host','cluster'],
    ['运维','监控','可观测','告警','ops','monitor','alarm','alert']
  ];
  for(let i = 0; i < groups.length; i += 1){
    if(groups[i].some(token => value.includes(token) || low.includes(token))) return i;
  }
  return 100;
}

function compareDeployLayers(a, b){
  const configured = Array.isArray(APP_CONFIG.layerTypes) ? APP_CONFIG.layerTypes : [];
  const ia = configured.findIndex(item => item && (item.type === a || item.label === a));
  const ib = configured.findIndex(item => item && (item.type === b || item.label === b));
  if(ia >= 0 || ib >= 0){
    if(ia < 0) return 1;
    if(ib < 0) return -1;
    if(ia !== ib) return ia - ib;
  }
  const pa = getDeployLayerPriority(a);
  const pb = getDeployLayerPriority(b);
  if(pa !== pb) return pa - pb;
  return String(a || '').localeCompare(String(b || ''), 'zh-CN');
}

const DEPLOY_LAYER_FALLBACK_COLORS = ['#00e5ff', '#1a9fff', '#00d68f', '#9d6fff', '#ffcc00', '#7fa8cc', '#ff8c33', '#4db8ff'];

function buildDeployLayerConfig(nodes, rels){
  const configured = Array.isArray(APP_CONFIG.layerTypes) ? APP_CONFIG.layerTypes : [];
  const cfgMap = Object.fromEntries(configured
    .filter(item => item && item.type)
    .map(item => [item.type, item]));
  const layerNames = [...new Set((nodes || []).map(getDeployLayerName))].filter(Boolean);
  if(!layerNames.length){
    return [{ type: '未分层', label: '未分层', color: '#64748b' }];
  }

  const nodeById = Object.fromEntries((nodes || []).map(node => [node.entity_id, node]));
  const edges = new Map();
  const indegree = new Map(layerNames.map(name => [name, 0]));
  layerNames.forEach(name => edges.set(name, new Set()));

  (rels || []).forEach(rel => {
    const source = nodeById[rel.source_entity_id];
    const target = nodeById[rel.target_entity_id];
    if(!source || !target) return;
    const sLayer = getDeployLayerName(source);
    const tLayer = getDeployLayerName(target);
    if(!sLayer || !tLayer || sLayer === tLayer) return;
    const bucket = edges.get(sLayer);
    if(!bucket || bucket.has(tLayer)) return;
    bucket.add(tLayer);
    indegree.set(tLayer, (indegree.get(tLayer) || 0) + 1);
  });

  const ordered = [];
  const queue = layerNames
    .filter(name => (indegree.get(name) || 0) === 0)
    .sort(compareDeployLayers);

  while(queue.length){
    const current = queue.shift();
    ordered.push(current);
    [...(edges.get(current) || [])]
      .sort(compareDeployLayers)
      .forEach(next => {
        indegree.set(next, (indegree.get(next) || 0) - 1);
        if((indegree.get(next) || 0) === 0){
          queue.push(next);
          queue.sort(compareDeployLayers);
        }
      });
  }

  layerNames
    .sort(compareDeployLayers)
    .forEach(name => {
      if(!ordered.includes(name)) ordered.push(name);
    });

  return ordered.map((name, idx) => ({
    type: name,
    label: (cfgMap[name] && (cfgMap[name].label || cfgMap[name].type)) || name,
    color: (cfgMap[name] && cfgMap[name].color) || DEPLOY_LAYER_FALLBACK_COLORS[idx % DEPLOY_LAYER_FALLBACK_COLORS.length]
  }));
}

function showDeployDiagram(){
  document.getElementById('deploy-panel').classList.add('visible');
  _renderDeployDiagram();
}

function _renderDeployDiagram(){
  const baseNodes = Array.isArray(visNodes) ? visNodes : rawData.nodes;
  const baseRels = Array.isArray(visEdges) ? visEdges : rawData.relations;
  const svg = d3.select('#deploy-svg');
  const wrap = document.getElementById('deploy-canvas');
  const legend = document.getElementById('deploy-legend');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  svg.attr('width', W).attr('height', H).selectAll('*').remove();

  if(!baseNodes.length){
    svg.append('text')
      .attr('x', W / 2)
      .attr('y', H / 2)
      .attr('text-anchor', 'middle')
      .attr('font-size', 14)
      .attr('font-family', 'Noto Sans SC,sans-serif')
      .attr('fill', '#7fa8cc')
      .text('当前筛选条件下没有可渲染的部署节点');
    if(legend) legend.innerHTML = '';
    document.getElementById('deploy-subtitle').textContent = '当前筛选条件下无数据';
    return;
  }

  const layerConfig = buildDeployLayerConfig(baseNodes, baseRels);
  const layerIndex = Object.fromEntries(layerConfig.map((layer, idx) => [layer.type, idx]));
  const THRESH = SKILL_COLL_THRESH;
  const hiddenIds = new Set();
  const deployCollMap = {};
  const groups = {};

  baseNodes.forEach(node => {
    const layer = getDeployLayerName(node);
    const project = getProjectKey(node);
    const entityType = String(node.entity_type || '未知');
    const key = `${layer}::${project}::${entityType}`;
    if(!groups[key]) groups[key] = [];
    groups[key].push(node);
  });

  Object.entries(groups).forEach(([key, grp]) => {
    if(grp.length <= THRESH || deployExpandedGroups.has(key)) return;
    let ok = 0;
    let warn = 0;
    grp.forEach(node => {
      const level = getHealthLevel(node);
      if(level === '告警') warn += 1;
      else if(level === '正常') ok += 1;
    });
    const sample = grp[0] || {};
    const layer = getDeployLayerName(sample);
    const entityType = String(sample.entity_type || '未知');
    const virtId = `DEPLAYER::${key}`;
    const healthLevel = warn > 0 ? '告警' : '正常';
    deployCollMap[virtId] = {
      entity_id: virtId,
      entity_name: entityType,
      entity_type: entityType,
      layer_type: layer,
      project_id: getProjectKey(sample),
      health_status: healthLevel,
      health_level: healthLevel,
      _isDeployColl: true,
      _collKey: key,
      _collNodes: grp,
      _collCount: grp.length,
      _collOk: ok,
      _collWarn: warn
    };
    grp.forEach(node => hiddenIds.add(node.entity_id));
  });

  const nodes = [
    ...baseNodes.filter(node => !hiddenIds.has(node.entity_id)),
    ...Object.values(deployCollMap)
  ];
  const displayIds = new Set(nodes.map(node => node.entity_id));
  const idToVirtual = {};
  Object.values(deployCollMap).forEach(node => {
    node._collNodes.forEach(item => { idToVirtual[item.entity_id] = node.entity_id; });
  });

  const relMap = new Map();
  baseRels.forEach(rel => {
    const sourceId = idToVirtual[rel.source_entity_id] || rel.source_entity_id;
    const targetId = idToVirtual[rel.target_entity_id] || rel.target_entity_id;
    if(!displayIds.has(sourceId) || !displayIds.has(targetId) || sourceId === targetId) return;
    const key = `${sourceId}|${targetId}|${rel.relation_type}`;
    if(!relMap.has(key)){
      relMap.set(key, {
        ...rel,
        relation_id: `DAR-${key}`,
        source_entity_id: sourceId,
        target_entity_id: targetId,
        _mc: 0
      });
    }
    relMap.get(key)._mc += 1;
  });
  const rels = [...relMap.values()];

  const nodesByLayer = {};
  layerConfig.forEach(layer => { nodesByLayer[layer.type] = []; });
  nodes.forEach(node => {
    const layer = getDeployLayerName(node);
    if(!nodesByLayer[layer]) nodesByLayer[layer] = [];
    nodesByLayer[layer].push(node);
  });
  Object.values(nodesByLayer).forEach(bucket => {
    bucket.sort((a, b) => {
      const projDiff = getProjectKey(a).localeCompare(getProjectKey(b), 'zh-CN');
      if(projDiff) return projDiff;
      const typeDiff = String(a.entity_type || '').localeCompare(String(b.entity_type || ''), 'zh-CN');
      if(typeDiff) return typeDiff;
      return String(a.entity_name || '').localeCompare(String(b.entity_name || ''), 'zh-CN');
    });
  });

  const CARD_W = 144;
  const CARD_H = 54;
  const GAP_X = 18;
  const GAP_Y = 16;
  const BAND_GAP = 26;
  const PAD_X = 28;
  const PAD_Y = 24;
  const HEADER_H = 36;
  const maxLayerCount = Math.max(...layerConfig.map(layer => (nodesByLayer[layer.type] || []).length), 1);
  const cols = Math.max(3, Math.min(8, Math.ceil(Math.sqrt(maxLayerCount))));
  const contentW = cols * CARD_W + (cols - 1) * GAP_X;
  const bandWidth = PAD_X * 2 + contentW;
  const nodePos = {};
  const bandLayouts = {};
  let cursorY = 32;

  layerConfig.forEach(layer => {
    const bucket = nodesByLayer[layer.type] || [];
    const rows = Math.max(1, Math.ceil(bucket.length / cols));
    const bandHeight = HEADER_H + PAD_Y * 2 + rows * CARD_H + Math.max(0, rows - 1) * GAP_Y;
    bandLayouts[layer.type] = {
      x: 40,
      y: cursorY,
      width: bandWidth,
      height: bandHeight,
      color: layer.color,
      label: layer.label,
      count: bucket.length
    };
    bucket.forEach((node, idx) => {
      const row = Math.floor(idx / cols);
      const col = idx % cols;
      nodePos[node.entity_id] = {
        x: 40 + PAD_X + col * (CARD_W + GAP_X),
        y: cursorY + HEADER_H + PAD_Y + row * (CARD_H + GAP_Y),
        layer: layer.type
      };
    });
    cursorY += bandHeight + BAND_GAP;
  });

  const totalW = bandWidth + 80;
  const totalH = cursorY;
  const defs = svg.append('defs');
  RTYPE_CONFIG.forEach(rc => {
    const mid = rc.type.replace(/\s/g, '_');
    defs.append('marker')
      .attr('id', `dep-arch-arrow-${mid}`)
      .attr('viewBox', '0 -4 8 8')
      .attr('refX', 8)
      .attr('refY', 0)
      .attr('markerWidth', 6)
      .attr('markerHeight', 6)
      .attr('orient', 'auto')
      .append('path')
      .attr('d', 'M0,-4L8,0L0,4Z')
      .attr('fill', rc.color)
      .attr('opacity', 0.75);
  });

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.05, 3]).on('zoom', ev => g.attr('transform', ev.transform));
  svg.call(zoom);
  const initScale = Math.min((W - 40) / totalW, (H - 40) / totalH, 1);
  svg.call(
    zoom.transform,
    d3.zoomIdentity
      .translate((W - totalW * initScale) / 2, (H - totalH * initScale) / 2)
      .scale(initScale)
  );

  layerConfig.forEach(layer => {
    const band = bandLayouts[layer.type];
    const color = layer.color;
    if(!band) return;
    g.append('rect')
      .attr('x', band.x)
      .attr('y', band.y)
      .attr('width', band.width)
      .attr('height', band.height)
      .attr('rx', 18)
      .attr('fill', `${color}10`)
      .attr('stroke', `${color}55`)
      .attr('stroke-width', 1.4);
    g.append('rect')
      .attr('x', band.x + 16)
      .attr('y', band.y + 12)
      .attr('width', 110)
      .attr('height', 24)
      .attr('rx', 12)
      .attr('fill', `${color}24`)
      .attr('stroke', color)
      .attr('stroke-width', 1);
    g.append('text')
      .attr('x', band.x + 71)
      .attr('y', band.y + 28)
      .attr('text-anchor', 'middle')
      .attr('font-size', 12)
      .attr('font-weight', 700)
      .attr('font-family', 'Noto Sans SC,sans-serif')
      .attr('fill', color)
      .text(layer.label);
    g.append('text')
      .attr('x', band.x + band.width - 16)
      .attr('y', band.y + 28)
      .attr('text-anchor', 'end')
      .attr('font-size', 10)
      .attr('font-family', 'IBM Plex Mono,monospace')
      .attr('fill', '#7fa8cc')
      .text(`${band.count} nodes`);
  });

  function deployEdgePath(sp, tp){
    const sx = sp.x + CARD_W / 2;
    const sy = sp.y + CARD_H;
    const tx = tp.x + CARD_W / 2;
    const ty = tp.y;
    if(sp.layer !== tp.layer && sp.y <= tp.y){
      const midY = (sy + ty) / 2;
      return { d: `M${sx},${sy} C${sx},${midY} ${tx},${midY} ${tx},${ty}`, lx: (sx + tx) / 2, ly: midY - 4 };
    }
    const startY = sp.y + CARD_H / 2;
    const endY = tp.y + CARD_H / 2;
    const startX = sx;
    const endX = tx;
    const bend = Math.max(40, Math.abs(endX - startX) * 0.35);
    return {
      d: `M${startX},${startY} C${startX + bend},${startY} ${endX - bend},${endY} ${endX},${endY}`,
      lx: (startX + endX) / 2,
      ly: (startY + endY) / 2 - 6
    };
  }

  const edgeG = g.append('g').attr('class', 'deploy-edges');
  rels.forEach(rel => {
    const sp = nodePos[rel.source_entity_id];
    const tp = nodePos[rel.target_entity_id];
    if(!sp || !tp) return;
    const color = RTYPE_MAP[rel.relation_type] || '#4a6e8a';
    const markerId = `dep-arch-arrow-${String(rel.relation_type || '').replace(/\s/g, '_')}`;
    const path = deployEdgePath(sp, tp);
    const label = rel._mc > 1 ? `${rel.relation_type} ×${rel._mc}` : rel.relation_type;

    edgeG.append('path')
      .datum(rel)
      .attr('class', 'dep-edge dep-edge-flow')
      .attr('d', path.d)
      .attr('stroke', color)
      .attr('stroke-width', rel._mc > 1 ? 2 : 1.4)
      .attr('stroke-opacity', 0.72)
      .attr('fill', 'none')
      .attr('stroke-dasharray', '8,4')
      .attr('marker-end', `url(#${markerId})`);

    edgeG.append('text')
      .datum(rel)
      .attr('class', 'dep-edge-lbl')
      .attr('x', path.lx)
      .attr('y', path.ly)
      .attr('text-anchor', 'middle')
      .attr('font-size', 8)
      .attr('font-family', 'IBM Plex Mono,monospace')
      .attr('fill', color)
      .attr('opacity', 0.65)
      .attr('pointer-events', 'none')
      .text(label);
  });

  function refreshDeployEdges(nodeId){
    edgeG.selectAll('path.dep-edge').each(function(rel){
      if(nodeId && rel.source_entity_id !== nodeId && rel.target_entity_id !== nodeId) return;
      const sp = nodePos[rel.source_entity_id];
      const tp = nodePos[rel.target_entity_id];
      if(!sp || !tp) return;
      d3.select(this).attr('d', deployEdgePath(sp, tp).d);
    });
    edgeG.selectAll('text.dep-edge-lbl').each(function(rel){
      if(nodeId && rel.source_entity_id !== nodeId && rel.target_entity_id !== nodeId) return;
      const sp = nodePos[rel.source_entity_id];
      const tp = nodePos[rel.target_entity_id];
      if(!sp || !tp) return;
      const pos = deployEdgePath(sp, tp);
      d3.select(this).attr('x', pos.lx).attr('y', pos.ly);
    });
  }

  function drawDeployCollapsedNode(node, pos, color){
    const group = g.append('g')
      .datum(node)
      .attr('transform', `translate(${pos.x},${pos.y})`)
      .style('cursor', 'pointer');

      group.append('rect')

      .attr('x', 0)
      .attr('y', 0)
      .attr('width', 5)
      .attr('height', CARD_H)
      .attr('rx', 3)
      .attr('fill', color);
    group.append('rect')
      .attr('x', CARD_W - 38)
      .attr('y', 5)
      .attr('width', 30)
      .attr('height', 14)
      .attr('rx', 7)
      .attr('fill', color)
      .attr('opacity', 0.22);
    group.append('text')
      .attr('x', CARD_W - 23)
      .attr('y', 15)
      .attr('text-anchor', 'middle')
      .attr('font-size', 9)
      .attr('font-family', 'IBM Plex Mono,monospace')
      .attr('fill', color)
      .text(`×${node._collCount}`);
    group.append('text')
      .attr('x', CARD_W / 2)
      .attr('y', CARD_H / 2 - 2)
      .attr('text-anchor', 'middle')
      .attr('font-size', 11)
      .attr('font-weight', 600)
      .attr('font-family', 'Noto Sans SC,sans-serif')
      .attr('fill', '#cce4ff')
      .text(node.entity_name.length > 12 ? `${node.entity_name.slice(0, 11)}…` : node.entity_name);
    group.append('text')
      .attr('x', CARD_W / 2)
      .attr('y', CARD_H - 8)
      .attr('text-anchor', 'middle')
      .attr('font-size', 8)
      .attr('font-family', 'IBM Plex Mono,monospace')
      .attr('fill', color)
      .attr('opacity', 0.7)
      .text('点击展开');
    group.on('click', (ev, datum) => {
      ev.stopPropagation();
      deployExpandedGroups.add(datum._collKey);
      _renderDeployDiagram();
      showNotif(`已展开 ${datum.entity_type}（${datum._collCount} 个）`);
    });
  }

  const nodeG = g.append('g').attr('class', 'deploy-nodes');
  nodes.forEach(node => {
    const pos = nodePos[node.entity_id];
    if(!pos) return;
    const color = (layerConfig[layerIndex[pos.layer]] && layerConfig[layerIndex[pos.layer]].color) || '#4db8ff';
    if(node._isDeployColl){
      drawDeployCollapsedNode(node, pos, color);
      return;
    }
    const healthColor = getHealthColor(node);
    const strokeColor = getNodeStrokeColor(node);
    const projectText = getProjectKey(node) === 'global' ? '' : getProjectLabel(node, getProjectKey(node));
    const group = nodeG.append('g')
      .datum(node)
      .attr('id', `dep-arch-node-${String(node.entity_id || '').replace(/[^a-zA-Z0-9]/g, '-')}`)
      .attr('transform', `translate(${pos.x},${pos.y})`)
      .style('cursor', 'grab');

    group.append('rect')
      .attr('x', 2)
      .attr('y', 2)
      .attr('width', CARD_W)
      .attr('height', CARD_H)
      .attr('rx', 8)
      .attr('fill', 'rgba(0,0,0,0.38)');
    group.append('rect')
      .attr('width', CARD_W)
      .attr('height', CARD_H)
      .attr('rx', 8)
      .attr('fill', '#0f1e33')
      .attr('stroke', strokeColor)
      .attr('stroke-width', 1.2);
    group.append('rect')
      .attr('x', 0)
      .attr('y', 0)
      .attr('width', 5)
      .attr('height', CARD_H)
      .attr('rx', 3)
      .attr('fill', color);
    group.append('circle')
      .attr('cx', CARD_W - 10)
      .attr('cy', 10)
      .attr('r', 3.6)
      .attr('fill', healthColor)
      .attr('opacity', 0.95);
    if(projectText){
      group.append('rect')
        .attr('x', 10)
        .attr('y', 6)
        .attr('width', Math.min(56, 12 + projectText.length * 7))
        .attr('height', 14)
        .attr('rx', 7)
        .attr('fill', `${color}20`)
        .attr('stroke', `${color}55`)
        .attr('stroke-width', 0.8);
      group.append('text')
        .attr('x', 16)
        .attr('y', 16)
        .attr('font-size', 8)
        .attr('font-family', 'IBM Plex Mono,monospace')
        .attr('fill', color)
        .text(projectText.length > 6 ? `${projectText.slice(0, 5)}…` : projectText);
    }
    group.append('text')
      .attr('x', CARD_W / 2)
      .attr('y', CARD_H / 2 - 3)
      .attr('text-anchor', 'middle')
      .attr('font-size', 11)
      .attr('font-weight', 600)
      .attr('font-family', 'Noto Sans SC,sans-serif')
      .attr('fill', '#cce4ff')
      .text(String(node.entity_name || '').length > 14 ? `${String(node.entity_name || '').slice(0, 13)}…` : String(node.entity_name || ''));
    group.append('text')
      .attr('x', CARD_W / 2)
      .attr('y', CARD_H - 8)
      .attr('text-anchor', 'middle')
      .attr('font-size', 8)
      .attr('font-family', 'IBM Plex Mono,monospace')
      .attr('fill', color)
      .attr('opacity', 0.72)
      .text(getNodeDisplayType(node));

    let moved = false;
    group.call(
      d3.drag()
        .on('start', function(ev){
          moved = false;
          d3.select(this).raise().style('cursor', 'grabbing');
          ev.sourceEvent.stopPropagation();
        })
        .on('drag', function(ev, datum){
          moved = true;
          const current = nodePos[datum.entity_id];
          if(!current) return;
          current.x += ev.dx;
          current.y += ev.dy;
          d3.select(this).attr('transform', `translate(${current.x},${current.y})`);
          refreshDeployEdges(datum.entity_id);
        })
        .on('end', function(){
          d3.select(this).style('cursor', 'grab');
        })
    );

    group.on('mousemove', (ev, datum) => {
      if(moved) return;
      const tooltip = document.getElementById('tooltip');
      tooltip.innerHTML = `
        <div class="tt-name" style="color:${color}">${datum.entity_name || '-'}</div>
        <div class="tt-row"><span class="tt-key">层级</span><span class="tt-val">${getDeployLayerName(datum)}</span></div>
        <div class="tt-row"><span class="tt-key">类型</span><span class="tt-val">${getNodeDisplayType(datum)}</span></div>
        <div class="tt-row"><span class="tt-key">项目</span><span class="tt-val">${projectText || '-'}</span></div>
        <div class="tt-row"><span class="tt-key">健康</span><span class="tt-val">${getHealthLevel(datum) || '-'}</span></div>`;
      tooltip.classList.add('visible');
      moveTooltip(ev);
    }).on('mouseleave', hideTooltip);
  });

  if(legend){
    const layerItems = layerConfig.map(layer =>
      `<div class="skill-legend-item"><div class="skill-legend-dot" style="background:${layer.color}"></div>${layer.label}</div>`
    ).join('');
    const relationItems = RTYPE_CONFIG.slice(0, 4).map(rel =>
      `<div class="skill-legend-item"><div class="skill-legend-line" style="background:${rel.color}"></div>${rel.type}</div>`
    ).join('');
    const collapsedCount = Object.keys(deployCollMap).length;
    legend.innerHTML = layerItems + relationItems +
      (collapsedCount > 0
        ? `<button class="btn btn-default" style="margin-left:auto;font-size:10px;padding:2px 8px" onclick="deployExpandedGroups.clear();_renderDeployDiagram()">⊟ 收起全部</button>`
        : `<div style="margin-left:auto"></div>`) +
      `<div class="skill-legend-item">
        <div class="skill-legend-dot" style="background:#00d68f;border-radius:50%"></div>正常
        <div class="skill-legend-dot" style="background:#ffcc00;border-radius:50%;margin-left:6px"></div>告警
        <span style="margin-left:8px;color:var(--text3)">折叠阈值 ${THRESH}</span>
      </div>`;
  }

  document.getElementById('deploy-subtitle').textContent =
    `${baseNodes.length} 个节点 · ${rels.length} 条关系 · ${layerConfig.length} 个层级`;
}

function refreshSkillPanels(){
  const deployPanel = document.getElementById('deploy-panel');
  const dataflowPanel = document.getElementById('dataflow-panel');
  if(deployPanel && deployPanel.classList.contains('visible')){
    _renderDeployDiagram();
  }
  if(dataflowPanel && dataflowPanel.classList.contains('visible')){
    _renderDataFlowDiagram();
  }
}

const _baseApplyFilters = applyFilters;
applyFilters = function(){
  _baseApplyFilters();
  refreshSkillPanels();
};

window.addEventListener('resize', () => {
  refreshSkillPanels();
});

window.addEventListener('load', async () => {
  aggMode = true;
  if(liveSessionEnabled()){
    const synced = await pullLiveSessionState(true);
    if(!synced){
      applyDashboardBootstrap({ forceAggMode: true, notify: true });
    }
    startLiveSessionPolling();
    return;
  }
  applyDashboardBootstrap({ forceAggMode: true, notify: true });
});

window.addEventListener('load', () => {
  setTimeout(() => {
    if(!document.getElementById('deploy-panel').classList.contains('visible')){
      showDeployDiagram();
    }
  }, 700);
});

window.addEventListener('message', handleSkillMessage);
</script>
</body>
</html>
