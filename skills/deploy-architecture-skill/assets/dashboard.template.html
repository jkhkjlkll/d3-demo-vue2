    return (sn?.entity_type===aggNode.entityType || tn?.entity_type===aggNode.entityType);
  });
  if(rels.length){
    const relSec = document.createElement('div');
    relSec.className = 'drawer-rel-section';
    relSec.innerHTML = `<div class="drawer-rel-title">涉及关系（${rels.length} 条）</div>`;
    // Group by type
    const byType = {};
    rels.forEach(r => { byType[r.relation_type] = (byType[r.relation_type]||0)+1; });
    Object.entries(byType).forEach(([rt, cnt]) => {
      const col = RTYPE_MAP[rt]||'#64748b';
      const row = document.createElement('div');
      row.className = 'drawer-rel-row';
      row.innerHTML = `<span class="drawer-rel-badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${rt}</span>
        <span>${cnt} 条</span>`;
      relSec.appendChild(row);
    });
    body.appendChild(relSec);
  }

  drawer.classList.add('open');
}

function closeEntityDrawer(){
  document.getElementById('entity-drawer').classList.remove('open');
}

// ── Subgraph: show ego-network of one entity ──────────────────────────────
function enterSubgraph(node){
  resetGraphInteractionState();
  subgraphNode = node.entity_id;
  // Save current vis state (full filter result)
  if(!savedVisNodes) savedVisNodes = visNodes.slice();
  if(!savedVisEdges) savedVisEdges = visEdges.slice();

  // Find 1-hop neighbours
  const connectedIds = new Set([node.entity_id]);
  savedVisEdges.forEach(r => {
    if(r.source_entity_id===node.entity_id) connectedIds.add(r.target_entity_id);
    if(r.target_entity_id===node.entity_id) connectedIds.add(r.source_entity_id);
  });

  // Temporarily set visNodes/visEdges to subgraph
  visNodes = savedVisNodes.filter(n => connectedIds.has(n.entity_id));
  visEdges = savedVisEdges.filter(r =>
    connectedIds.has(r.source_entity_id) && connectedIds.has(r.target_entity_id)
  );

  // Reset positions so layout recalculates
  visNodes.forEach(n => { n._x = undefined; n._y = undefined; });

  // Show breadcrumb
  document.getElementById('entity-drawer').classList.remove('open');
  document.getElementById('breadcrumb-bar').classList.add('visible');
  document.getElementById('breadcrumb-node').textContent = `${node.entity_name} (${getNodeDisplayType(node)})`;

  // Close drawer and render normal graph for the subgraph
  aggMode = false;
  renderGraph();
  updateStats();
  setTimeout(fitView, 80);
  showNotif(`子图谱：${node.entity_name} 的 1 跳邻居`);
}

function exitSubgraph(){
  resetGraphInteractionState();
  subgraphNode = null;
  document.getElementById('breadcrumb-bar').classList.remove('visible');
  document.getElementById('entity-drawer').classList.remove('open');

  if(savedVisNodes){
    visNodes = savedVisNodes;
    visEdges = savedVisEdges;
    savedVisNodes = null;
    savedVisEdges = null;
  }
  aggMode = true;
  renderAggregateGraph();
  updateStats();
  document.body.classList.add('agg-mode-active');
  showNotif('已返回聚合视图');
}

// ============================================================
//  FILTER & RENDER
// ============================================================
function getSelectedProjects(){
  const sel = document.getElementById('proj-select');
  const vals = Array.from(sel.selectedOptions).map(o=>o.value);
  if(vals.includes('all') || vals.length===0) return null; // null = all
  return vals;
}

function applyFilters(){
  if(!aggMode) expandedGroups.clear();   // reset when filters change
  const projs = getSelectedProjects();
  const etype = document.getElementById('etype-filter').value;
  const rtype = document.getElementById('rtype-filter').value;
  const hstatus = document.getElementById('health-filter').value;
  const search = document.getElementById('search-inp').value.trim().toLowerCase();
  const resourceFilter = String(skillResourceType || '').trim().toLowerCase();
  const resourceFilters = resourceFilter
    .split(/[,\s，/]+/)
    .map(t => t.trim())
    .filter(t => t && t !== 'all')
    .map(t => RESOURCE_ALIAS[t] || t)
    .filter((t, idx, arr) => t && arr.indexOf(t) === idx);

  visNodes = rawData.nodes.filter(n => {
    if(hiddenNodes.has(n.entity_id)) return false;
    if(n.entity_id === 'U-ROOT' && hstatus === 'all') return true;
    if(projs && !projs.includes(n.project_id)) return false;
    if(etype !== 'all' && n.entity_type !== etype) return false;
    if(hstatus !== 'all' && isAlarmNode(n)) return false;
    if(hstatus !== 'all' && getHealthLevel(n) !== hstatus) return false;
    const nName = String(n.entity_name || '').toLowerCase();
    const nId = String(n.entity_id || '').toLowerCase();
    const nRes = String(n.resource_type || '').toLowerCase();
    if(resourceFilters.length){
      const matched = resourceFilters.some(item =>
        nRes.includes(item) || nName.includes(item) || nId.includes(item)
      );
      if(!matched) return false;
    }
    if(search && !nName.includes(search) && !nId.includes(search) && !nRes.includes(search)) return false;
    return true;
  });

  const nodeIdSet = new Set(visNodes.map(n=>n.entity_id));

  const candidateEdges = rawData.relations.filter(r => {
    if(rtype !== 'all' && rtype !== 'cross' && r.relation_type !== rtype) return false;
    return true;
  });

  visEdges = candidateEdges.filter(r => {
    if(!nodeIdSet.has(r.source_entity_id) || !nodeIdSet.has(r.target_entity_id)) return false;
    if(rtype === 'cross'){
      // Only show cross-project edges
      const sNode = rawData.nodes.find(n=>n.entity_id===r.source_entity_id);
      const tNode = rawData.nodes.find(n=>n.entity_id===r.target_entity_id);
      if(!sNode||!tNode) return false;
      const sp = getProjectKey(sNode), tp = getProjectKey(tNode);
      return sp !== tp && sp !== 'global' && tp !== 'global';
    }
    return true;
  });

  if(skillExpandNeighbors && visNodes.length){
    const baseIds = new Set(visNodes.map(n => n.entity_id));
    const neighborIds = new Set(baseIds);
    candidateEdges.forEach(r => {
      if(baseIds.has(r.source_entity_id) || baseIds.has(r.target_entity_id)){
        neighborIds.add(r.source_entity_id);
        neighborIds.add(r.target_entity_id);
      }
    });
    visNodes = rawData.nodes.filter(n => neighborIds.has(n.entity_id));
    visEdges = candidateEdges.filter(r => neighborIds.has(r.source_entity_id) && neighborIds.has(r.target_entity_id));
    if(hstatus !== 'all'){
      visNodes = visNodes.filter(n => !isAlarmNode(n));
      const filteredIds = new Set(visNodes.map(n => n.entity_id));
      visEdges = visEdges.filter(r => filteredIds.has(r.source_entity_id) && filteredIds.has(r.target_entity_id));
    }
  }

  renderGraph();
  buildSidebar();
  updateStats();
}

// ============================================================
//  POSITION LAYOUT  — topology-aware DAG layering
// ============================================================
// Design:
//   1. Compute a DAG layer (column) per node using longest-path from
//      actual edges — upstream nodes land in smaller column indices (left),
//      downstream nodes in larger indices (right).
//   2. Each project occupies its own horizontal band (rows are isolated).
//   3. Within each (project × column) cell, nodes are distributed
//      vertically, centred in the band.
//   4. LAYER_ORDER is used only as a tiebreaker when two nodes share the
//      same topological depth, keeping the order stable across refreshes.
// ─────────────────────────────────────────────────────────────────────────

function computeHierarchicalPositions(nodes, edges, W, H){
  const nodeCount = nodes.length;
  const edgeCount = (edges || []).length;
  const layoutScale = (() => {
    let scale = 1;
    if(nodeCount <= 40) scale = 2.0;
    else if(nodeCount <= 70) scale = 1.75;
    else if(nodeCount <= 110) scale = 1.5;
    else if(nodeCount <= 180) scale = 1.28;
    else if(nodeCount <= 260) scale = 1.12;
    else if(nodeCount >= 700) scale = 0.94;
    const density = edgeCount / Math.max(1, nodeCount);
    if(density > 3) scale += 0.06;
    if(density > 5) scale += 0.05;
    return Math.max(0.9, Math.min(2.0, scale));
  })();

  const ROW_GAP_E = Math.max(18, Math.round(NODE_V_GAP * layoutScale));
  const COL_SPAN_E = Math.round(Math.max(NODE_W + 56, COL_SPAN * layoutScale));
  const positions = {};
  if(!nodes.length) return positions;

  const nodeById = Object.fromEntries(nodes.map(node => [node.entity_id, node]));
  const typeList = Array.from(new Set(nodes.map(node => String(node.entity_type || '未知')))).sort(compareTypeOrder);
  const typeWeights = {};
  (edges || []).forEach(edge => {
    const src = nodeById[edge.source_entity_id];
    const tgt = nodeById[edge.target_entity_id];
    if(!src || !tgt) return;
    const srcType = String(src.entity_type || '未知');
    const tgtType = String(tgt.entity_type || '未知');
    if(srcType === tgtType) return;
    typeWeights[srcType] = typeWeights[srcType] || {};
    typeWeights[srcType][tgtType] = (typeWeights[srcType][tgtType] || 0) + 1;
  });

  const typePlan = buildTypeColumnPlan(typeList, typeWeights);
  const orderedTypes = typePlan.orderedTypes.length ? typePlan.orderedTypes : typeList;
  const typeIndex = typePlan.typeIndex;
  const nodesByType = {};
  orderedTypes.forEach(type => { nodesByType[type] = []; });
  nodes.forEach(node => {
    const type = String(node.entity_type || '未知');
    if(!nodesByType[type]) nodesByType[type] = [];
    nodesByType[type].push(node);
  });
  orderNodesByTypeColumns(orderedTypes, nodesByType, edges, typeIndex);

  const totalSpan = (orderedTypes.length - 1) * COL_SPAN_E;
  const startX = orderedTypes.length === 1
    ? W / 2
    : Math.max(NODE_W / 2 + 24, W / 2 - totalSpan / 2);

  orderedTypes.forEach((type, idx) => {
    const colNodes = nodesByType[type] || [];
    if(!colNodes.length) return;
    const colX = startX + idx * COL_SPAN_E;
    const totalColH = colNodes.reduce((sum, node, nodeIdx) => {
      return sum + getNormalNodeSize(node).height + (nodeIdx < colNodes.length - 1 ? ROW_GAP_E : 0);
    }, 0);
    const minY = CANVAS_TOP + NODE_H / 2;
    let currentY = Math.max(minY, H / 2 - totalColH / 2);
    colNodes.forEach(node => {
      const size = getNormalNodeSize(node);
      positions[node.entity_id] = {
        x: colX,
        y: currentY + size.height / 2
      };
      currentY += size.height + ROW_GAP_E;
    });
  });

  return positions;
}

// ============================================================
//  SVG RENDER
// ============================================================
function initSVG(){
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  svg = d3.select('#graph-svg').attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  // Defs: arrows + gradients
  const defs = svg.append('defs');

  RTYPE_CONFIG.forEach(rc => {
    const mid = rc.type.replace(/\s/g,'_');
    // End arrow marker — refX=9 so filled tip lands right at node edge
    defs.append('marker')
      .attr('id', `arrow-end-${mid}`)
      .attr('viewBox','0 -5 10 10')
      .attr('refX', 9)
      .attr('refY', 0)
      .attr('markerWidth', 7)
      .attr('markerHeight', 7)
      .attr('orient', 'auto')
      .append('path')
      .attr('d','M0,-5L10,0L0,5Z')
      .attr('fill', rc.color)
      .attr('opacity', 0.88);
  });
  // No special cross-project marker needed

  // Zoom
  zoom = d3.zoom()
    .scaleExtent([0.04, 5])
    .on('zoom', ev => {
      lastTransform = ev.transform;
      g.attr('transform', ev.transform);
      refreshMinimap();
    });
  svg.call(zoom);

  g = svg.append('g');

  // Click background to deselect
  svg.on('click', () => {
    clearHighlight();
    closeDetail();
    hideCtxMenu();
  });

  buildLegend();
}

// ============================================================
//  NORMAL-VIEW COLLAPSE HELPER
//  Per-project per-type: if count > COLLAPSE_THRESHOLD and
//  not in expandedGroups → replace with one virtual "coll node"
// ============================================================
function buildDispView(){
  // group visNodes by (project_id, entity_type), skip global
  const groups = {};   // "proj::type" -> [node, ...]
  visNodes.forEach(n => {
    if(!n.project_id || n.project_id==='global') return;
    // Keep alarm nodes and alarmed resources expanded so monitor relations stay visible.
    if(isAlarmNode(n) || getAlarmCount(n) > 0) return;
    const key = `${n.project_id}::${n.entity_type}`;
    (groups[key] = groups[key]||[]).push(n);
  });

  const hiddenIds   = new Set();
  const collNodes   = [];   // virtual collapsed nodes
  const collByVirtId = {};  // virtId -> collNode (for edge remapping)

  Object.entries(groups).forEach(([key, nodes]) => {
    if(nodes.length <= COLLAPSE_THRESHOLD) return;
    if(expandedGroups.has(key))            return;

    const [proj, type] = key.split('::');
    let ok=0, warn=0;
    nodes.forEach(n => {
      const level = getHealthLevel(n);
      if(level==='正常') ok++;
      else if(level==='告警') warn++;
    });
    const virtId = `COLL::${key}`;
    const healthLevel = warn>0?'告警':'正常';
    const cNode  = {
      entity_id:    virtId,
      entity_name:  type,   // displayed in centre
      entity_type:  type,
      project_id:   proj,
      health_status: healthLevel,
      health_level: healthLevel,
      _isColl:      true,
      _collKey:     key,
      _collNodes:   nodes,
      _collCount:   nodes.length,
      _collOk: ok, _collWarn: warn, _collErr: 0,
      _x: undefined, _y: undefined,
    };
    collNodes.push(cNode);
    collByVirtId[virtId] = cNode;
    nodes.forEach(n => hiddenIds.add(n.entity_id));
  });

  // dispNodes = non-hidden real nodes + collapsed virtuals
  const dispNodes = [
    ...visNodes.filter(n => !hiddenIds.has(n.entity_id)),
    ...collNodes,
  ];
  const dispNodeIds = new Set(dispNodes.map(n => n.entity_id));

  // remap edges: if src/tgt hidden → find its virtual node id
  const idToVirt = {};
  Object.entries(collByVirtId).forEach(([vid, cn]) => {
    cn._collNodes.forEach(n => { idToVirt[n.entity_id] = vid; });
  });

  // Deduplicate remapped edges
  const edgeDedup = new Map();   // "srcId|tgtId|relType" -> merged edge obj
  visEdges.forEach(r => {
    const sid = idToVirt[r.source_entity_id] || r.source_entity_id;
    const tid = idToVirt[r.target_entity_id] || r.target_entity_id;
    if(!dispNodeIds.has(sid) || !dispNodeIds.has(tid)) return;
    if(sid === tid) return;   // intra-group self-loop
    const dk = `${sid}|${tid}|${r.relation_type}`;
    if(!edgeDedup.has(dk)){
      edgeDedup.set(dk, {
        ...r,
        relation_id:      `DRE-${dk}`,
        source_entity_id: sid,
        target_entity_id: tid,
        _mergedCount: 0,
      });
    }
    edgeDedup.get(dk)._mergedCount++;
  });

  const dispEdges = Array.from(edgeDedup.values());
  return { dispNodes, dispEdges, collByVirtId };
}

function renderGraph(){
  if(!g) initSVG();
  // Route to aggregate renderer when in aggregate mode
  if(aggMode){ renderAggregateGraph(); return; }
  g.selectAll('*').remove();

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;

  // ── Collapse processing ───────────────────────────────────────────────────
  const { dispNodes, dispEdges } = buildDispView();
  window._dispNodes = dispNodes;   // expose for refreshEdges
  window._dispEdges = dispEdges;
  const dispNodeMap = Object.fromEntries(dispNodes.map(node => [node.entity_id, node]));
  const totalEdges = dispEdges.length;
  showEdgeLabelsByDefault = totalEdges <= 120;
  edgeLabelMode = showEdgeLabelsByDefault ? 'all' : 'hover';
  enableEdgeFlow = totalEdges <= 80;
  const denseEdges = totalEdges > 220;

  // Assign lane offsets for parallel edges to reduce overlap
  const laneMap = {};
  dispEdges.forEach(e => {
    const key = `${e.source_entity_id}|${e.target_entity_id}`;
    (laneMap[key] = laneMap[key] || []).push(e);
  });
  Object.values(laneMap).forEach(edges => {
    const mid = (edges.length - 1) / 2;
    edges.forEach((e, idx) => { e._lane = idx - mid; });
  });

  // Compute positions using dispNodes + dispEdges so collapsed nodes follow the visible topology.
  const positions = computeHierarchicalPositions(dispNodes, dispEdges, W, H);

  // Store positions on display nodes
  dispNodes.forEach(n => {
    if(!n._x || currentLayoutMode === 'hierarchical'){
      const p = positions[n.entity_id];
      if(p){ n._x = p.x; n._y = p.y; }
    }
  });

  // Helper: get project_id of a node
  function nodeProj(n){ return (n && n.project_id) || 'global'; }

  // Draw normal edges first, cross-project edges on top  (use dispEdges/dispNodes)
  const normalEdges = dispEdges.filter(e => {
    const s = dispNodeMap[e.source_entity_id];
    const t = dispNodeMap[e.target_entity_id];
    if(!s||!t) return false;
    return nodeProj(s) === nodeProj(t) || nodeProj(s) === 'global' || nodeProj(t) === 'global';
  });
  const crossEdges = dispEdges.filter(e => {
    const s = dispNodeMap[e.source_entity_id];
    const t = dispNodeMap[e.target_entity_id];
    if(!s||!t) return false;
    return nodeProj(s) !== nodeProj(t) && nodeProj(s) !== 'global' && nodeProj(t) !== 'global';
  });

  function drawEdge(edge, edgeGroup, isCross){
    const src = dispNodeMap[edge.source_entity_id];
    const tgt = dispNodeMap[edge.target_entity_id];
    if(!src||!tgt||!src._x||!tgt._x) return;

    const baseColor = RTYPE_MAP[edge.relation_type] || '#64748b';
    const color     = baseColor;  // same color for all edges
    const markerId  = `end-${edge.relation_type.replace(/\s/g,'_')}`;
    const isMonitor = edge.relation_type === '监控';
    const srcSize = getNormalNodeSize(src);
    const tgtSize = getNormalNodeSize(tgt);
    const laneOffset = (edge._lane || 0) * 9;
    const geometry = buildFlowCurveGeometry(
      src._x + srcSize.width / 2,
      src._y,
      tgt._x - tgtSize.width / 2,
      tgt._y,
      laneOffset,
      { labelLift: 9, minCp: 46, loopPad: 76 }
    );

    const edgeClasses = ['edge-path'];
    if(isCross) edgeClasses.push('edge-cross');
    if(denseEdges) edgeClasses.push('edge-thin');
    if(isMonitor){
      edgeClasses.push('edge-monitor');
      if(enableEdgeFlow) edgeClasses.push('edge-flow');
    }
    const pathEl = edgeGroup.append('path')
      .datum(edge)
      .attr('class', edgeClasses.join(' '))
      .attr('id', `edge-${edge.relation_id}`)
      .attr('d', geometry.path)
      .attr('stroke', color)
      .attr('stroke-width', isMonitor ? (denseEdges ? 1.8 : 2.4) : (denseEdges ? 1.1 : 1.5))
      .attr('stroke-opacity', isMonitor ? 0.95 : (denseEdges ? (isCross ? 0.2 : 0.28) : (isCross ? 0.35 : 0.55)))
      .attr('marker-end', `url(#arrow-${markerId})`);
    const dashArray = isMonitor ? '6,3' : '';
    if(dashArray){
      pathEl.attr('stroke-dasharray', dashArray);
    }

    // Label
    const labelG = edgeGroup.append('g').attr('pointer-events','none');
    const labelId = `edge-label-${edge.relation_id}`;
    const labelEl = labelG.append('text')
      .datum(edge)
      .attr('x', geometry.labelX).attr('y', geometry.labelY)
      .attr('id', labelId)
      .attr('text-anchor','middle')
      .attr('font-size', 9)
      .attr('font-family','Noto Sans SC, sans-serif')
      .attr('fill', color)
      .attr('class', `edge-label${showEdgeLabelsByDefault || isMonitor ? ' edge-label-active' : ''}`)
      .text(edge.relation_type);

    pathEl.on('click', (ev,d) => {
      ev.stopPropagation();
      hideCtxMenu();
      showEdgeDetail(d);
    });
    pathEl.on('mouseenter', () => {
      if(edgeLabelMode === 'hover' && !isMonitor){
        labelEl.classed('edge-label-active', true);
      }
    });
    pathEl.on('mousemove', (ev,d) => showTooltip(ev, d, 'edge'));
    pathEl.on('mouseleave', () => {
      if(edgeLabelMode === 'hover' && !isMonitor){
        labelEl.classed('edge-label-active', showEdgeLabelsByDefault);
      }
      hideTooltip();
    });
  }

  // Draw normal edges, then cross-project edges on top
  const edgeGroup = g.append('g').attr('class','edges');
  normalEdges.filter(e => e.relation_type !== '监控').forEach(e => drawEdge(e, edgeGroup, false));
  const crossEdgeGroup = g.append('g').attr('class','cross-edges');
  crossEdges.filter(e => e.relation_type !== '监控').forEach(e => drawEdge(e, crossEdgeGroup, true));
  const monitorEdgeGroup = g.append('g').attr('class','monitor-edges');
  normalEdges.filter(e => e.relation_type === '监控').forEach(e => drawEdge(e, monitorEdgeGroup, false));
  crossEdges.filter(e => e.relation_type === '监控').forEach(e => drawEdge(e, monitorEdgeGroup, true));

  // Draw nodes (dispNodes includes virtual collapsed nodes)
  const nodeGroup = g.append('g').attr('class','nodes');
  dispNodes.forEach(node => {
    if(!node._x) return;

    // ── Collapsed group node ──────────────────────────────────────────────
    if(node._isColl){
      _drawCollapsedNode(node, nodeGroup, dispNodes, dispEdges);
      return;
    }

    const color = ETYPE_MAP[node.entity_type] || '#64748b';
    const hColor = getHealthColor(node);
    const strokeColor = getNodeStrokeColor(node);
    const isUser = node.entity_id==='U-ROOT';
    const nw = isUser ? 100 : NODE_W;
    const nh = isUser ? 38 : NODE_H;

    const ng = nodeGroup.append('g')
      .datum(node)
      .attr('class','node-g')
      .attr('id', `node-${node.entity_id}`)
      .attr('transform', `translate(${node._x - nw/2},${node._y - nh/2})`);

    // Drop shadow
    ng.append('rect')
      .attr('x',3).attr('y',3)
      .attr('width',nw).attr('height',nh)
      .attr('rx',6).attr('ry',6)
      .attr('fill','rgba(0,0,0,0.45)');

    // Node body
    ng.append('rect')
      .attr('class','node-body')
      .attr('width',nw).attr('height',nh)
      .attr('rx',6).attr('ry',6)
      .attr('fill','#0f1e33')
      .attr('stroke', strokeColor)
      .attr('stroke-width', isUser ? 2 : 1.5);

    // Left accent bar
    ng.append('rect')
      .attr('x',0).attr('y',0)
      .attr('width',4).attr('height',nh)
      .attr('rx',3).attr('ry',3)
      .attr('fill',color);

    // Health dot
    ng.append('circle')
      .attr('cx', nw-11).attr('cy',10)
      .attr('r',4)
      .attr('fill',hColor)
      .attr('opacity',0.85);

    // Project badge (small)
    if(!isUser && node.project_id){
      const pcfg = PROJ_CONFIG[node.project_id];
      if(pcfg){
        appendProjectBadge(ng, {
          label: node.project_id,
          x: 10,
          y: 4,
          maxWidth: Math.max(30, nw - 28),
          fill: pcfg.color,
          opacity: 0.15,
          fontSize: 7,
          minWidth: 28,
          height: 11
        });
      }
    }

    // Node name
    const displayName = truncateTextByWidth(
      node.entity_name,
      Math.max(34, nw - 26),
      '12px "Noto Sans SC", sans-serif'
    );
    const nameY = isUser ? nh / 2 + 4 : Math.min(nh - 18, Math.max(24, Math.round(nh * 0.54)));
    ng.append('text')
      .attr('x', nw/2+2).attr('y', nameY)
      .attr('text-anchor','middle')
      .attr('font-size',12)
      .attr('font-weight',500)
      .attr('font-family','Noto Sans SC, sans-serif')
      .attr('fill','#cce4ff')
      .attr('pointer-events','none')
      .text(displayName);

    if(!isUser){
      const typeLabel = truncateTextByWidth(
        getNodeDisplayType(node),
        Math.max(28, nw - 22),
        '8px "IBM Plex Mono", monospace'
      );
      ng.append('text')
        .attr('x',nw/2+2).attr('y',nh-7)
        .attr('text-anchor','middle')
        .attr('font-size',8)
        .attr('font-family','IBM Plex Mono, monospace')
        .attr('fill',color)
        .attr('opacity',0.7)
        .attr('pointer-events','none')
        .text(typeLabel);
    }

    // Drag behavior
    const drag = d3.drag()
      .on('start', function(ev){
        d3.select(this).raise();
        ev.sourceEvent.stopPropagation();
      })
      .on('drag', function(ev,d){
        d._x = d._x + ev.dx;
        d._y = d._y + ev.dy;
        d3.select(this).attr('transform', `translate(${d._x-nw/2},${d._y-nh/2})`);
        // Update connected edges
        refreshEdges(d);
        refreshMinimap();
      });
    ng.call(drag);

    // Click
    ng.on('click', (ev,d) => {
      ev.stopPropagation();
      hideCtxMenu();
      highlightNode(d.entity_id);
      showNodeDetail(d);
    });

    // Right click context menu
    ng.on('contextmenu', (ev,d) => {
      ev.preventDefault();
      ev.stopPropagation();
      ctxTargetNode = d;
      showCtxMenu(ev.clientX, ev.clientY);
    });

    // Hover
    ng.on('mousemove', (ev,d) => showTooltip(ev, d, 'node'));
    ng.on('mouseleave', hideTooltip);
  });

  refreshMinimap();
}

function _drawCollapsedNode(node, nodeGroup, dispNodes, dispEdges){
  const c  = ETYPE_MAP[node.entity_type] || '#64748b';
  const CW = NODE_W + 14;    // slightly wider than normal node
  const CH = NODE_H + 14;    // slightly taller
  const hc = getHealthColor(node);

  const cg = nodeGroup.append('g')
    .datum(node)
    .attr('class','coll-node-g')
    .attr('id', `node-${node.entity_id}`)
    .attr('transform', `translate(${node._x - CW/2},${node._y - CH/2})`);

  // Stack effect: two offset shadow rects to indicate multiple nodes
  [-4,-2].forEach((off,i) => {
    cg.append('rect')
      .attr('x', 4+off).attr('y', 4+off)
      .attr('width', CW).attr('height', CH)
      .attr('rx', 7).attr('fill', '#0a1828')
      .attr('stroke', c).attr('stroke-width', 0.8).attr('opacity', 0.4+i*0.2);
  });
  // Main shadow
  cg.append('rect').attr('x',3).attr('y',3).attr('width',CW).attr('height',CH)
    .attr('rx',7).attr('fill','rgba(0,0,0,0.5)');
  // Body — dashed border = collapsed indicator
  cg.append('rect').attr('class','coll-body')
    .attr('width',CW).attr('height',CH).attr('rx',7)
    .attr('fill','#0f1e33').attr('stroke',c).attr('stroke-width',1.8)
    .attr('stroke-dasharray','6,2');
  // Left accent bar
  cg.append('rect').attr('x',0).attr('y',0).attr('width',5).attr('height',CH)
    .attr('rx',3).attr('fill',c);
  // Health dot
  cg.append('circle').attr('cx',CW-11).attr('cy',11).attr('r',4)
    .attr('fill',hc).attr('opacity',0.9);
  // Count badge pill (top-right)
  const cnt = node._collCount;
  cg.append('rect').attr('x',CW-42).attr('y',4).attr('width',36).attr('height',14)
    .attr('rx',7).attr('fill',c).attr('opacity',0.2);
  cg.append('text').attr('x',CW-24).attr('y',14)
    .attr('text-anchor','middle').attr('font-size',9)
    .attr('font-family','IBM Plex Mono,monospace').attr('fill',c).attr('opacity',0.95)
    .attr('pointer-events','none').text(`×${cnt}`);
  // Type name (centre)
  const dispName = node.entity_name.length > 9 ? node.entity_name.slice(0,8)+'…' : node.entity_name;
  cg.append('text').attr('x',CW/2+2).attr('y',CH/2)
    .attr('text-anchor','middle').attr('font-size',12).attr('font-weight',600)
    .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
    .attr('pointer-events','none').text(dispName);
  // Expand hint below
  cg.append('text').attr('x',CW/2+2).attr('y',CH-7)
    .attr('text-anchor','middle').attr('font-size',8)
    .attr('font-family','IBM Plex Mono,monospace').attr('fill',c).attr('opacity',0.6)
    .attr('pointer-events','none').text('点击展开');
  // Health mini-bar (right edge)
  const barX=CW-9, barH=CH-18, barY=10, tot=node._collCount||1;
  let yOff=barY;
  [[node._collOk,'#00d68f'],[node._collWarn,'#ffcc00']].forEach(([v,col])=>{
    if(!v) return;
    const h=Math.max(3, barH*v/tot);
    cg.append('rect').attr('x',barX).attr('y',yOff).attr('width',4).attr('height',h)
      .attr('rx',2).attr('fill',col).attr('opacity',0.85);
    yOff+=h+1;
  });
  // Project badge
  const pcfg = PROJ_CONFIG[node.project_id];
  if(pcfg){
    appendProjectBadge(cg, {
      label: node.project_id,
      x: 6,
      y: CH - 14,
      maxWidth: Math.max(32, CW - 18),
      fill: pcfg.color,
      opacity: 0.15,
      fontSize: 7,
      minWidth: 30,
      height: 10
    });
  }

  // ── Drag ──────────────────────────────────────────────────────────────
  let _moved = false;
  cg.call(d3.drag()
    .on('start', (ev)=>{ _moved=false; d3.select(cg.node()).raise(); ev.sourceEvent.stopPropagation(); })
    .on('drag',  (ev,d)=>{
      _moved=true;
      d._x+=ev.dx; d._y+=ev.dy;
      d3.select(cg.node()).attr('transform',`translate(${d._x-CW/2},${d._y-CH/2})`);
      refreshEdges(d);
      refreshMinimap();
    })
  );

  // ── Click → expand ────────────────────────────────────────────────────
  cg.on('click', (ev,d) => {
    if(_moved){ _moved=false; return; }
    ev.stopPropagation();
    expandedGroups.add(d._collKey);
    visNodes.forEach(n=>{ n._x=undefined; n._y=undefined; });
    renderGraph(); buildSidebar(); updateStats();
    showNotif(`已展开 ${d.entity_type}（${d._collCount} 个实体）`);
  });

  // ── Tooltip ───────────────────────────────────────────────────────────
  cg.on('mousemove', (ev,d) => {
    const c2 = ETYPE_MAP[d.entity_type]||'#64748b';
    const tt = document.getElementById('tooltip');
    tt.innerHTML = `<div class="tt-name" style="color:${c2}">${d.entity_type} <span style="font-size:9px;opacity:.6">聚合</span></div>
      <div class="tt-row"><span class="tt-key">项目</span><span class="tt-val">${getProjectLabel(d, '—')}</span></div>
      <div class="tt-row"><span class="tt-key">节点数</span><span class="tt-val" style="color:${c2}">${d._collCount} 个</span></div>
      <div class="tt-row"><span class="tt-key">健康分布</span><span class="tt-val">
        <span style="color:var(--green)">${d._collOk}</span> / <span style="color:var(--yellow)">${d._collWarn}</span>
      </span></div>
      <div style="margin-top:4px;font-size:10px;color:var(--accent)">点击展开查看全部节点</div>`;
    tt.classList.add('visible');
    moveTooltip(ev);
  });
  cg.on('mouseleave', hideTooltip);
}

function isCrossProject(edge){
  const s = visNodes.find(n=>n.entity_id===edge.source_entity_id);
  const t = visNodes.find(n=>n.entity_id===edge.target_entity_id);
  if(!s||!t) return false;
  const sp = getProjectKey(s), tp = getProjectKey(t);
  return sp !== tp && sp !== 'global' && tp !== 'global';
}

function refreshEdges(movedNode){
  const activeNodes = window._dispNodes || visNodes;
  const activeNodeMap = Object.fromEntries(activeNodes.map(node => [node.entity_id, node]));
  // Re-draw edges (both normal and cross-project) connected to moved node
  g.selectAll('.edges path.edge-path, .cross-edges path.edge-path, .monitor-edges path.edge-path').each(function(d){
    const src = activeNodeMap[d.source_entity_id];
    const tgt = activeNodeMap[d.target_entity_id];
    if(!src||!tgt) return;
    if(src.entity_id !== movedNode.entity_id && tgt.entity_id !== movedNode.entity_id) return;
    const srcSize = getNormalNodeSize(src);
    const tgtSize = getNormalNodeSize(tgt);
    const geometry = buildFlowCurveGeometry(
      src._x + srcSize.width / 2,
      src._y,
      tgt._x - tgtSize.width / 2,
      tgt._y,
      (d._lane || 0) * 9,
      { labelLift: 9, minCp: 46, loopPad: 76 }
    );
    d3.select(this).attr('d', geometry.path);
  });
  // Re-position edge labels
  g.selectAll('.edges text.edge-label, .cross-edges text.edge-label, .monitor-edges text.edge-label').each(function(d){
    const src = activeNodeMap[d.source_entity_id];
    const tgt = activeNodeMap[d.target_entity_id];
    if(!src||!tgt) return;
    if(src.entity_id !== movedNode.entity_id && tgt.entity_id !== movedNode.entity_id) return;
    const srcSize = getNormalNodeSize(src);
    const tgtSize = getNormalNodeSize(tgt);
    const geometry = buildFlowCurveGeometry(
      src._x + srcSize.width / 2,
      src._y,
      tgt._x - tgtSize.width / 2,
      tgt._y,
      (d._lane || 0) * 9,
      { labelLift: 9, minCp: 46, loopPad: 76 }
    );
    d3.select(this).attr('x', geometry.labelX).attr('y', geometry.labelY);
  });
}

function highlightNode(nodeId){
  focusedNode = nodeId;
  const connected = new Set([nodeId]);
  visEdges.forEach(e => {
    if(e.source_entity_id===nodeId) connected.add(e.target_entity_id);
    if(e.target_entity_id===nodeId) connected.add(e.source_entity_id);
  });

  g.selectAll('.node-g').classed('dimmed', d => d && !connected.has(d.entity_id));
  g.selectAll('.edge-path').classed('dimmed', d => d && !(d.source_entity_id===nodeId||d.target_entity_id===nodeId));
  g.selectAll('.edge-path').classed('highlighted', d => d && (d.source_entity_id===nodeId||d.target_entity_id===nodeId));
}

function clearHighlight(){
  if(!g) return;
  focusedNode = null;
  g.selectAll('.node-g').classed('dimmed', false);
  g.selectAll('.edge-path').classed('dimmed', false);
  g.selectAll('.edge-path').classed('highlighted', false);
}

function refreshMinimap(){
  const mmSvg = d3.select('#minimap-svg');
  mmSvg.selectAll('*').remove();

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const mmW = 168, mmH = 106;
  const scaleX = mmW/W*0.88, scaleY = mmH/H*0.88;
  const sc = Math.min(scaleX, scaleY);
  const activeNodes = window._dispNodes || visNodes;
  const activeEdges = window._dispEdges || visEdges;
  const activeNodeMap = {};
  activeNodes.forEach(node => {
    activeNodeMap[node.entity_id || node.entityType] = node;
  });

  const mmG = mmSvg.append('g').attr('transform',`translate(4,4)`);

  activeEdges.forEach(e => {
    const src = activeNodeMap[e.source_entity_id || e.srcType];
    const tgt = activeNodeMap[e.target_entity_id || e.tgtType];
    if(!src||!tgt||!src._x||!tgt._x) return;
    mmG.append('line')
      .attr('x1',src._x*sc).attr('y1',src._y*sc)
      .attr('x2',tgt._x*sc).attr('y2',tgt._y*sc)
      .attr('stroke', RTYPE_MAP[e.relation_type]||'#334')
      .attr('stroke-width',0.5)
      .attr('opacity',0.4);
  });

  activeNodes.forEach(n => {
    if(!n._x) return;
    mmG.append('rect')
      .attr('x',n._x*sc-4).attr('y',n._y*sc-3)
      .attr('width',8).attr('height',5)
      .attr('rx',1)
      .attr('fill', ETYPE_MAP[n.entity_type]||'#334')
      .attr('opacity',0.7);
  });

  // Viewport
  const vx = -lastTransform.x/lastTransform.k*sc;
  const vy = -lastTransform.y/lastTransform.k*sc;
  const vw = W/lastTransform.k*sc;
  const vh = H/lastTransform.k*sc;
  mmSvg.append('rect')
    .attr('x',4+Math.max(0,vx)).attr('y',4+Math.max(0,vy))
    .attr('width',Math.min(mmW-8,Math.max(1,vw))).attr('height',Math.min(mmH-8,Math.max(1,vh)))
    .attr('fill','rgba(26,159,255,0.06)')
    .attr('stroke','#1a9fff')
    .attr('stroke-width',0.8);
}

  } else {
    const color = RTYPE_MAP[d.relation_type]||'#64748b';
    const ttSrc = (window._dispNodes||visNodes).find(n=>n.entity_id===d.source_entity_id);
    const ttTgt = (window._dispNodes||visNodes).find(n=>n.entity_id===d.target_entity_id);
    const srcName = ttSrc ? ttSrc.entity_name : d.source_entity_id;
    const tgtName = ttTgt ? ttTgt.entity_name : d.target_entity_id;
    const ttCross = ttSrc && ttTgt &&
      getProjectKey(ttSrc) !== getProjectKey(ttTgt) &&
      getProjectKey(ttSrc) !== 'global' && getProjectKey(ttTgt) !== 'global';

  moveTooltip(ev);

function fitView(){
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const activeNodes = window._dispNodes || visNodes;
  const bounds = activeNodes
    .filter(n => n && n._x !== undefined && n._y !== undefined)
    .map(n => {
      if(n.entityType !== undefined){
        return { minX: n._x - 70, maxX: n._x + 70, minY: n._y - 32, maxY: n._y + 32 };
      }
      const size = getNormalNodeSize(n);
      return {
        minX: n._x - size.width / 2,
        maxX: n._x + size.width / 2,
        minY: n._y - size.height / 2,
        maxY: n._y + size.height / 2
      };
    });
  if(!bounds.length) return;
  const minX=Math.min(...bounds.map(b => b.minX))-30;
  const maxX=Math.max(...bounds.map(b => b.maxX))+30;
  const minY=Math.min(...bounds.map(b => b.minY))-30;
  const maxY=Math.max(...bounds.map(b => b.maxY))+30;
  const sc = Math.min(0.95, Math.min(W/(maxX-minX), H/(maxY-minY)));
  const tx = W/2 - (minX+maxX)/2*sc;
  const ty = H/2 - (minY+maxY)/2*sc;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
}

function zoomBy(factor){
  svg.transition().duration(250).call(zoom.scaleBy, factor);
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}

function scrollToNode(node){
  if(!node._x||!node._y) return;
  const wrap = document.getElementById('canvas-wrap');
  const W=wrap.clientWidth, H=wrap.clientHeight;
  const tx = W/2 - node._x * lastTransform.k;
  const ty = H/2 - node._y * lastTransform.k;
  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(lastTransform.k));
}

function toggleLayout(){
  currentLayoutMode = currentLayoutMode==='hierarchical'?'force':'hierarchical';
  // Reset stored positions
  visNodes.forEach(n => { n._x = undefined; n._y = undefined; });
  renderGraph();
  showNotif(`已切换至${currentLayoutMode==='hierarchical'?'层次布局':'力导向布局'}`);

    html += '</div>';
  }

  html += `<div style="font-size:12px;color:var(--text3);margin-bottom:8px;font-family:'IBM Plex Mono'">实体分布</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">`;
  ETYPE_CONFIG.forEach(ec => {
    const cnt = (byType[ec.type]||[]).length;
    if(!cnt) return;
    const warnCnt = (byType[ec.type]||[]).filter(n => !isAlarmNode(n) && getHealthLevel(n)==='告警').length;
    html += `<div style="padding:6px 8px;background:rgba(0,0,0,0.2);border-radius:4px;font-size:11px">
      <span style="color:${ec.color}">${ec.type}</span>
      <span style="float:right;color:var(--text3)">${cnt}${warnCnt?` <span style="color:var(--yellow)">(${warnCnt}告警)</span>`:''}</span>
    </div>`;
  });
  html += '</div>';

  document.getElementById('analysis-body').innerHTML = html;
  document.getElementById('analysis-modal').classList.add('visible');
}

  document.getElementById('analysis-modal').classList.remove('visible');

//  INIT
// ============================================================

// ════════════════════════════════════════════════════════════════
//  SKILL 1 — 部署架构图
//  Layout: infrastructure layers stacked top→bottom
//    Layer 0 (top):    用户 / 域名上下文根   ← entry points
//    Layer 1:          API接口               ← gateway
//    Layer 2:          应用微服务             ← app tier
//    Layer 3:          中间件 / 数据库        ← data tier
//    Layer 4 (bottom): 计算资源              ← infra base
//  One band per project; nodes drawn as styled "server cards"
// ════════════════════════════════════════════════════════════════

function showDeployDiagram(){
  document.getElementById('deploy-panel').classList.add('visible');
  _renderDeployDiagram();
}

function _renderDeployDiagram(){
  // ── Project filter (same as main graph) ────────────────────────────────
  const selProjs = getSelectedProjects();
  const allNodes = rawData.nodes.filter(n =>
    !selProjs || n.project_id === 'global' || selProjs.includes(n.project_id)
  );
  const allNodeIds = new Set(allNodes.map(n => n.entity_id));
  const allRels = rawData.relations.filter(r =>
    allNodeIds.has(r.source_entity_id) && allNodeIds.has(r.target_entity_id)
  );

  // ── Layer definition ───────────────────────────────────────────────────
  const DEPLOY_LAYERS = [
    { label: '入口层',       types: ['用户','域名上下文根'], color: '#00e5ff' },
    { label: 'API 层',       types: ['API接口'],             color: '#1a9fff' },
    { label: '应用层',       types: ['应用微服务'],           color: '#4db8ff' },
    { label: '数据/中间件',  types: ['数据库','中间件'],      color: '#9d6fff' },
    { label: '基础设施',     types: ['计算资源','告警'],      color: '#ff8c33' },
  ];
  const typeToLayer = {};
  DEPLOY_LAYERS.forEach((l,i) => l.types.forEach(t => { typeToLayer[t] = i; }));

  // ── Collapse transform: (proj × type) groups exceeding threshold ────────
  // Key = "proj::type";  deployExpandedGroups holds manually-expanded keys
  const THRESH = SKILL_COLL_THRESH;
  const deployHiddenIds = new Set();
  const deployCollMap   = {};   // virtId -> collNode

  const projIds = [...new Set(
    allNodes.filter(n=>n.project_id&&n.project_id!=='global').map(n=>n.project_id)
  )].sort();

  // Collapse is driven by typeToLayer (the single source of truth).
  // This means: if a type has no layer mapping it is invisible, and if a layer
  // has types: [] it simply shows nothing — no fallback, no surprise nodes.
  projIds.forEach(proj => {
    // Collect all (type, layerIndex) pairs that are actually mapped
    Object.entries(typeToLayer).forEach(([type, li]) => {
      const grp = allNodes.filter(n => n.project_id === proj && n.entity_type === type);
      if(grp.length <= THRESH) return;
      const key = `${proj}::${type}`;
      if(deployExpandedGroups.has(key)) return;   // user expanded
      let ok=0,warn=0;
      grp.forEach(n=>{
        const level = getHealthLevel(n);
        if(level==='正常') ok++;
        else if(level==='告警') warn++;
      });
      const healthLevel = warn>0?'告警':'正常';
      const virtId = `DEPCOLL::${key}`;
      const vn = {
        entity_id: virtId, entity_name: type,
        entity_type: type, project_id: proj,
        health_status: healthLevel,
        health_level: healthLevel,
        _isDeplColl: true, _collKey: key, _collLayer: li,
        _collNodes: grp, _collCount: grp.length,
        _collOk:ok, _collWarn:warn, _collErr:0,
      };
      deployCollMap[virtId] = vn;
      grp.forEach(n => deployHiddenIds.add(n.entity_id));
    });
  });

  const nodes = [
    // Only real nodes whose type is explicitly mapped to a layer
    ...allNodes.filter(n => !deployHiddenIds.has(n.entity_id) && typeToLayer[n.entity_type] !== undefined),
    ...Object.values(deployCollMap),
  ];
  const dispIds = new Set(nodes.map(n=>n.entity_id));
  // Remap edges to virtual nodes, deduplicate
  const idToVirt = {};
  Object.values(deployCollMap).forEach(vn => vn._collNodes.forEach(n=>{ idToVirt[n.entity_id]=vn.entity_id; }));
  const edgeDedup = new Map();
  allRels.forEach(r => {
    const sid = idToVirt[r.source_entity_id] || r.source_entity_id;
    const tid = idToVirt[r.target_entity_id] || r.target_entity_id;
    if(!dispIds.has(sid)||!dispIds.has(tid)||sid===tid) return;
    const dk = `${sid}|${tid}|${r.relation_type}`;
    if(!edgeDedup.has(dk)) edgeDedup.set(dk, {...r, relation_id:`DD-${dk}`, source_entity_id:sid, target_entity_id:tid, _mc:0});
    edgeDedup.get(dk)._mc++;
  });
  const rels = Array.from(edgeDedup.values());

  // ── SVG setup ──────────────────────────────────────────────────────────
  const svg  = d3.select('#deploy-svg');
  const wrap = document.getElementById('deploy-canvas');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.attr('width', W).attr('height', H).selectAll('*').remove();

  // ── Card sizing ────────────────────────────────────────────────────────
  const CARD_W = 120, CARD_H = 46, CARD_GAP_X = 18, CARD_GAP_Y = 12;
  const LAYER_H = CARD_H + CARD_GAP_Y * 2 + 18;
  const PROJ_PAD = { top: 38, bottom: 20, left: 18, right: 18 };
  const PROJ_GAP = 28;

  const nodePos = {};
  const projLayouts = {};
  let projX = 60;

  projIds.forEach(proj => {
    const pnodes = nodes.filter(n=>n.project_id===proj);
    const byLayer = Array.from({length: DEPLOY_LAYERS.length}, ()=>[]);
    pnodes.forEach(n => {
      // Only place nodes that have an explicit layer mapping; skip unknowns entirely
      const li = n._isDeplColl ? n._collLayer : typeToLayer[n.entity_type];
      if(li === undefined) return;  // type not in any layer → do not render
      byLayer[li].push(n);
    });
    const maxCards = Math.max(...byLayer.map(a=>a.length), 1);
    const projW = maxCards*(CARD_W+CARD_GAP_X)-CARD_GAP_X + PROJ_PAD.left+PROJ_PAD.right;
    const projH = DEPLOY_LAYERS.length*LAYER_H + PROJ_PAD.top+PROJ_PAD.bottom;
    projLayouts[proj] = { x:projX, y:60, w:projW, h:projH, byLayer };
    byLayer.forEach((cards,li) => {
      const layerY = 60+PROJ_PAD.top+li*LAYER_H+CARD_GAP_Y;
      cards.forEach((n,ci) => {
        const cx = projX+PROJ_PAD.left+ci*(CARD_W+CARD_GAP_X);
        nodePos[n.entity_id] = { x:cx, y:layerY, w:CARD_W, h:CARD_H, layer:li, proj };
      });
    });
    projX += projW+PROJ_GAP;
  });

  const totalW = projX-PROJ_GAP+60;
  const totalH = Math.max(...Object.values(projLayouts).map(p=>p.y+p.h))+60;

  // ── Zoom ───────────────────────────────────────────────────────────────
  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.05,3]).on('zoom', ev=>g.attr('transform',ev.transform));
  svg.call(zoom);
  const initScale = Math.min((W-40)/totalW,(H-40)/totalH,1);
  svg.call(zoom.transform, d3.zoomIdentity
    .translate((W-totalW*initScale)/2,(H-totalH*initScale)/2).scale(initScale));

  // ── Defs ───────────────────────────────────────────────────────────────
  const defs = svg.append('defs');
  RTYPE_CONFIG.forEach(rc => {
    const mid = rc.type.replace(/\s/g,'_');
    defs.append('marker').attr('id',`dep-arrow-${mid}`)
      .attr('viewBox','0 -4 8 8').attr('refX',8).attr('refY',0)
      .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4Z').attr('fill',rc.color).attr('opacity',0.7);
  });

  // ── Project bands ──────────────────────────────────────────────────────
  projIds.forEach(proj => {
    const cfg = PROJ_CONFIG[proj]; if(!cfg) return;
    const pl = projLayouts[proj];
    g.append('rect').attr('x',pl.x-4).attr('y',pl.y-4)
      .attr('width',pl.w+8).attr('height',pl.h+8)
      .attr('rx',14).attr('fill',cfg.bgColor).attr('stroke',cfg.borderColor)
      .attr('stroke-width',1.5).attr('stroke-dasharray','6,3');
    g.append('text').attr('x',pl.x+pl.w/2).attr('y',pl.y+22)
      .attr('text-anchor','middle').attr('font-size',13).attr('font-weight',700)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill',cfg.color)
      .text(`${proj} · ${cfg.name}`);
    // Only draw layer rows that have at least one mapped type
    // (layers with types:[] are silently skipped)
    // Each layer row is a draggable group — dragging shifts ALL nodes in that (proj × layer)
    const activeLayers = DEPLOY_LAYERS.filter(ld => ld.types.some(t => typeToLayer[t] !== undefined));
    activeLayers.forEach((ld, _) => {
      const li   = DEPLOY_LAYERS.indexOf(ld);
      const ly   = pl.y + PROJ_PAD.top + li * LAYER_H;
      const rowW = pl.w - PROJ_PAD.left - PROJ_PAD.right + 12;

      // Wrap in a group so we can drag the entire row
      const rowG = g.append('g')
        .attr('class', `deploy-layer-row layer-${proj}-${li}`)
        .attr('transform', `translate(0,0)`)
        .style('cursor', 'ns-resize');   // vertical drag hint

      rowG.append('rect')
        .attr('x', pl.x + PROJ_PAD.left - 6).attr('y', ly)
        .attr('width', rowW).attr('height', LAYER_H - 4)
        .attr('rx', 6).attr('fill', `${ld.color}08`)
        .attr('stroke', `${ld.color}28`).attr('stroke-width', 0.8);

      // Drag handle label (left side)
      rowG.append('text')
        .attr('x', pl.x + PROJ_PAD.left - 2).attr('y', ly + LAYER_H/2 + 3)
        .attr('font-size', 9).attr('font-family', 'IBM Plex Mono,monospace')
        .attr('fill', ld.color).attr('opacity', 0.55).attr('pointer-events', 'none')
        .text('⠿ ' + ld.label);

      // Layer drag: moves all nodes in this (proj × layer) vertically
      let _layerDy = 0;
      rowG.call(
        d3.drag()
          .on('start', function(ev){
            _layerDy = 0;
            d3.select(this).raise();
            ev.sourceEvent.stopPropagation();
          })
          .on('drag', function(ev){
            _layerDy += ev.dy;
            // Move the row background visual
            d3.select(this).attr('transform', `translate(0,${_layerDy})`);
            // Move all nodes in this proj × layer
            const affectedIds = nodes
              .filter(n => n.project_id === proj && nodePos[n.entity_id] &&
                           nodePos[n.entity_id].layer === li)
              .map(n => n.entity_id);
            affectedIds.forEach(id => {
              const pos = nodePos[id];
              if(!pos) return;
              pos.y += ev.dy;
              // Update the node visual element position
              const el = g.select(`#dep-node-${id.replace(/[^a-zA-Z0-9]/g,'-')}`);
              if(!el.empty()) el.attr('transform', `translate(${pos.x},${pos.y})`);
              _refreshDeployEdges(id);
            });
          })
          .on('end', function(){
            // Snap the row background back (nodes already repositioned)
            d3.select(this).attr('transform', 'translate(0,0)');
          })
      );
    });
  });

  // ── Edge path helper (shared by draw + drag-refresh) ──────────────────
  function _deployEdgePath(sp, tp){
    const CW = CARD_W, CH = CARD_H;
    const sBottom  = sp.y + CH, tTop     = tp.y;
    const sCentreX = sp.x + CW/2, tCentreX = tp.x + CW/2;
    const sRight   = sp.x + CW,   tLeft    = tp.x;
    const sMidY    = sp.y + CH/2, tMidY    = tp.y + CH/2;
    const useVertical = sBottom <= tTop + CH * 0.4;
    if(useVertical){
      const my = (sBottom + tTop) / 2;
      return { d: `M${sCentreX},${sBottom} C${sCentreX},${my} ${tCentreX},${my} ${tCentreX},${tTop}`,
               lx: (sCentreX+tCentreX)/2, ly: my-4 };
    } else if(sRight > tLeft + 10){
      const bow = Math.max(50, Math.abs(sMidY-tMidY)*0.6+40);
      return { d: `M${sCentreX},${sp.y+CH} C${sCentreX},${sp.y+CH+bow} ${tCentreX},${tp.y+CH+bow} ${tCentreX},${tp.y+CH}`,
               lx: (sCentreX+tCentreX)/2, ly: sp.y+CH+bow*0.7 };
    } else {
      const cp = Math.max(40, Math.abs(tLeft-sRight)*0.45);
      return { d: `M${sRight},${sMidY} C${sRight+cp},${sMidY} ${tLeft-cp},${tMidY} ${tLeft},${tMidY}`,
               lx: (sRight+tLeft)/2, ly: (sMidY+tMidY)/2-5 };
    }
  }

  // ── Edge refresh after node/layer drag ─────────────────────────────────
  // nodePos entries are mutated in-place during drag; call this to re-path edges
  function _refreshDeployEdges(movedId){
    edgeG.selectAll('path.dep-edge').each(function(r){
      const sp = nodePos[r.source_entity_id], tp = nodePos[r.target_entity_id];
      if(!sp||!tp) return;
      if(r.source_entity_id !== movedId && r.target_entity_id !== movedId) return;
      const {d} = _deployEdgePath(sp, tp);
      d3.select(this).attr('d', d);
    });
    edgeG.selectAll('text.dep-edge-lbl').each(function(r){
      const sp = nodePos[r.source_entity_id], tp = nodePos[r.target_entity_id];
      if(!sp||!tp) return;
      if(r.source_entity_id !== movedId && r.target_entity_id !== movedId) return;
      const {lx, ly} = _deployEdgePath(sp, tp);
      d3.select(this).attr('x', lx).attr('y', ly);
    });
  }

  // Also expose a full-refresh variant (used by layer drag)
  function _refreshAllDeployEdges(){
    edgeG.selectAll('path.dep-edge').each(function(r){
      const sp = nodePos[r.source_entity_id], tp = nodePos[r.target_entity_id];
      if(!sp||!tp) return;
      const {d} = _deployEdgePath(sp, tp);
      d3.select(this).attr('d', d);
    });
    edgeG.selectAll('text.dep-edge-lbl').each(function(r){
      const sp = nodePos[r.source_entity_id], tp = nodePos[r.target_entity_id];
      if(!sp||!tp) return;
      const {lx, ly} = _deployEdgePath(sp, tp);
      d3.select(this).attr('x', lx).attr('y', ly);
    });
  }

  // ── Draw edges with flow animation ─────────────────────────────────────
  const edgeG = g.append('g').attr('class','deploy-edges');
  rels.forEach(r => {
    const sp = nodePos[r.source_entity_id], tp = nodePos[r.target_entity_id];
    if(!sp||!tp) return;
    const color    = RTYPE_MAP[r.relation_type]||'#4a6e8a';
    const markerId = `dep-arrow-${r.relation_type.replace(/\s/g,'_')}`;
    const {d, lx, ly} = _deployEdgePath(sp, tp);
    const lbl = r._mc>1 ? `${r.relation_type} ×${r._mc}` : r.relation_type;

    edgeG.append('path').datum(r)
      .attr('class','dep-edge')
      .attr('d', d)
      .attr('stroke', color).attr('stroke-width', r._mc>1 ? 2 : 1.4)
      .attr('stroke-opacity', 0.7).attr('fill','none')
      .attr('stroke-dasharray','8,4')
      .attr('class','dep-edge dep-edge-flow')
      .attr('marker-end', `url(#${markerId})`);

    edgeG.append('text').datum(r)
      .attr('class','dep-edge-lbl')
      .attr('x', lx).attr('y', ly)
      .attr('text-anchor','middle').attr('font-size', 8)
      .attr('font-family','IBM Plex Mono,monospace')
      .attr('fill', color).attr('opacity', 0.65)
      .attr('pointer-events','none').text(lbl);
  });

  // ── Draw helper: collapsed card ────────────────────────────────────────
  function _drawDeployCollCard(n, pos, ldColor){
    const ng = g.append('g').datum(n)
      .attr('class','dep-coll-card').attr('style','cursor:pointer')
      .attr('transform',`translate(${pos.x},${pos.y})`);
    // stack effect
    [-3,-1].forEach((off,i)=>{
      ng.append('rect').attr('x',3+off).attr('y',3+off).attr('width',CARD_W).attr('height',CARD_H)
        .attr('rx',6).attr('fill','#0a1828').attr('stroke',ldColor)
        .attr('stroke-width',0.7).attr('opacity',0.35+i*0.25);
    });
    ng.append('rect').attr('x',2).attr('y',2).attr('width',CARD_W).attr('height',CARD_H)
      .attr('rx',6).attr('fill','rgba(0,0,0,0.4)');
    ng.append('rect').attr('width',CARD_W).attr('height',CARD_H)
      .attr('rx',6).attr('fill','#0f1e33').attr('stroke',ldColor)
      .attr('stroke-width',1.6).attr('stroke-dasharray','6,2');
    ng.append('rect').attr('x',0).attr('y',0).attr('width',5).attr('height',CARD_H)
      .attr('rx',2).attr('fill',ldColor);
    const hc = getHealthColor(n);
    ng.append('circle').attr('cx',CARD_W-9).attr('cy',9).attr('r',3.5).attr('fill',hc).attr('opacity',0.9);
    // count badge
    ng.append('rect').attr('x',CARD_W-36).attr('y',3).attr('width',30).attr('height',13)
      .attr('rx',6).attr('fill',ldColor).attr('opacity',0.2);
    ng.append('text').attr('x',CARD_W-21).attr('y',13).attr('text-anchor','middle')
      .attr('font-size',9).attr('font-family','IBM Plex Mono,monospace')
      .attr('fill',ldColor).attr('opacity',0.95).attr('pointer-events','none')
      .text(`×${n._collCount}`);
    // health mini-bar
    const bx=CARD_W-8, bH=CARD_H-16, bY=8, tot=n._collCount||1; let yOff=bY;
    [[n._collOk,'#00d68f'],[n._collWarn,'#ffcc00']].forEach(([v,col])=>{
      if(!v)return; const h=Math.max(2,bH*v/tot);
      ng.append('rect').attr('x',bx).attr('y',yOff).attr('width',4).attr('height',h)
        .attr('rx',2).attr('fill',col).attr('opacity',0.85); yOff+=h+1;
    });
    const dname = n.entity_name.length>10?n.entity_name.slice(0,9)+'…':n.entity_name;
    ng.append('text').attr('x',CARD_W/2+2).attr('y',CARD_H/2-2)
      .attr('text-anchor','middle').attr('font-size',11).attr('font-weight',600)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
      .attr('pointer-events','none').text(dname);
    ng.append('text').attr('x',CARD_W/2+2).attr('y',CARD_H-7)
      .attr('text-anchor','middle').attr('font-size',8)
      .attr('font-family','IBM Plex Mono,monospace').attr('fill',ldColor).attr('opacity',0.6)
      .attr('pointer-events','none').text('点击展开');
    // click
    ng.on('click',(ev,d)=>{
      ev.stopPropagation();
      deployExpandedGroups.add(d._collKey);
      _renderDeployDiagram();
      showNotif(`已展开 ${d.entity_type}（${d._collCount} 个）`);
    });
    // tooltip
    ng.on('mousemove',(ev,d)=>{
      const tt=document.getElementById('tooltip');
      tt.innerHTML=`<div class="tt-name" style="color:${ldColor}">${d.entity_type} <span style="font-size:9px;opacity:.6">聚合</span></div>
        <div class="tt-row"><span class="tt-key">节点数</span><span class="tt-val" style="color:${ldColor}">${d._collCount}</span></div>
        <div class="tt-row"><span class="tt-key">健康</span><span class="tt-val">
          <span style="color:var(--green)">${d._collOk}</span>/
          <span style="color:var(--yellow)">${d._collWarn}</span></span></div>
        <div style="margin-top:4px;font-size:10px;color:var(--accent)">单击展开</div>`;
      tt.classList.add('visible'); moveTooltip(ev);
    }).on('mouseleave',hideTooltip);
  }

  // ── Draw node cards ────────────────────────────────────────────────────
  const nodeG = g.append('g').attr('class','deploy-nodes');
  nodes.forEach(n => {
    const pos = nodePos[n.entity_id]; if(!pos) return;
    const li   = pos.layer;
    const ld   = DEPLOY_LAYERS[li] || DEPLOY_LAYERS[DEPLOY_LAYERS.length-1];

    if(n._isDeplColl){ _drawDeployCollCard(n, pos, ld.color); return; }

    const hc   = getHealthColor(n);
    const strokeColor = getNodeStrokeColor(n);
    const nodeElemId = 'dep-node-' + n.entity_id.replace(/[^a-zA-Z0-9]/g,'-');
    const ng = nodeG.append('g').datum(n)
      .attr('id', nodeElemId)
      .attr('transform',`translate(${pos.x},${pos.y})`);
    ng.append('rect').attr('x',2).attr('y',2).attr('width',CARD_W).attr('height',CARD_H)
      .attr('rx',6).attr('fill','rgba(0,0,0,0.4)');
    ng.append('rect').attr('width',CARD_W).attr('height',CARD_H)
      .attr('rx',6).attr('fill','#0f1e33').attr('stroke',strokeColor).attr('stroke-width',1.2);
    ng.append('rect').attr('x',0).attr('y',0).attr('width',4).attr('height',CARD_H)
      .attr('rx',2).attr('fill',ld.color);
    ng.append('circle').attr('cx',CARD_W-9).attr('cy',9).attr('r',3.5).attr('fill',hc).attr('opacity',0.9);
    const dname = n.entity_name.length>12?n.entity_name.slice(0,11)+'…':n.entity_name;
    ng.append('text').attr('x',CARD_W/2+2).attr('y',CARD_H/2-2)
      .attr('text-anchor','middle').attr('font-size',11).attr('font-weight',600)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
      .attr('pointer-events','none').text(dname);
    ng.append('text').attr('x',CARD_W/2+2).attr('y',CARD_H-8)
      .attr('text-anchor','middle').attr('font-size',8)
      .attr('font-family','IBM Plex Mono,monospace').attr('fill',ld.color).attr('opacity',0.65)
      .attr('pointer-events','none').text(getNodeDisplayType(n));
    let detail='';
    if(n.internal_ip) detail=n.internal_ip;
    else if(n.host) detail=n.host;
    else if(n.replicas) detail=`×${n.replicas} replicas`;
    else if(n.product) detail=n.product;
    if(detail) ng.append('text').attr('x',6).attr('y',CARD_H-8)
      .attr('font-size',7).attr('font-family','IBM Plex Mono,monospace')
      .attr('fill',ld.color).attr('opacity',0.45).attr('pointer-events','none')
      .text(detail.length>14?detail.slice(0,13)+'…':detail);
    // ── Node drag ──────────────────────────────────────────────────────────
    let _ndMoved = false;
    ng.style('cursor','grab').call(
      d3.drag()
        .on('start', function(ev){
          _ndMoved = false;
          d3.select(this).raise().style('cursor','grabbing');
          ev.sourceEvent.stopPropagation();
        })
        .on('drag', function(ev, d){
          _ndMoved = true;
          const pos = nodePos[d.entity_id];
          if(!pos) return;
          pos.x += ev.dx;
          pos.y += ev.dy;
          d3.select(this).attr('transform',`translate(${pos.x},${pos.y})`);
          _refreshDeployEdges(d.entity_id);
        })
        .on('end', function(){ d3.select(this).style('cursor','grab'); })
    );

    ng.on('mousemove',(ev,d)=>{
      if(_ndMoved) return;
      const fields=[];
      if(d.host) fields.push(`主机: ${d.host}`);
      if(d.internal_ip) fields.push(`IP: ${d.internal_ip}`);
      if(d.replicas) fields.push(`副本: ${d.replicas}`);
      if(d.cpu_cores) fields.push(`CPU: ${d.cpu_cores}核`);
      if(d.memory_gb) fields.push(`内存: ${d.memory_gb}GB`);
      if(d.db_type)   fields.push(`DB: ${d.db_type}`);
      if(d.product)   fields.push(`产品: ${d.product}`);
      const hColor = getHealthColor(d, true);
      const statusRow = isAlarmNode(d)
        ? ''
        : `<div class="tt-row"><span class="tt-key">状态</span><span class="tt-val" style="color:${hColor}">${getHealthLabel(d)}</span></div>`;
      const tt=document.getElementById('tooltip');
      tt.innerHTML=`<div class="tt-name" style="color:${ld.color}">${d.entity_name}</div>
        <div class="tt-row"><span class="tt-key">类型</span><span class="tt-val">${getNodeDisplayType(d)}</span></div>
        ${statusRow}
        ${fields.map(f=>`<div class="tt-row"><span class="tt-val">${f}</span></div>`).join('')}`;
      tt.classList.add('visible'); moveTooltip(ev);
    }).on('mouseleave',hideTooltip);
  });

  // ── Legend ─────────────────────────────────────────────────────────────
  const legDiv = document.getElementById('deploy-legend');
  const collapsedCount = Object.keys(deployCollMap).length;
  // Legend only lists layers that have at least one mapped type
  const legendLayers = DEPLOY_LAYERS.filter(ld => ld.types.some(t => typeToLayer[t] !== undefined));
  legDiv.innerHTML = legendLayers.map(ld=>
    `<div class="skill-legend-item"><div class="skill-legend-dot" style="background:${ld.color}"></div>${ld.label}</div>`
  ).join('') +
  ['承载','负载均衡','调用'].map(rt=>{
    const col=RTYPE_MAP[rt]||'#555';
    return `<div class="skill-legend-item"><div class="skill-legend-line" style="background:${col}"></div>${rt}</div>`;
  }).join('') +
  (collapsedCount>0 ? `<button class="btn btn-default" style="margin-left:auto;font-size:10px;padding:2px 8px"
    onclick="deployExpandedGroups.clear();_renderDeployDiagram()">⊟ 收起全部</button>` :
    `<div style="margin-left:auto"></div>`) +
  `<div class="skill-legend-item">
    <div class="skill-legend-dot" style="background:#00d68f;border-radius:50%"></div>正常
    <div class="skill-legend-dot" style="background:#ffcc00;border-radius:50%;margin-left:6px"></div>告警
    <span style="margin-left:8px;color:var(--text3)">折叠阈值 ${THRESH}</span>
  </div>`;

  document.getElementById('deploy-subtitle').textContent =
    `${allNodes.length} 个节点 · ${allRels.length} 条关系 · ${projIds.length} 个项目` +
    (collapsedCount>0 ? ` · ${collapsedCount} 组已折叠` : '');
}

// ════════════════════════════════════════════════════════════════
//  SKILL 2 — 数据链路图
//  Shows how data flows from left (user) to right (storage)
//  across ALL projects simultaneously.
//  Columns = logical tiers (not projects); rows = individual nodes.
//  Edges drawn as animated flow paths with colour = relation type.
// ════════════════════════════════════════════════════════════════

function showDataFlowDiagram(){
  document.getElementById('dataflow-panel').classList.add('visible');
  _renderDataFlowDiagram();
}

function _renderDataFlowDiagram(){
  // ── Project filter ─────────────────────────────────────────────────────
  const selProjs = getSelectedProjects();
  const allNodes = rawData.nodes.filter(n =>
    !selProjs || n.project_id === 'global' || selProjs.includes(n.project_id)
  );
  const allNodeIds = new Set(allNodes.map(n => n.entity_id));
  const allRels = rawData.relations.filter(r =>
    allNodeIds.has(r.source_entity_id) && allNodeIds.has(r.target_entity_id)
  );

  // ── Tier definition ────────────────────────────────────────────────────
  const FLOW_TIERS = [
    { label: '用户入口', types: ['用户'],             color: '#00e5ff', icon: '👤' },
    { label: '访问入口', types: ['域名上下文根'],      color: '#1a9fff', icon: '🌐' },
    { label: 'API 网关', types: ['API接口'],          color: '#4db8ff', icon: '⚡' },
    { label: '业务服务', types: ['应用微服务'],        color: '#00d68f', icon: '⚙'  },
    { label: '数据存储', types: ['数据库','中间件'],   color: '#9d6fff', icon: '💾' },
    { label: '基础资源', types: ['计算资源'],          color: '#ff8c33', icon: '🖥'  },
    { label: '可观测性', types: ['告警'],              color: '#ff4040', icon: '🔔' },
  ];
  const typeToTier = {};
  FLOW_TIERS.forEach((t,i) => t.types.forEach(tp => { typeToTier[tp] = i; }));

  // ── Collapse transform: (tier × type) groups exceeding threshold ────────
  // Key = "ti::type";  dfExpandedGroups holds manually-expanded keys
  const THRESH = SKILL_COLL_THRESH;
  const dfHiddenIds = new Set();
  const dfCollMap   = {};   // virtId -> collNode

  FLOW_TIERS.forEach((td, ti) => {
    td.types.forEach(type => {
      const grp = allNodes.filter(n => n.entity_type === type);
      if(grp.length <= THRESH) return;
      const key = `${ti}::${type}`;
      if(dfExpandedGroups.has(key)) return;   // user expanded
      let ok=0,warn=0;
      grp.forEach(n=>{
        const level = getHealthLevel(n);
        if(level==='正常') ok++;
        else if(level==='告警') warn++;
      });
      const healthLevel = warn>0?'告警':'正常';
      const virtId = `DFCOLL::${key}`;
      const vn = {
        entity_id: virtId, entity_name: type,
        entity_type: type, project_id: null,
        health_status: healthLevel,
        health_level: healthLevel,
        _isDFColl: true, _collKey: key, _collTier: ti,
        _collNodes: grp, _collCount: grp.length,
        _collOk:ok, _collWarn:warn, _collErr:0,
      };
      dfCollMap[virtId] = vn;
      grp.forEach(n => dfHiddenIds.add(n.entity_id));
    });
  });

  const nodes = [
    ...allNodes.filter(n => !dfHiddenIds.has(n.entity_id)),
    ...Object.values(dfCollMap),
  ];
  const dispIds = new Set(nodes.map(n => n.entity_id));
  const idToVirt = {};
  Object.values(dfCollMap).forEach(vn => vn._collNodes.forEach(n => { idToVirt[n.entity_id] = vn.entity_id; }));
  const edgeDedup = new Map();
  allRels.forEach(r => {
    const sid = idToVirt[r.source_entity_id] || r.source_entity_id;
    const tid = idToVirt[r.target_entity_id] || r.target_entity_id;
    if(!dispIds.has(sid)||!dispIds.has(tid)||sid===tid) return;
    const dk = `${sid}|${tid}|${r.relation_type}`;
    if(!edgeDedup.has(dk)) edgeDedup.set(dk, {...r, relation_id:`DFE-${dk}`, source_entity_id:sid, target_entity_id:tid, _mc:0});
    edgeDedup.get(dk)._mc++;
  });
  const rels = Array.from(edgeDedup.values());

  // ── SVG setup ──────────────────────────────────────────────────────────
  if(!document.getElementById('df-keyframes')){
    const st = document.createElement('style'); st.id = 'df-keyframes';
    st.textContent = `@keyframes df-flow{from{stroke-dashoffset:24}to{stroke-dashoffset:0}} .df-edge{animation:df-flow 1.8s linear infinite}`;
    document.head.appendChild(st);
  }
  const svg  = d3.select('#dataflow-svg');
  const wrap = document.getElementById('dataflow-canvas');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  svg.attr('width',W).attr('height',H).selectAll('*').remove();

  // ── Sizing & layout ────────────────────────────────────────────────────
  const NODE_W=130, NODE_H=44, NODE_GAP_Y=10;
  const TIER_GAP=60, TIER_HEADER_H=36, PAD_TOP=20, PAD_LEFT=30;

  // Build display tier groups (virtual nodes go in their tier slot)
  const tierGroups = FLOW_TIERS.map(()=>[]);
  nodes.forEach(n => {
    const ti = n._isDFColl ? n._collTier : typeToTier[n.entity_type];
    if(ti !== undefined) tierGroups[ti].push(n);
  });
  tierGroups.forEach(grp => grp.sort((a,b)=>{
    if(getProjectKey(a)!==getProjectKey(b)) return getProjectKey(a).localeCompare(getProjectKey(b));
    return a.entity_name.localeCompare(b.entity_name);
  }));

  const tierX=[], tierW=NODE_W+20;
  const maxTierH = Math.max(...tierGroups.map(g=> TIER_HEADER_H+g.length*(NODE_H+NODE_GAP_Y)));
  let cx = PAD_LEFT+tierW/2;
  FLOW_TIERS.forEach((_,ti)=>{ tierX.push(cx); cx+=tierW+TIER_GAP; });
  const totalW = cx-TIER_GAP+PAD_LEFT;
  const totalH = PAD_TOP+maxTierH+40;

  const nodePos={};
  tierGroups.forEach((grp,ti)=>{
    const baseY=PAD_TOP+TIER_HEADER_H;
    grp.forEach((n,ri)=>{
      nodePos[n.entity_id]={ x:tierX[ti]-NODE_W/2, y:baseY+ri*(NODE_H+NODE_GAP_Y), tier:ti };
    });
  });

  // ── Zoom ───────────────────────────────────────────────────────────────
  const g = svg.append('g');
  const zoom=d3.zoom().scaleExtent([0.05,3]).on('zoom',ev=>g.attr('transform',ev.transform));
  svg.call(zoom);
  const initScale=Math.min((W-60)/totalW,(H-60)/totalH,0.95);
  svg.call(zoom.transform,d3.zoomIdentity
    .translate((W-totalW*initScale)/2+30,(H-totalH*initScale)/2).scale(initScale));

  // ── Defs ───────────────────────────────────────────────────────────────
  const defs=svg.append('defs');
  RTYPE_CONFIG.forEach(rc=>{
    const mid=rc.type.replace(/\s/g,'_');
    defs.append('marker').attr('id',`df-arrow-${mid}`)
      .attr('viewBox','0 -4 8 8').attr('refX',8).attr('refY',0)
      .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
      .append('path').attr('d','M0,-4L8,0L0,4Z').attr('fill',rc.color).attr('opacity',0.75);
  });

  // ── Tier column backgrounds ────────────────────────────────────────────
  const bgG=g.append('g');
  FLOW_TIERS.forEach((td,ti)=>{
    const colH=PAD_TOP+TIER_HEADER_H+tierGroups[ti].length*(NODE_H+NODE_GAP_Y)+20;
    const bx=tierX[ti]-tierW/2-8;
    bgG.append('rect').attr('x',bx).attr('y',PAD_TOP-8)
      .attr('width',tierW+16).attr('height',Math.max(colH,80))
      .attr('rx',10).attr('fill',`${td.color}07`).attr('stroke',`${td.color}22`).attr('stroke-width',1);
    bgG.append('rect').attr('x',tierX[ti]-56).attr('y',PAD_TOP)
      .attr('width',112).attr('height',26).attr('rx',13)
      .attr('fill',`${td.color}18`).attr('stroke',td.color).attr('stroke-width',0.8);
    bgG.append('text').attr('x',tierX[ti]).attr('y',PAD_TOP+17)
      .attr('text-anchor','middle').attr('font-size',11).attr('font-weight',700)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill',td.color)
      .text(`${td.icon} ${td.label}`);
  });

  // ── Flow edges ─────────────────────────────────────────────────────────
  const edgeG=g.append('g');
  rels.forEach(r=>{
    const sp=nodePos[r.source_entity_id], tp=nodePos[r.target_entity_id];
    if(!sp||!tp) return;
    const color=RTYPE_MAP[r.relation_type]||'#4a6e8a';
    const sx=sp.x+NODE_W, sy=sp.y+NODE_H/2, tx=tp.x, ty=tp.y+NODE_H/2;
    const isForward=tp.tier>=sp.tier;
    if(!isForward&&sp.tier-tp.tier>2) return;
    const cpX=(sx+tx)/2;
    const pw = isForward ? (r._mc>1?2.2:1.6) : 0.8;
    const path=edgeG.append('path')
      .attr('d',`M${sx},${sy} C${cpX},${sy} ${cpX},${ty} ${tx},${ty}`)
      .attr('stroke',color).attr('stroke-width',pw)
      .attr('stroke-opacity',isForward?0.55:0.25).attr('fill','none')
      .attr('stroke-dasharray',isForward?'8,4':'4,4')
      .attr('marker-end',`url(#df-arrow-${r.relation_type.replace(/\s/g,'_')})`);
    if(isForward) path.attr('class','df-edge');
    if(isForward){
      const lbl = r._mc>1 ? `${r.relation_type} ×${r._mc}` : r.relation_type;
      edgeG.append('text').attr('x',(sx+tx)/2).attr('y',(sy+ty)/2-5)
        .attr('text-anchor','middle').attr('font-size',8)
        .attr('font-family','Noto Sans SC,sans-serif')
        .attr('fill',color).attr('opacity',0.55).attr('pointer-events','none').text(lbl);
    }
  });

  // ── Draw helper: collapsed card ────────────────────────────────────────
  function _drawDFCollCard(n, pos, tdColor){
    const ng=g.append('g').datum(n)
      .attr('class','df-coll-card').attr('style','cursor:pointer')
      .attr('transform',`translate(${pos.x},${pos.y})`);
    [-3,-1].forEach((off,i)=>{
      ng.append('rect').attr('x',3+off).attr('y',3+off).attr('width',NODE_W).attr('height',NODE_H)
        .attr('rx',6).attr('fill','#0a1828').attr('stroke',tdColor)
        .attr('stroke-width',0.7).attr('opacity',0.35+i*0.25);
    });
    ng.append('rect').attr('x',2).attr('y',2).attr('width',NODE_W).attr('height',NODE_H)
      .attr('rx',6).attr('fill','rgba(0,0,0,0.4)');
    ng.append('rect').attr('width',NODE_W).attr('height',NODE_H)
      .attr('rx',6).attr('fill','#0f1e33').attr('stroke',tdColor)
      .attr('stroke-width',1.6).attr('stroke-dasharray','6,2');
    ng.append('rect').attr('x',0).attr('y',0).attr('width',5).attr('height',NODE_H)
      .attr('rx',2).attr('fill',tdColor);
    const hc = getHealthColor(n);
    ng.append('circle').attr('cx',NODE_W-9).attr('cy',9).attr('r',3.5).attr('fill',hc).attr('opacity',0.9);
    ng.append('rect').attr('x',NODE_W-36).attr('y',3).attr('width',30).attr('height',13)
      .attr('rx',6).attr('fill',tdColor).attr('opacity',0.2);
    ng.append('text').attr('x',NODE_W-21).attr('y',13).attr('text-anchor','middle')
      .attr('font-size',9).attr('font-family','IBM Plex Mono,monospace')
      .attr('fill',tdColor).attr('opacity',0.95).attr('pointer-events','none').text(`×${n._collCount}`);
    // health bar
    const bx=NODE_W-8, bH=NODE_H-16, bY=8, tot=n._collCount||1; let yOff=bY;
    [[n._collOk,'#00d68f'],[n._collWarn,'#ffcc00']].forEach(([v,col])=>{
      if(!v)return; const h=Math.max(2,bH*v/tot);
      ng.append('rect').attr('x',bx).attr('y',yOff).attr('width',4).attr('height',h)
        .attr('rx',2).attr('fill',col).attr('opacity',0.85); yOff+=h+1;
    });
    const dname=n.entity_name.length>11?n.entity_name.slice(0,10)+'…':n.entity_name;
    ng.append('text').attr('x',NODE_W/2+2).attr('y',NODE_H/2-1)
      .attr('text-anchor','middle').attr('font-size',11).attr('font-weight',600)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
      .attr('pointer-events','none').text(dname);
    ng.append('text').attr('x',NODE_W/2+2).attr('y',NODE_H-7)
      .attr('text-anchor','middle').attr('font-size',8)
      .attr('font-family','IBM Plex Mono,monospace').attr('fill',tdColor).attr('opacity',0.6)
      .attr('pointer-events','none').text('点击展开');
    ng.on('click',(ev,d)=>{
      ev.stopPropagation();
      dfExpandedGroups.add(d._collKey);
      _renderDataFlowDiagram();
      showNotif(`已展开 ${d.entity_type}（${d._collCount} 个）`);
    });
    ng.on('mousemove',(ev,d)=>{
      const tt=document.getElementById('tooltip');
      tt.innerHTML=`<div class="tt-name" style="color:${tdColor}">${d.entity_type} <span style="font-size:9px;opacity:.6">聚合</span></div>
        <div class="tt-row"><span class="tt-key">节点数</span><span class="tt-val" style="color:${tdColor}">${d._collCount}</span></div>
        <div class="tt-row"><span class="tt-key">健康</span><span class="tt-val">
          <span style="color:var(--green)">${d._collOk}</span>/
          <span style="color:var(--yellow)">${d._collWarn}</span></span></div>
        <div style="margin-top:4px;font-size:10px;color:var(--accent)">单击展开</div>`;
      tt.classList.add('visible'); moveTooltip(ev);
    }).on('mouseleave',hideTooltip);
  }

  // ── Draw nodes ─────────────────────────────────────────────────────────
  const nodeG=g.append('g');
  nodes.forEach(n=>{
    const pos=nodePos[n.entity_id]; if(!pos) return;
    const td=FLOW_TIERS[pos.tier];
    if(n._isDFColl){ _drawDFCollCard(n,pos,td.color); return; }

    const hc = getHealthColor(n);
    const strokeColor = getNodeStrokeColor(n);
    const pcfg=PROJ_CONFIG[n.project_id];
    const ng=nodeG.append('g').datum(n).attr('transform',`translate(${pos.x},${pos.y})`);
    ng.append('rect').attr('x',2).attr('y',2).attr('width',NODE_W).attr('height',NODE_H)
      .attr('rx',6).attr('fill','rgba(0,0,0,0.4)');
    ng.append('rect').attr('width',NODE_W).attr('height',NODE_H)
      .attr('rx',6).attr('fill','#0f1e33').attr('stroke',strokeColor).attr('stroke-width',1.3);
    ng.append('rect').attr('x',0).attr('y',0).attr('width',4).attr('height',NODE_H)
      .attr('rx',2).attr('fill',td.color);
    ng.append('circle').attr('cx',NODE_W-9).attr('cy',9).attr('r',3.5).attr('fill',hc).attr('opacity',0.9);
    if(pcfg){
      appendProjectBadge(ng, {
        label: n.project_id,
        x: 8,
        y: 4,
        maxWidth: Math.max(30, NODE_W - 28),
        fill: pcfg.color,
        opacity: 0.18,
        fontSize: 7,
        minWidth: 28,
        height: 11
      });
    }
    const dname = truncateTextByWidth(
      n.entity_name,
      Math.max(34, NODE_W - 26),
      '11px "Noto Sans SC", sans-serif'
    );
    const nameY = Math.min(NODE_H - 18, Math.max(23, Math.round(NODE_H * 0.54)));
    ng.append('text').attr('x',NODE_W/2+2).attr('y',nameY)
      .attr('text-anchor','middle').attr('font-size',11).attr('font-weight',600)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
      .attr('pointer-events','none').text(dname);
    const typeLabel = truncateTextByWidth(
      getNodeDisplayType(n),
      Math.max(28, NODE_W - 22),
      '8px "IBM Plex Mono", monospace'
    );

function getHealthLabel(item){
  if(item && typeof item === 'object'){
    if(isAlarmNode(item) || isRelationRecord(item)) return '';
    const explicit = item.health_text !== undefined && item.health_text !== null ? String(item.health_text).trim() : '';
    if(explicit && (explicit === '正常' || explicit === '告警')) return explicit;
    const fallback = item.health_status !== undefined && item.health_status !== null ? String(item.health_status).trim() : '';
    return fallback === '正常' || fallback === '告警' ? fallback : '';
  }
  const text = String(item || '').trim();
  return text === '正常' || text === '告警' ? text : '';
}

function isRelationRecord(item){
  if(!item || typeof item !== 'object') return false;
  return item.source_entity_id !== undefined && item.target_entity_id !== undefined;
}

function isAlarmNode(item){
  if(!item || typeof item !== 'object') return false;
  if(item.is_alarm_node === true) return true;
  const entityType = String(item.entity_type || '').trim();
  const resourceType = String(item.resource_type || '').trim().toLowerCase();
  return entityType === '告警' || resourceType === 'alarm';
}

function getAlarmCount(item){
  if(!item || typeof item !== 'object') return 0;
  const count = Number(item.alarm_count || 0);
  if(!Number.isFinite(count) || count <= 0) return 0;
  return Math.floor(count);
}

function getResourceHealthStats(nodes){
  const stats = { ok: 0, warn: 0, alarmNodes: 0 };
  (Array.isArray(nodes) ? nodes : []).forEach(node => {
    if(isAlarmNode(node)){
      stats.alarmNodes += 1;
      return;
    }
    const level = getHealthLevel(node);
    if(level === '告警') stats.warn += 1;
    else stats.ok += 1;
  });
  return stats;
}

function getNodeDisplayType(item){
  if(!item || typeof item !== 'object') return '-';
  const resourceType = String(item.resource_type || '').trim();
  if(resourceType) return resourceType;
  const entityType = String(item.entity_type || '').trim();
  return entityType || '-';
}

function getHealthLevel(item){
  if(isAlarmNode(item) || isRelationRecord(item)) return '';
  let text = '';
  if(item && typeof item === 'object'){
    if(item.health_level !== undefined && item.health_level !== null) text = String(item.health_level).trim();
    else if(item.health_status !== undefined && item.health_status !== null) text = String(item.health_status).trim();
  } else {
    text = String(item || '').trim();
  }
  if(!text) return '';
  const mapped = HEALTH_ALIAS[text.toLowerCase()] || HEALTH_ALIAS[text];
  return mapped === '正常' || mapped === '告警' ? mapped : '';
}

function getHealthTone(item){
  if(isAlarmNode(item)) return 'err';
  if(isRelationRecord(item)) return '';
  const level = getHealthLevel(item);
  if(level === '正常') return 'ok';
  if(level === '告警') return 'warn';
  return '';
}

function getHealthColor(item, useCssVar=false){
  if(isAlarmNode(item)){
    return useCssVar ? 'var(--red)' : '#ff4040';
  }
  const tone = getHealthTone(item);
  if(useCssVar){
    if(tone === 'ok') return 'var(--green)';
    if(tone === 'warn') return 'var(--yellow)';
    return 'var(--text3)';
  }
  if(tone === 'ok') return '#00d68f';
  if(tone === 'warn') return '#ffcc00';
  return '#64748b';
}

function getNodeStrokeColor(item){
  if(isAlarmNode(item)) return ETYPE_MAP['告警'] || '#ff4040';
  return getHealthColor(item);
}

async function fetchLiveJson(url){
  const target = String(url || '').trim();
  if(!target) throw new Error('missing live session url');
  const sep = target.includes('?') ? '&' : '?';
  const response = await fetch(`${target}${sep}_=${Date.now()}`, { cache: 'no-store' });
  if(!response.ok){
    throw new Error(`HTTP ${response.status}`);
  }
  return response.json();
}
