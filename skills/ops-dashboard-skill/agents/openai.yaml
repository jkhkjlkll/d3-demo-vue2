interface:
  display_name: "运维图谱看板 Skill"
  short_description: "执行本地运维图谱脚本并返回生成后的 HTML 路径和 URL，支持 API、MCP JSON、mock 三种数据源。"
  default_prompt: "使用 $ops-dashboard-skill 时，必须执行 `python3 scripts/run_ops_dashboard.py`。支持通过 `--api-url` 或 `--input-json`（MCP 预取后写入本地 JSON）提供数据源。必须使用内置 HTML 模板，不能手写替代页面，并返回脚本输出中的准确 htmlPath 和 url。"
