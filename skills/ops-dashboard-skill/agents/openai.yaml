interface:
  display_name: "运维图谱看板 Skill"
  short_description: "读取 agent 提供的 MCP JSON 输入，优先直接使用 MCP 返回的原始文件路径，并基于内置 HTML 模板生成或更新运维图谱看板。"
  default_prompt: "使用 $ops-dashboard-skill 生成或更新运维图谱看板。严格按 SKILL.md 执行 MCP 工作流；脚本参数 `--prompt` 必须传用户这一次的最新原话，绝不能传本 skill 的 `default_prompt` 或技能说明文本。优先直接把 MCP 返回的原始文件路径传给 `--input-json`；只有 MCP 只返回纯 JSON 文本、没有可直接读取的文件时，才写 `./runtime/mcp-input.json`。页面上的 health 只由资源是否通过 `relations` 关联到 `resource_type=alarm` 的节点决定，不能再从 `lifecycle_state`、`health` 或 `health_status` 推导。"
