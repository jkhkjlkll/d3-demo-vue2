interface:
  display_name: "运维图谱看板 Skill"
  short_description: "读取 agent 先写入的 MCP JSON，并基于内置 HTML 模板生成或更新运维图谱看板。"
  default_prompt: "使用 $ops-dashboard-skill 时，只允许走 MCP 工作流。先由 agent 调用内置 MCP 工具，使用 `server=ges_mcp_server`、`tool=query_ges`，并传入 `appId` 与 `resourceType`；如果 `query_ges` 已直接返回符合 schema 的 JSON 文本，就把那段文本原样写到 `skills/ops-dashboard-skill/runtime/mcp-input.json`，不要再二次拼装、pretty-print 或 PowerShell 重写。如果宿主 file tool 对覆盖写有限制，且该文件已存在，必须先对 `skills/ops-dashboard-skill/runtime/mcp-input.json` 执行 read，再覆盖写入同一路径；如果文件不存在则直接创建。若宿主仍无法稳定写入固定路径，直接报告真实写入失败，不要编造或重试另一套大 JSON。最后执行 `python3 scripts/run_ops_dashboard.py --input-json ./runtime/mcp-input.json --prompt \"<用户原话>\"`。不能改走 API，不能使用 mock，不能手写替代 HTML，最终必须返回脚本输出中的准确 htmlPath 和 url。"
