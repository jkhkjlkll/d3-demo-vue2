<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__DASHBOARD_TITLE__</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

:root {
  --bg: #060b14;
  --bg1: #091120;
  --bg2: #0c1628;
  --panel: #0f1e33;
  --panel2: #152540;
  --panel3: #1a2d4a;
  --border: #1e3554;
  --border2: #234065;
  --border3: #2a4d78;
  --accent: #1a9fff;
  --accent2: #4db8ff;
  --accent3: #80d0ff;
  --green: #00d68f;
  --green2: #00ff9d;
  --yellow: #ffcc00;
  --yellow2: #ffe033;
  --red: #ff4040;
  --red2: #ff6666;
  --purple: #9d6fff;
  --orange: #ff8c33;
  --cyan: #00e5ff;
  --text: #cce4ff;
  --text2: #7fa8cc;
  --text3: #4a6e8a;
  --text4: #2d4a60;

  /* Entity type colors */
  --c-user: #4db8ff;
  --c-svc: #00d68f;
  --c-db: #ffcc00;
  --c-mw: #9d6fff;
  --c-api: #ff8c33;
  --c-compute: #7fa8cc;
  --c-alert: #ff4040;
  --c-domain: #00e5ff;

  /* Relation colors */
  --r-access: #4db8ff;
  --r-call: #00d68f;
  --r-lb: #9d6fff;
  --r-host: #7fa8cc;
  --r-monitor: #ff4040;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  display: flex;
  flex-direction: column;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ===== HEADER ===== */
.header {
  height: 48px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent2);
  letter-spacing: -0.01em;
  white-space: nowrap;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.header-divider { width: 1px; height: 20px; background: var(--border2); }
.header-subtitle { font-size: 12px; color: var(--text3); font-family: 'IBM Plex Mono'; }
.header-badges { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.badge {
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-family: 'IBM Plex Mono';
  letter-spacing: 0.02em;
}
.badge-blue { background: rgba(26,159,255,0.12); color: var(--accent2); border: 1px solid rgba(26,159,255,0.25); }
.badge-green { background: rgba(0,214,143,0.12); color: var(--green); border: 1px solid rgba(0,214,143,0.25); }
.badge-yellow { background: rgba(255,204,0,0.12); color: var(--yellow); border: 1px solid rgba(255,204,0,0.25); }
.badge-red { background: rgba(255,64,64,0.12); color: var(--red); border: 1px solid rgba(255,64,64,0.25); }
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse-glow 2s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
  50% { opacity: 0.5; box-shadow: 0 0 2px var(--green); }
}

/* ===== TOOLBAR ===== */
.toolbar {
  height: 46px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 10px;
  flex-shrink: 0;
  overflow-x: auto;
}
.toolbar::-webkit-scrollbar { height: 0; }
.tb-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.tb-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
.tb-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.tb-spacer { flex: 1; }

select, .search-input {
  background: var(--panel);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  height: 28px;
}
select:focus, .search-input:focus { border-color: var(--accent); background: var(--panel2); }
select option { background: var(--panel2); color: var(--text); }

.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-icon {
  position: absolute;
  left: 8px;
  color: var(--text3);
  font-size: 11px;
  pointer-events: none;
}
.search-input { padding-left: 24px; width: 160px; }

.btn {
  height: 28px;
  padding: 0 12px;
  border-radius: 4px;
  border: 1px solid var(--border2);
  cursor: pointer;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-default { background: var(--panel); color: var(--text2); }
.btn-default:hover { background: var(--panel2); color: var(--text); border-color: var(--accent); }
.btn-primary { background: rgba(26,159,255,0.15); color: var(--accent2); border-color: rgba(26,159,255,0.35); }
.btn-primary:hover { background: rgba(26,159,255,0.25); }
.btn-danger { background: rgba(255,64,64,0.12); color: var(--red2); border-color: rgba(255,64,64,0.3); }
.btn-danger:hover { background: rgba(255,64,64,0.2); }
.btn-active { background: rgba(0,214,143,0.12); color: var(--green); border-color: rgba(0,214,143,0.3); }

/* ===== MAIN LAYOUT ===== */
.main { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ===== LEFT SIDEBAR ===== */
.sidebar {
  width: 250px;
  flex-shrink: 0;
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-family: 'IBM Plex Mono';
}
.sidebar-count {
  font-size: 11px;
  color: var(--text3);
  font-family: 'IBM Plex Mono';
}
.sidebar-body { flex: 1; overflow-y: auto; }

/* Entity type group */
.etype-group { border-bottom: 1px solid var(--border); }
.etype-header {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.etype-header:hover { background: var(--panel); }
.etype-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.etype-name { font-size: 12px; flex: 1; }
.etype-num { font-size: 10px; font-family: 'IBM Plex Mono'; color: var(--text3); }
.etype-arrow { font-size: 9px; color: var(--text4); transition: transform 0.18s; }
.etype-arrow.open { transform: rotate(90deg); }

.entity-list { display: none; padding: 2px 0; }
.entity-list.open { display: block; }

.entity-row {
  padding: 5px 12px 5px 28px;
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  transition: background 0.12s;
  font-size: 11px;
  color: var(--text2);
}
.entity-row:hover { background: rgba(26,159,255,0.06); color: var(--text); }
.entity-row.active { background: rgba(26,159,255,0.1); color: var(--accent2); }

.health-indicator {
  width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
}
.hi-ok { background: var(--green); box-shadow: 0 0 4px var(--green); }
.hi-warn { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }
.hi-err { background: var(--red); box-shadow: 0 0 4px var(--red); }

.entity-row-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.entity-row-proj { font-size: 9px; color: var(--text4); font-family: 'IBM Plex Mono'; flex-shrink: 0; }

/* ===== CANVAS AREA ===== */
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}
.canvas-wrap::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: 
    radial-gradient(circle 600px at 15% 30%, rgba(26,159,255,0.03) 0%, transparent 70%),
    radial-gradient(circle 400px at 85% 70%, rgba(157,111,255,0.025) 0%, transparent 70%);
  pointer-events: none;
}

/* Grid dots background */
.canvas-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(30,53,84,0.8) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  opacity: 0.4;
}

#graph-svg { width: 100%; height: 100%; display: block; }

/* Canvas controls */
.canvas-controls {
  position: absolute;
  bottom: 18px;
  right: 18px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  z-index: 10;
}
.cc-btn {
  width: 30px; height: 30px;
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 15px;
  font-weight: 600;
  transition: all 0.12s;
  user-select: none;
}
.cc-btn:hover { background: var(--panel2); color: var(--accent2); border-color: var(--accent); }

/* Minimap */
.minimap-wrap {
  position: absolute;
  bottom: 18px;
  left: 260px;
  width: 168px;
  height: 106px;
  background: rgba(9,17,32,0.9);
  border: 1px solid var(--border2);
  border-radius: 6px;
  overflow: hidden;
  z-index: 10;
  backdrop-filter: blur(4px);
}
.minimap-label {
  position: absolute;
  top: 4px;
  left: 6px;
  font-size: 9px;
  font-family: 'IBM Plex Mono';
  color: var(--text4);
  pointer-events: none;
  z-index: 1;
}
#minimap-svg { width: 100%; height: 100%; }

/* Stats bar */
.stats-bar {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid var(--border2);
  z-index: 10;
}
.stat-item {
  padding: 5px 14px;
  background: var(--panel);
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'IBM Plex Mono';
}
.stat-label { color: var(--text3); }
.stat-val { color: var(--text); font-weight: 500; }

/* ===== RIGHT DETAIL PANEL ===== */
.detail-panel {
  width: 0;
  flex-shrink: 0;
  background: var(--bg1);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
}
.detail-panel.open { width: 280px; }
.detail-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.detail-title-bar { display: flex; align-items: center; gap: 7px; }
.detail-type-dot { width: 10px; height: 10px; border-radius: 2px; }
.detail-title-text { font-size: 13px; font-weight: 500; }
.detail-close { cursor: pointer; color: var(--text3); font-size: 14px; transition: color 0.12s; }
.detail-close:hover { color: var(--text); }
.detail-body { flex: 1; overflow-y: auto; padding: 0; }
.detail-section { border-bottom: 1px solid var(--border); }
.detail-section-title {
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  font-family: 'IBM Plex Mono';
  background: rgba(0,0,0,0.15);
}
.detail-row {
  display: flex;
  align-items: flex-start;
  padding: 5px 14px;
  gap: 8px;
  border-bottom: 1px solid rgba(30,53,84,0.5);
}
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 11px; color: var(--text3); min-width: 80px; flex-shrink: 0; padding-top: 1px; }
.detail-val { font-size: 11px; color: var(--text); font-family: 'IBM Plex Mono'; word-break: break-all; }
.detail-val.ok { color: var(--green); }
.detail-val.warn { color: var(--yellow); }
.detail-val.err { color: var(--red); }

/* ===== TOOLTIP ===== */
.tooltip-el {
  position: fixed;
  background: var(--panel2);
  border: 1px solid var(--border3);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 11px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 9999;
  max-width: 240px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(26,159,255,0.08);
  backdrop-filter: blur(8px);
}
.tooltip-el.visible { opacity: 1; }
.tt-name { font-weight: 600; color: var(--accent2); margin-bottom: 7px; font-size: 12px; }
.tt-row { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 3px; }
.tt-key { color: var(--text3); }
.tt-val { color: var(--text); font-family: 'IBM Plex Mono'; }

/* ===== LEGEND ===== */
.legend-wrap {
  position: absolute;
  top: 14px;
  right: 14px;
  background: rgba(9,17,32,0.88);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px 12px;
  z-index: 10;
  backdrop-filter: blur(6px);
}
.legend-title { font-size: 9px; font-family: 'IBM Plex Mono'; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
.legend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.legend-swatch { width: 12px; height: 8px; border-radius: 2px; }
.legend-label { font-size: 11px; color: var(--text2); }
.legend-sep { height: 1px; background: var(--border); margin: 6px 0; }

/* ===== STATUS BAR ===== */
.statusbar {
  height: 24px;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 18px;
  flex-shrink: 0;
}
.sb-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-family: 'IBM Plex Mono'; color: var(--text3); }
.sb-val { color: var(--text2); }
.sb-spacer { flex: 1; }
.sb-time { color: var(--text4); }

/* ===== D3 NODE STYLES ===== */
.node-g { cursor: pointer; }
.node-shadow { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
.node-body {
  rx: 5;
  ry: 5;
  transition: filter 0.2s;
}
.node-g:hover .node-body { filter: brightness(1.25); }
.node-g.selected .node-body { filter: brightness(1.3) drop-shadow(0 0 10px currentColor); }
.node-g.dimmed { opacity: 0.18; }

.edge-path { fill: none; transition: stroke-opacity 0.2s, stroke-width 0.2s; }
.edge-path.dimmed { stroke-opacity: 0.03 !important; }
.edge-path.highlighted { stroke-opacity: 0.92 !important; stroke-width: 2px !important; }
.edge-path.edge-cross { stroke-opacity: 0.28; }
.edge-path.edge-thin { stroke-width: 1.1px; }
.edge-label { opacity: 0; transition: opacity 0.15s; }
.edge-label.edge-label-active { opacity: 0.9; }
/* ── AGGREGATE MODE ──────────────────────────────────── */
.agg-node-g { cursor: pointer; }
.agg-node-g:hover .agg-body { filter: brightness(1.3); }
.agg-mode-active #agg-toggle-btn { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Aggregate edge label pill */
.agg-edge-pill { pointer-events: none; opacity: 0; transition: opacity 0.15s; }
.agg-edge-pill.visible { opacity: 0.9; }

/* ── ENTITY LIST DRAWER (slides in from left over sidebar) ───────────── */
.entity-drawer {
  position: absolute;
  top: 0; left: 0;
  width: 260px; height: 100%;
  background: var(--panel);
  border-right: 1px solid var(--border3);
  z-index: 500;
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  box-shadow: 4px 0 20px rgba(0,0,0,0.4);
}
.entity-drawer.open { transform: translateX(0); }
.entity-drawer-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.entity-drawer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.entity-drawer-title { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
.entity-drawer-count { font-size: 11px; color: var(--text3); }
.entity-drawer-close {
  width:22px; height:22px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text3); font-size:14px; border-radius:4px;
  transition: background 0.15s, color 0.15s;
}
.entity-drawer-close:hover { background:rgba(255,64,64,0.15); color:var(--red); }
.entity-drawer-body { flex:1; overflow-y:auto; padding:8px 0; }
.drawer-entity-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer;
  transition: background 0.12s;
  border-left: 3px solid transparent;
}
.drawer-entity-row:hover { background: rgba(26,159,255,0.08); }
.drawer-entity-row.active { background: rgba(26,159,255,0.12); border-left-color: var(--accent); }
.drawer-entity-row .der-name { font-size: 12px; color: var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.drawer-entity-row .der-proj { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; flex-shrink:0; }
.drawer-entity-row .der-health { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.der-health.ok { background: var(--green); }
.der-health.warn { background: var(--yellow); }
.der-health.err { background: var(--red); }
.drawer-rel-section { padding: 6px 14px 4px; border-top: 1px solid var(--border); margin-top: 4px; }
.drawer-rel-title { font-size: 10px; color: var(--text3); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.05em; margin-bottom: 6px; }
.drawer-rel-row {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 0; cursor: pointer; font-size: 11px; color: var(--text2);
  transition: color 0.12s;
}
.drawer-rel-row:hover { color: var(--text); }
.drawer-rel-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-family: 'IBM Plex Mono', monospace; flex-shrink:0; }

/* Subgraph mode breadcrumb */
.breadcrumb-bar {
  display: none; align-items: center; gap: 6px;
  padding: 5px 14px; background: rgba(26,159,255,0.07);
  border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text3);
  flex-shrink: 0;
}
.breadcrumb-bar.visible { display: flex; }
.breadcrumb-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
.breadcrumb-link:hover { color: var(--accent2); }
/* All edges flow — both normal and cross-project */
/* Collapsed group node in normal view */
.coll-node-g { cursor:pointer; }
.coll-node-g:hover .coll-body { filter:brightness(1.25); }


/* ══════════════════════════════════════════════════════════════
   SKILL PANELS — 部署架构图 & 数据链路图
   Full-screen overlay with its own SVG canvas
   ══════════════════════════════════════════════════════════════ */
.skill-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 2000;
  background: var(--bg);
  flex-direction: column;
}
.skill-overlay.visible { display: flex; }

.skill-topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px;
  background: var(--bg1);
  border-bottom: 1px solid var(--border3);
  flex-shrink: 0;
}
.skill-topbar-title {
  font-size: 14px; font-weight: 700; color: var(--text);
  font-family: 'Noto Sans SC', sans-serif; flex: 1;
}
.skill-topbar-sub {
  font-size: 11px; color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
}
.skill-topbar .btn { flex-shrink: 0; }

.skill-canvas {
  flex: 1; overflow: hidden; position: relative;
}
.skill-canvas svg { width: 100%; height: 100%; }

/* Legend strip at bottom */
.skill-legend {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 7px 18px;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.skill-legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text3);
  font-family: 'IBM Plex Mono', monospace;
}
.skill-legend-dot {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
}
.skill-legend-line {
  width: 22px; height: 2px; flex-shrink: 0; border-radius: 1px;
}
.edge-path.edge-flow { animation: edge-flow 2.4s linear infinite; }
.dep-edge-flow { animation: dep-flow 2s linear infinite; }
@keyframes dep-flow { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
@keyframes edge-flow { to { stroke-dashoffset: -24; } }
/* Health-based dash patterns set inline; flowing animation works on top */

.project-bg { pointer-events: none; }

/* ===== CONTEXT MENU ===== */
.ctx-menu {
  position: fixed;
  background: var(--panel2);
  border: 1px solid var(--border3);
  border-radius: 6px;
  padding: 4px 0;
  z-index: 9990;
  min-width: 150px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  display: none;
}
.ctx-menu.visible { display: block; }
.ctx-item {
  padding: 7px 14px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: background 0.1s;
}
.ctx-item:hover { background: rgba(26,159,255,0.1); color: var(--text); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 9900;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: var(--panel);
  border: 1px solid var(--border3);
  border-radius: 10px;
  padding: 24px 28px;
  max-width: 500px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.modal-title { font-size: 16px; font-weight: 600; color: var(--accent2); margin-bottom: 16px; }
.modal-body { font-size: 13px; color: var(--text2); line-height: 1.7; }
.modal-footer { margin-top: 20px; display: flex; justify-content: flex-end; gap: 8px; }

/* ===== NOTIFICATION ===== */
.notif {
  position: fixed;
  top: 60px;
  right: 14px;
  background: var(--panel2);
  border: 1px solid var(--green);
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--green);
  z-index: 9999;
  opacity: 0;
  transform: translateX(20px);
  transition: all 0.25s;
  pointer-events: none;
  max-width: 260px;
}
.notif.show { opacity: 1; transform: translateX(0); }
.notif.warn { color: var(--yellow); border-color: var(--yellow); }
.notif.err { color: var(--red); border-color: var(--red); }

/* Project multi-select styling */
#proj-select { height: 28px; min-width: 120px; }
</style>
</head>

<script>
// ============================================================
//  ╔══════════════════════════════════════════════════════════╗
//  ║  GRAPH_DATA  —  唯一数据入口，可直接替换此 JSON 更新图谱  ║
//  ║                                                          ║
//  ║  结构说明：                                              ║
//  ║  • nodes[]:    实体节点列表（必填字段见下方说明）         ║
//  ║  • relations[]: 关系边列表（必填字段见下方说明）          ║
//  ║                                                          ║
//  ║  nodes 必填字段：                                        ║
//  ║    entity_id        唯一标识                             ║
//  ║    entity_name      显示名称                             ║
//  ║    entity_type      类型（见 ETYPE_CONFIG）              ║
//  ║    project_id       所属项目（global=全局节点）          ║
//  ║    health_status    正常 | 告警 | 异常                   ║
//  ║    created_at       创建时间                             ║
//  ║    updated_at       更新时间                             ║
//  ║                                                          ║
//  ║  relations 必填字段：                                    ║
//  ║    relation_id      唯一标识                             ║
//  ║    relation_type    类型（见 RTYPE_CONFIG）              ║
//  ║    source_entity_id 源端 entity_id                       ║
//  ║    target_entity_id 目标端 entity_id                     ║
//  ║    health_status    正常 | 告警 | 异常                   ║
//  ║    created_at       创建时间                             ║
//  ║    updated_at       更新时间                             ║
//  ╚══════════════════════════════════════════════════════════╝
// ============================================================

let GRAPH_DATA = __GRAPH_DATA_JSON__;


// ============================================================
//  ╔══════════════════════════════════════════════════════════╗
//  ║  APP_CONFIG  —  图谱配置入口，替换此处即可快速调整项目   ║
//  ║              实体类型、关系类型和布局参数                ║
//  ╚══════════════════════════════════════════════════════════╝
//
//  sections:
//    projects   → 项目 ID / 名称 / 主色 / 背景色 / 边框色
//                 新增项目：在此数组追加一项，GRAPH_DATA 即可引用该 project_id
//    entityTypes → 实体节点类型及颜色（对应 GRAPH_DATA.nodes[].entity_type）
//                  顺序即图谱从左到右的层次顺序
//    relationTypes → 关系边类型及颜色（对应 GRAPH_DATA.relations[].relation_type）
//    layout     → 节点尺寸、间距、行带间隔等布局参数（单位：像素）
//    healthStates → 健康状态随机刷新时的权重池（正常概率更高）
// ============================================================

let APP_CONFIG = __APP_CONFIG_JSON__;
let SKILL_STATE = __SKILL_STATE_JSON__;
const DEFAULT_SKILL_FILTERS = {
  project: 'all',
  entityType: 'all',
  relationType: 'all',
  health: 'all',
  keyword: ''
};

// ── Derived runtime constants — rebuilt whenever live session state changes ──
let PROJ_CONFIG = {};
let ETYPE_CONFIG = [];
let RTYPE_CONFIG = [];
let LAYER_ORDER = [];
let HEALTH_LIST = [];
let ETYPE_MAP = {};
let RTYPE_MAP = {};
let NODE_W = 118;
let NODE_H = 42;
let NODE_V_GAP = 22;
let BAND_MARGIN_V = 28;
let BAND_GAP = 56;
let CANVAS_TOP = 54;
let COL_SPAN = 168;
let MARGIN_L = 90;
let COLLAPSE_THRESHOLD = 20;
let SKILL_COLL_THRESH = 10;
let CELL_H = NODE_H + NODE_V_GAP;
let PROJS = [];
let APP_ALIAS_MAP = {};
let liveSessionError = '';
let liveSessionBusy = false;
let liveSessionPollTimer = null;
let liveSessionVersion = 0;
let liveSessionDataVersion = 0;

function cloneJson(value){
  return JSON.parse(JSON.stringify(value || {}));
}

function normalizeGraphDataShape(value){
  const graph = value && typeof value === 'object' ? value : {};
  return {
    nodes: Array.isArray(graph.nodes) ? graph.nodes : [],
    relations: Array.isArray(graph.relations) ? graph.relations : []
  };
}

function rebuildRuntimeConfig(){
  const safeGraph = normalizeGraphDataShape(GRAPH_DATA);
  const safeConfig = APP_CONFIG && typeof APP_CONFIG === 'object' ? APP_CONFIG : {};
  const safeProjects = Array.isArray(safeConfig.projects) ? safeConfig.projects : [];
  const safeEntityTypes = Array.isArray(safeConfig.entityTypes) ? safeConfig.entityTypes : [];
  const safeRelationTypes = Array.isArray(safeConfig.relationTypes) ? safeConfig.relationTypes : [];
  const layout = safeConfig.layout && typeof safeConfig.layout === 'object' ? safeConfig.layout : {};

  PROJ_CONFIG = Object.fromEntries(safeProjects.map(p => [p.id, p]));
  ETYPE_CONFIG = safeEntityTypes;
  RTYPE_CONFIG = safeRelationTypes;
  LAYER_ORDER = safeEntityTypes.map(e => e.type);
  HEALTH_LIST = Array.isArray(safeConfig.healthStates) && safeConfig.healthStates.length ? safeConfig.healthStates : ['正常', '告警', '异常'];
  ETYPE_MAP = Object.fromEntries(ETYPE_CONFIG.map(e => [e.type, e.color]));
  RTYPE_MAP = Object.fromEntries(RTYPE_CONFIG.map(r => [r.type, r.color]));
  NODE_W = layout.nodeWidth || 118;
  NODE_H = layout.nodeHeight || 42;
  NODE_V_GAP = layout.nodeVGap || 22;
  BAND_MARGIN_V = layout.bandMarginV || 28;
  BAND_GAP = layout.bandGap || 56;
  CANVAS_TOP = layout.canvasTop || 54;
  COL_SPAN = layout.colSpan || 168;
  MARGIN_L = layout.marginLeft || 90;
  COLLAPSE_THRESHOLD = layout.collapseThreshold || 20;
  SKILL_COLL_THRESH = layout.skillCollapseThreshold || 10;
  CELL_H = NODE_H + NODE_V_GAP;
  PROJS = [...new Set(
    safeGraph.nodes.map(n => n.project_id).filter(p => p && p !== 'global')
  )].sort();
  APP_ALIAS_MAP = (SKILL_STATE && SKILL_STATE.appAliases) || {};
  const liveState = (SKILL_STATE && SKILL_STATE.liveSession) || {};
  liveSessionVersion = Number(liveState.version || liveSessionVersion || 0);
  liveSessionDataVersion = Number(liveState.dataVersion || liveSessionDataVersion || 0);
}

rebuildRuntimeConfig();

// ── 运行时state ─────────────────────────────────────────────────────────────
let rawData = cloneJson(normalizeGraphDataShape(GRAPH_DATA)); // deep copy; live updates rewrite this

// ── Aggregate mode state ─────────────────────────────────────────────────
let aggMode      = false;
// Set of "proj::type" keys manually expanded by the user
let expandedGroups = new Set();
// Independent expanded-group state for the two skill diagrams
let deployExpandedGroups  = new Set();  // keys: "proj::type"
let dfExpandedGroups      = new Set();  // keys: "tier::type"   // true = aggregate view active
let subgraphNode = null;    // entity_id of the focused subgraph node (or null)
let savedVisNodes = null;   // snapshot before entering subgraph
let savedVisEdges = null;
let visNodes = [];
let visEdges = [];
let hiddenNodes = new Set();
let focusedNode = null;
let currentLayoutMode = 'hierarchical'; // or 'force'
let autoRefreshTimer = null;
let svg, g, zoom;
let lastTransform = d3.zoomIdentity;
let ctxTargetNode = null;
let edgeLabelMode = 'hover';
let showEdgeLabelsByDefault = false;
let enableEdgeFlow = false;

// ============================================================
//  AGGREGATE MODE ENGINE
// ============================================================

// ── toggleAggMode ─────────────────────────────────────────────────────────
function collapseAllGroups(){
  expandedGroups.clear();
  visNodes.forEach(n=>{ n._x=undefined; n._y=undefined; });
  renderGraph(); buildSidebar(); updateStats();
  showNotif('已收起所有展开的聚合节点');
}

function toggleAggMode(){
  aggMode = !aggMode;
  subgraphNode = null;
  savedVisNodes = null;
  savedVisEdges = null;
  document.getElementById('entity-drawer').classList.remove('open');
  document.getElementById('breadcrumb-bar').classList.remove('visible');
  document.body.classList.toggle('agg-mode-active', aggMode);
  document.getElementById('agg-toggle-btn').textContent = aggMode ? '⊞ 普通视图' : '⊞ 聚合视图';
  applyFilters();
  showNotif(aggMode ? '已切换至聚合视图，点击聚合节点查看实体列表' : '已切换至普通视图');
}

// ── Build aggregate graph from visNodes / visEdges ───────────────────────
// aggNodes: one virtual node per entity_type (aggregated across all projects)
// aggEdges: one virtual edge per (srcType, tgtType, relation_type) triple, with count
function buildAggregateGraph(){
  // 1. Build aggNodes
  const typeMap = {};  // type -> { entityType, color, nodes[], ok, warn, err }
  visNodes.forEach(n => {
    const t = n.entity_type || '未知';
    if(!typeMap[t]){
      typeMap[t] = { entityType: t, color: ETYPE_MAP[t]||'#64748b', nodes: [], ok:0, warn:0, err:0 };
    }
    typeMap[t].nodes.push(n);
    if(n.health_status==='正常')      typeMap[t].ok++;
    else if(n.health_status==='告警') typeMap[t].warn++;
    else                               typeMap[t].err++;
  });

  const aggNodes = Object.values(typeMap).map(t => ({
    _aggId:       `AGG::${t.entityType}`,
    entityType:   t.entityType,
    color:        t.color,
    nodes:        t.nodes,
    count:        t.nodes.length,
    ok:           t.ok, warn: t.warn, err: t.err,
    _x: undefined, _y: undefined,
  }));

  // 2. Build aggEdges — grouped by (srcType, tgtType) only.
  //    Each aggEdge carries a byRelType breakdown: { relType -> { count, color, rels[] } }
  const edgeMap = {};
  const idToType = {};
  visNodes.forEach(n => { idToType[n.entity_id] = n.entity_type || '未知'; });

  visEdges.forEach(r => {
    const st = idToType[r.source_entity_id];
    const tt = idToType[r.target_entity_id];
    if(!st || !tt || st === tt) return;   // skip same-type self-loops
    // Canonical key: always smaller string first so A→B and B→A don't create two entries
    // But we do preserve direction for rendering, so use directed key
    const key = `${st}||${tt}`;
    if(!edgeMap[key]){
      edgeMap[key] = {
        _aggRelId: `AGGREL::${key}`,
        srcType: st, tgtType: tt,
        count: 0,
        byRelType: {},   // relType -> { count, color, rels[] }
        rels: [],
      };
    }
    const ae = edgeMap[key];
    ae.count++;
    ae.rels.push(r);
    if(!ae.byRelType[r.relation_type]){
      ae.byRelType[r.relation_type] = {
        count: 0,
        color: RTYPE_MAP[r.relation_type] || '#64748b',
        rels: [],
      };
    }
    ae.byRelType[r.relation_type].count++;
    ae.byRelType[r.relation_type].rels.push(r);
  });

  // Derive a dominant color: use the relType with the most relations
  Object.values(edgeMap).forEach(ae => {
    const dominant = Object.entries(ae.byRelType)
      .sort((a,b) => b[1].count - a[1].count)[0];
    ae.color         = dominant ? dominant[1].color : '#64748b';
    ae.relation_type = dominant ? dominant[0] : '';   // kept for tooltip / marker fallback
  });

  const aggEdges = Object.values(edgeMap);
  return { aggNodes, aggEdges };
}

// ── Render aggregate graph ─────────────────────────────────────────────────
function renderAggregateGraph(){
  if(!g) initSVG();
  g.selectAll('*').remove();

  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;

  const { aggNodes, aggEdges } = buildAggregateGraph();

  // ── Layout: DAG layered layout (arrows flow left → right) ──────────────
  // 1. Build directed adjacency from aggEdges
  // 2. Assign each node a "column" (layer) via longest-path / topological sort
  // 3. Spread nodes within each column vertically

  const aggCount = aggNodes.length;
  const aggEdgeCount = aggEdges.length;
  const aggScale = (() => {
    let scale = 1;
    if(aggCount <= 4) scale = 1.85;
    else if(aggCount <= 6) scale = 1.6;
    else if(aggCount <= 9) scale = 1.35;
    else if(aggCount <= 12) scale = 1.2;
    const density = aggEdgeCount / Math.max(1, aggCount);
    if(density > 3) scale += 0.1;
    if(density > 5) scale += 0.1;
    return Math.max(1.05, Math.min(2.1, scale));
  })();

  const AGG_W = 140, AGG_H = 64;
  const AGG_COL_SPAN = Math.round(220 * aggScale);   // horizontal gap between columns
  const AGG_ROW_SPAN = Math.round(110 * aggScale);   // vertical gap between nodes in same column
  const AGG_EDGE_DENSE = aggEdgeCount > 8;

  // -- Step 1: build in/out degree maps from aggEdges (before they're drawn) --
  const outEdges = {};   // srcType -> [tgtType, ...]
  const inDegree = {};   // type -> count
  aggNodes.forEach(an => { outEdges[an.entityType] = []; inDegree[an.entityType] = 0; });
  aggEdges.forEach(ae => {
    if(outEdges[ae.srcType]) outEdges[ae.srcType].push(ae.tgtType);
    if(inDegree[ae.tgtType] !== undefined) inDegree[ae.tgtType]++;
  });

  // -- Step 2: Kahn's algorithm for topological order → assign layers --
  const layer = {};
  const queue = aggNodes.map(an => an.entityType).filter(t => inDegree[t] === 0);
  // Nodes not in any edge get placed in layer 0 too
  aggNodes.forEach(an => { if(layer[an.entityType] === undefined) layer[an.entityType] = 0; });
  queue.forEach(t => { layer[t] = 0; });

  // BFS-style layering: layer[v] = max(layer[u]+1) for all u->v
  // Use the LAYER_ORDER as tiebreaker seed
  const sorted = aggNodes.map(an => an.entityType);
  sorted.sort((a,b) => {
    const ia = LAYER_ORDER.indexOf(a), ib = LAYER_ORDER.indexOf(b);
    return (ia<0?99:ia) - (ib<0?99:ib);
  });
  // Forward pass: assign layer = max predecessor layer + 1
  sorted.forEach(t => {
    if(layer[t] === undefined) layer[t] = 0;
    (outEdges[t]||[]).forEach(tgt => {
      if(layer[tgt] === undefined) layer[tgt] = 0;
      if(layer[tgt] <= layer[t]) layer[tgt] = layer[t] + 1;
    });
  });
  // Second pass for any remaining unassigned
  aggNodes.forEach(an => { if(layer[an.entityType] === undefined) layer[an.entityType] = 0; });

  // -- Step 3: group nodes by layer, then assign x/y ----------------------
  const byLayer = {};
  aggNodes.forEach(an => {
    const l = layer[an.entityType] || 0;
    if(!byLayer[l]) byLayer[l] = [];
    byLayer[l].push(an);
  });

  // Sort within each layer by LAYER_ORDER for consistent vertical ordering
  Object.values(byLayer).forEach(col => {
    col.sort((a,b) => {
      const ia = LAYER_ORDER.indexOf(a.entityType);
      const ib = LAYER_ORDER.indexOf(b.entityType);
      return (ia<0?99:ia) - (ib<0?99:ib);
    });
  });

  // Compute canvas height needed and centre vertically
  const maxColSize = Math.max(...Object.values(byLayer).map(c => c.length), 1);
  const numLayers  = Math.max(...Object.keys(byLayer).map(Number)) + 1;
  const totalH     = maxColSize * (AGG_H + AGG_ROW_SPAN) - AGG_ROW_SPAN;
  const startY     = Math.max(CANVAS_TOP + AGG_H/2 + 20, (H - totalH) / 2 + AGG_H/2);

  Object.entries(byLayer).forEach(([lStr, nodes]) => {
    const l = Number(lStr);
    const colH = nodes.length * (AGG_H + AGG_ROW_SPAN) - AGG_ROW_SPAN;
    const colStartY = startY + (totalH - colH) / 2;   // centre short columns
    nodes.forEach((an, i) => {
      an._x = MARGIN_L + AGG_W/2 + l * AGG_COL_SPAN;
      an._y = colStartY + i * (AGG_H + AGG_ROW_SPAN) + AGG_H/2;
    });
  });

  // Build lookup
  const aggNodeById = {};
  aggNodes.forEach(an => { aggNodeById[an.entityType] = an; });

  // ── Draw aggregate edges ─────────────────────────────────────────────────
  // Add agg-specific arrow markers
  const defs = svg.select('defs');
  aggEdges.forEach(ae => {
    const mid = ae.relation_type.replace(/\s/g,'_');
    if(svg.select(`#arrow-end-${mid}`).empty()){
      defs.append('marker').attr('id',`arrow-end-${mid}`)
        .attr('viewBox','0 -3 8 6').attr('refX',7).attr('refY',0)
        .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
        .append('path').attr('d','M0,-3L8,0L0,3Z').attr('fill',ae.color).attr('opacity',0.75);
    }
  });

  // ── Helper: bezier path between two agg nodes (handles any direction) ──
  function aggEdgePath(sn, tn){
    const forward = sn._x <= tn._x;
    if(forward){
      // Normal left→right: exit right edge, enter left edge
      const sx = sn._x + AGG_W/2, sy = sn._y;
      const tx = tn._x - AGG_W/2, ty = tn._y;
      const cp = Math.max(50, Math.abs(tx - sx) * 0.45);
      return `M${sx},${sy} C${sx+cp},${sy} ${tx-cp},${ty} ${tx},${ty}`;
    } else {
      // Back edge (right→left): arc over the top via bottom of nodes
      const sx = sn._x - AGG_W/2, sy = sn._y + AGG_H/2;
      const tx = tn._x + AGG_W/2, ty = tn._y + AGG_H/2;
      const midX = (sx + tx) / 2;
      const bow  = Math.abs(sy - ty) * 0.5 + 60;
      return `M${sx},${sy} C${sx},${sy+bow} ${tx},${ty+bow} ${tx},${ty}`;
    }
  }

  // ── Helper: pill label position (midpoint offset for readability) ───────
  function aggPillPos(sn, tn){
    const mx = (sn._x + tn._x) / 2;
    const my = (sn._y + tn._y) / 2;
    // For back-edges arc downward, offset pill below the midpoint
    const forward = sn._x <= tn._x;
    return { x: mx, y: forward ? my - 12 : my + 48 };
  }

  // ── Draw edges ───────────────────────────────────────────────────────────
  const edgeGrp = g.append('g').attr('class','agg-edges');
  aggEdges.forEach(ae => {
    const sn = aggNodeById[ae.srcType];
    const tn = aggNodeById[ae.tgtType];
    if(!sn || !tn) return;

    // Use dominant color for the line; stroke-width scales with total count
    const pathEl = edgeGrp.append('path')
      .datum(ae)
      .attr('id', `agg-path-${ae._aggRelId.replace(/[^a-z0-9]/gi,'_')}`)
      .attr('class','edge-path')
      .attr('d', aggEdgePath(sn, tn))
      .attr('stroke', ae.color)
      .attr('stroke-width', 1.2)
      .attr('stroke-opacity', AGG_EDGE_DENSE ? 0.2 : 0.55)
      .attr('marker-end',`url(#arrow-end-${ae.relation_type.replace(/\s/g,'_')})`)
      .on('click', (ev,d) => { ev.stopPropagation(); showAggEdgeDetail(d); })
      .on('mousemove', (ev,d) => {
        // Tooltip: show per-relType breakdown
        const rows = Object.entries(d.byRelType)
          .sort((a,b) => b[1].count - a[1].count)
          .map(([rt,v]) =>
            `<span style="color:${v.color};font-size:10px">▸ ${rt}</span> <b>${v.count}</b> 条`)
          .join('<br>');
        showRawTooltip(ev,
          `<b style="color:${d.color}">${d.srcType} → ${d.tgtType}</b><br>` +
          `共 <b>${d.count}</b> 条关系<br>${rows}`);
      })
      .on('mouseleave', hideTooltip);

    // ── Pill: stack one tag per relation type ─────────────────────────────
    const pos = aggPillPos(sn, tn);
    const pill = edgeGrp.append('g')
      .datum(ae)
      .attr('class','agg-edge-pill')
      .attr('transform', `translate(${pos.x},${pos.y})`);

    const relTypes = Object.entries(ae.byRelType)
      .sort((a,b) => b[1].count - a[1].count);   // most common first
    const TAG_H = 14, TAG_GAP = 3;
    const totalPillH = relTypes.length * TAG_H + (relTypes.length-1) * TAG_GAP;
    let tagY = -totalPillH / 2;

    relTypes.forEach(([rt, rv]) => {
      const label = `${rt} ×${rv.count}`;
      const tagW  = Math.max(52, label.length * 6 + 12);
      const tg = pill.append('g');
      tg.append('rect')
        .attr('x', -tagW/2).attr('y', tagY)
        .attr('width', tagW).attr('height', TAG_H)
        .attr('rx', 4)
        .attr('fill', `${rv.color}20`)
        .attr('stroke', rv.color)
        .attr('stroke-width', 0.7);
      tg.append('text')
        .attr('x', 0).attr('y', tagY + TAG_H - 3)
        .attr('text-anchor','middle')
        .attr('font-size', 8)
        .attr('font-family','Noto Sans SC,sans-serif')
        .attr('fill', rv.color)
        .attr('pointer-events','none')
        .text(label);
      tagY += TAG_H + TAG_GAP;
    });

    pathEl
      .on('mouseenter', () => pill.classed('visible', true))
      .on('mouseleave', () => pill.classed('visible', false));
  });

  // ── Helper: refresh all edges connected to a moved agg node ─────────────
  function refreshAggEdges(movedType){
    edgeGrp.selectAll('path.edge-path').each(function(ae){
      if(ae.srcType !== movedType && ae.tgtType !== movedType) return;
      const sn = aggNodeById[ae.srcType], tn = aggNodeById[ae.tgtType];
      if(!sn || !tn) return;
      d3.select(this).attr('d', aggEdgePath(sn, tn));
    });
    edgeGrp.selectAll('g.agg-edge-pill').each(function(ae){
      if(ae.srcType !== movedType && ae.tgtType !== movedType) return;
      const sn = aggNodeById[ae.srcType], tn = aggNodeById[ae.tgtType];
      if(!sn || !tn) return;
      const pos = aggPillPos(sn, tn);
      d3.select(this).attr('transform', `translate(${pos.x},${pos.y})`);
    });
  }

  // ── Draw aggregate nodes ─────────────────────────────────────────────────
  const nodeGrp = g.append('g').attr('class','agg-nodes');
  function setAggFocus(type){
    if(!AGG_EDGE_DENSE){
      edgeGrp.selectAll('path.edge-path').classed('dimmed', false).classed('highlighted', false);
      edgeGrp.selectAll('g.agg-edge-pill').classed('visible', false);
      return;
    }
    edgeGrp.selectAll('path.edge-path').classed('dimmed', d => d.srcType !== type && d.tgtType !== type);
    edgeGrp.selectAll('path.edge-path').classed('highlighted', d => d.srcType === type || d.tgtType === type);
    edgeGrp.selectAll('g.agg-edge-pill').classed('visible', d => d.srcType === type || d.tgtType === type);
  }

  aggNodes.forEach(an => {
    const c = an.color;
    const ng = nodeGrp.append('g')
      .datum(an)
      .attr('class','agg-node-g')
      .attr('transform',`translate(${an._x - AGG_W/2},${an._y - AGG_H/2})`);

    // Shadow
    ng.append('rect').attr('x',3).attr('y',3).attr('width',AGG_W).attr('height',AGG_H)
      .attr('rx',10).attr('fill','rgba(0,0,0,0.5)');
    // Body
    ng.append('rect').attr('class','agg-body').attr('width',AGG_W).attr('height',AGG_H)
      .attr('rx',10).attr('fill','#0f1e33').attr('stroke',c).attr('stroke-width',2);
    // Left bar
    ng.append('rect').attr('x',0).attr('y',0).attr('width',5).attr('height',AGG_H)
      .attr('rx',4).attr('fill',c);
    // Type name
    ng.append('text').attr('x',AGG_W/2+3).attr('y',AGG_H/2-6)
      .attr('text-anchor','middle').attr('font-size',13).attr('font-weight',600)
      .attr('font-family','Noto Sans SC,sans-serif').attr('fill','#cce4ff')
      .attr('pointer-events','none').text(an.entityType);
    // Count
    ng.append('text').attr('x',AGG_W/2+3).attr('y',AGG_H/2+10)
      .attr('text-anchor','middle').attr('font-size',11)
      .attr('font-family','IBM Plex Mono,monospace').attr('fill',c)
      .attr('pointer-events','none').text(`${an.count} 个实体`);
    // Health mini-bar
    const barX = AGG_W-14, barH = AGG_H-16, barY = 8, total = an.count||1;
    let yOff = barY;
    [['ok',an.ok,'#00d68f'],['warn',an.warn,'#ffcc00'],['err',an.err,'#ff4040']].forEach(([,v,col])=>{
      if(!v) return;
      const h = Math.max(3, barH*v/total);
      ng.append('rect').attr('x',barX).attr('y',yOff).attr('width',5).attr('height',h)
        .attr('rx',2).attr('fill',col).attr('opacity',0.85);
      yOff += h+1;
    });

    // ── Drag ───────────────────────────────────────────────────────────────
    let _dragging = false;
    const aggDrag = d3.drag()
      .on('start', function(ev){
        _dragging = false;
        d3.select(this).raise();
        ev.sourceEvent.stopPropagation();
      })
      .on('drag', function(ev, d){
        _dragging = true;
        d._x += ev.dx;
        d._y += ev.dy;
        d3.select(this).attr('transform', `translate(${d._x - AGG_W/2},${d._y - AGG_H/2})`);
        refreshAggEdges(d.entityType);
        refreshMinimap();
      })
      .on('end', function(ev, d){
        d3.select(this).style('cursor','grab');
      });

    ng.call(aggDrag).style('cursor','grab');

    // ── Click (fires only when not dragging) ───────────────────────────────
    ng.on('click', (ev, d) => {
      if(_dragging){ _dragging = false; return; }
      ev.stopPropagation();
      openEntityDrawer(d);
    });
    ng.on('mouseenter', () => setAggFocus(an.entityType));
    ng.on('mousemove', (ev,d) => {
      showRawTooltip(ev,
        `<b style="color:${d.color}">${d.entityType}</b><br>` +
        `实体数量: <b>${d.count}</b><br>` +
        `<span style="color:var(--green)">正常 ${d.ok}</span>  ` +
        `<span style="color:var(--yellow)">告警 ${d.warn}</span>  ` +
        `<span style="color:var(--red)">异常 ${d.err}</span>`);
    });
    ng.on('mouseleave', () => {
      hideTooltip();
      setAggFocus('');
    });
  });

  setTimeout(fitView, 80);
  refreshMinimap();
}

// ── showRawTooltip: show HTML tooltip ─────────────────────────────────────
function showRawTooltip(ev, html){
  const tt = document.getElementById('tooltip');
  tt.innerHTML = html;
  tt.style.opacity = '1';
  tt.style.left = (ev.clientX+14)+'px';
  tt.style.top  = (ev.clientY-10)+'px';
}

// ── Aggregate edge detail in right panel ──────────────────────────────────
function showAggEdgeDetail(ae){
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('dp-dot').style.background = ae.color;
  document.getElementById('dp-title').textContent = `聚合关系 · ${ae.srcType} → ${ae.tgtType}`;

  // ── Summary section ───────────────────────────────────────────────────
  let html = `<div class="detail-section"><div class="detail-section-title">聚合关系概览</div>
    <div class="detail-row"><span class="detail-key">源实体类型</span><span class="detail-val">${ae.srcType}</span></div>
    <div class="detail-row"><span class="detail-key">目标实体类型</span><span class="detail-val">${ae.tgtType}</span></div>
    <div class="detail-row"><span class="detail-key">关系总数</span><span class="detail-val" style="color:var(--accent)">${ae.count} 条</span></div>
  </div>`;

  // ── Per relation-type breakdown ───────────────────────────────────────
  html += `<div class="detail-section"><div class="detail-section-title">按关系类型分布</div>`;
  const sorted = Object.entries(ae.byRelType).sort((a,b) => b[1].count - a[1].count);
  sorted.forEach(([rt, rv]) => {
    const pct = Math.round(rv.count / ae.count * 100);
    html += `<div style="margin:5px 0">
      <div class="detail-row" style="margin-bottom:3px">
        <span class="detail-key" style="color:${rv.color}">${rt}</span>
        <span class="detail-val" style="color:${rv.color}">${rv.count} 条 (${pct}%)</span>
      </div>
      <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${rv.color};border-radius:3px;transition:width 0.3s"></div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // ── Detailed relation list per type ───────────────────────────────────
  sorted.forEach(([rt, rv]) => {
    html += `<div class="detail-section">
      <div class="detail-section-title" style="color:${rv.color}">${rt} 明细（${Math.min(rv.count,5)} / ${rv.count}）</div>`;
    rv.rels.slice(0,5).forEach(r => {
      const sn = rawData.nodes.find(n=>n.entity_id===r.source_entity_id);
      const tn = rawData.nodes.find(n=>n.entity_id===r.target_entity_id);
      const hc = r.health_status==='正常'?'ok':r.health_status==='告警'?'warn':'err';
      html += `<div class="detail-row" style="flex-direction:column;align-items:flex-start;gap:2px;padding:4px 0">
        <span style="font-size:11px;color:var(--text)">${sn?.entity_name||r.source_entity_id} → ${tn?.entity_name||r.target_entity_id}</span>
        <span class="detail-val ${hc}" style="font-size:10px">${getHealthLabel(r)}</span>
      </div>`;
    });
    if(rv.count>5) html += `<div style="font-size:11px;color:var(--text3);padding:2px 0">… 还有 ${rv.count-5} 条</div>`;
    html += `</div>`;
  });

  document.getElementById('dp-body').innerHTML = html;
}

// ── Entity drawer: show all entities of a type ────────────────────────────
function openEntityDrawer(aggNode){
  const drawer = document.getElementById('entity-drawer');
  document.getElementById('ed-dot').style.background = aggNode.color;
  document.getElementById('ed-title').textContent = aggNode.entityType;
  document.getElementById('ed-count').textContent = `${aggNode.count} 个`;

  const body = document.getElementById('ed-body');
  body.innerHTML = '';

  // ── Entity list ───────────────────────────────────────────────────────
  const listSec = document.createElement('div');
  listSec.style.cssText = 'padding:4px 0 8px';

  const listTitle = document.createElement('div');
  listTitle.className = 'drawer-rel-title';
  listTitle.style.cssText = 'padding:6px 14px 4px';
  listTitle.textContent = '实体列表（点击查看子图谱）';
  listSec.appendChild(listTitle);

  aggNode.nodes.forEach(n => {
    const row = document.createElement('div');
    row.className = 'drawer-entity-row';
    const hc = n.health_status==='正常'?'ok':n.health_status==='告警'?'warn':'err';
    row.innerHTML = `
      <div class="der-health ${hc}"></div>
      <span class="der-name" title="${n.entity_name}">${n.entity_name}</span>
      <span class="der-proj">${n.project_id||''}</span>`;
    row.onclick = () => {
      body.querySelectorAll('.drawer-entity-row').forEach(r=>r.classList.remove('active'));
      row.classList.add('active');
      enterSubgraph(n);
    };
    listSec.appendChild(row);
  });
  body.appendChild(listSec);

  // ── Relation summary for this type ───────────────────────────────────
  const rels = visEdges.filter(r => {
    const sn = visNodes.find(n=>n.entity_id===r.source_entity_id);
    const tn = visNodes.find(n=>n.entity_id===r.target_entity_id);
    return (sn?.entity_type===aggNode.entityType || tn?.entity_type===aggNode.entityType);
  });
  if(rels.length){
    const relSec = document.createElement('div');
    relSec.className = 'drawer-rel-section';
    relSec.innerHTML = `<div class="drawer-rel-title">涉及关系（${rels.length} 条）</div>`;
    // Group by type
    const byType = {};
    rels.forEach(r => { byType[r.relation_type] = (byType[r.relation_type]||0)+1; });
    Object.entries(byType).forEach(([rt, cnt]) => {
      const col = RTYPE_MAP[rt]||'#64748b';
      const row = document.createElement('div');
      row.className = 'drawer-rel-row';
      row.innerHTML = `<span class="drawer-rel-badge" style="background:${col}22;color:${col};border:1px solid ${col}44">${rt}</span>
        <span>${cnt} 条</span>`;
      relSec.appendChild(row);
    });
    body.appendChild(relSec);
  }

  drawer.classList.add('open');
}

function closeEntityDrawer(){
  document.getElementById('entity-drawer').classList.remove('open');
}

// ── Subgraph: show ego-network of one entity ──────────────────────────────
function enterSubgraph(node){
  subgraphNode = node.entity_id;
  // Save current vis state (full filter result)
  if(!savedVisNodes) savedVisNodes = visNodes.slice();
  if(!savedVisEdges) savedVisEdges = visEdges.slice();

  // Find 1-hop neighbours
  const connectedIds = new Set([node.entity_id]);
  savedVisEdges.forEach(r => {
    if(r.source_entity_id===node.entity_id) connectedIds.add(r.target_entity_id);
    if(r.target_entity_id===node.entity_id) connectedIds.add(r.source_entity_id);
  });

  // Temporarily set visNodes/visEdges to subgraph
  visNodes = savedVisNodes.filter(n => connectedIds.has(n.entity_id));
  visEdges = savedVisEdges.filter(r =>
    connectedIds.has(r.source_entity_id) && connectedIds.has(r.target_entity_id)
  );

  // Reset positions so layout recalculates
  visNodes.forEach(n => { n._x = undefined; n._y = undefined; });

  // Show breadcrumb
  document.getElementById('breadcrumb-bar').classList.add('visible');
  document.getElementById('breadcrumb-node').textContent = `${node.entity_name} (${node.entity_type})`;

  // Close drawer and render normal graph for the subgraph
  aggMode = false;
  renderGraph();
  updateStats();
  setTimeout(fitView, 80);
  showNotif(`子图谱：${node.entity_name} 的 1 跳邻居`);
}

function exitSubgraph(){
  subgraphNode = null;
  document.getElementById('breadcrumb-bar').classList.remove('visible');
  document.getElementById('entity-drawer').classList.remove('open');

  if(savedVisNodes){
    visNodes = savedVisNodes;
    visEdges = savedVisEdges;
    savedVisNodes = null;
    savedVisEdges = null;
  }
  aggMode = true;
  renderAggregateGraph();
  updateStats();
  document.body.classList.add('agg-mode-active');
  showNotif('已返回聚合视图');
}

// ============================================================
//  FILTER & RENDER
// ============================================================
function getSelectedProjects(){
  const sel = document.getElementById('proj-select');
  const vals = Array.from(sel.selectedOptions).map(o=>o.value);
  if(vals.includes('all') || vals.length===0) return null; // null = all
  return vals;
}

function applyFilters(){
  if(!aggMode) expandedGroups.clear();   // reset when filters change
  const projs = getSelectedProjects();
  const etype = document.getElementById('etype-filter').value;
  const rtype = document.getElementById('rtype-filter').value;
  const hstatus = document.getElementById('health-filter').value;
  const search = document.getElementById('search-inp').value.trim().toLowerCase();
  const resourceFilter = String(skillResourceType || '').trim().toLowerCase();
  const resourceFilters = resourceFilter
    .split(/[,\s，/]+/)
    .map(t => t.trim())
    .filter(t => t && t !== 'all')
    .map(t => RESOURCE_ALIAS[t] || t)
    .filter((t, idx, arr) => t && arr.indexOf(t) === idx);

  visNodes = rawData.nodes.filter(n => {
    if(hiddenNodes.has(n.entity_id)) return false;
    if(n.entity_id === 'U-ROOT') return true;
    if(projs && !projs.includes(n.project_id)) return false;
    if(etype !== 'all' && n.entity_type !== etype) return false;
    if(hstatus !== 'all' && n.health_status !== hstatus) return false;
    const nName = String(n.entity_name || '').toLowerCase();
    const nId = String(n.entity_id || '').toLowerCase();
    const nRes = String(n.resource_type || '').toLowerCase();
    if(resourceFilters.length){
      const matched = resourceFilters.some(item =>
        nRes.includes(item) || nName.includes(item) || nId.includes(item)
      );
      if(!matched) return false;
    }
    if(search && !nName.includes(search) && !nId.includes(search) && !nRes.includes(search)) return false;
    return true;
  });

  const nodeIdSet = new Set(visNodes.map(n=>n.entity_id));

  const candidateEdges = rawData.relations.filter(r => {
    if(rtype !== 'all' && rtype !== 'cross' && r.relation_type !== rtype) return false;
    return true;
  });

  visEdges = candidateEdges.filter(r => {
    if(!nodeIdSet.has(r.source_entity_id) || !nodeIdSet.has(r.target_entity_id)) return false;
    if(rtype === 'cross'){
      // Only show cross-project edges
      const sNode = rawData.nodes.find(n=>n.entity_id===r.source_entity_id);
      const tNode = rawData.nodes.find(n=>n.entity_id===r.target_entity_id);
      if(!sNode||!tNode) return false;
      const sp = sNode.project_id||'global', tp = tNode.project_id||'global';
      return sp !== tp && sp !== 'global' && tp !== 'global';
    }
    return true;
  });

  if(skillExpandNeighbors && visNodes.length){
    const baseIds = new Set(visNodes.map(n => n.entity_id));
    const neighborIds = new Set(baseIds);
    candidateEdges.forEach(r => {
      if(baseIds.has(r.source_entity_id) || baseIds.has(r.target_entity_id)){
        neighborIds.add(r.source_entity_id);
        neighborIds.add(r.target_entity_id);
      }
    });
    visNodes = rawData.nodes.filter(n => neighborIds.has(n.entity_id));
    visEdges = candidateEdges.filter(r => neighborIds.has(r.source_entity_id) && neighborIds.has(r.target_entity_id));
  }

  renderGraph();
  buildSidebar();
  updateStats();
}

// ============================================================
//  POSITION LAYOUT  — topology-aware DAG layering
// ============================================================
// Design:
//   1. Compute a DAG layer (column) per node using longest-path from
//      actual edges — upstream nodes land in smaller column indices (left),
//      downstream nodes in larger indices (right).
//   2. Each project occupies its own horizontal band (rows are isolated).
//   3. Within each (project × column) cell, nodes are distributed
//      vertically, centred in the band.
//   4. LAYER_ORDER is used only as a tiebreaker when two nodes share the
//      same topological depth, keeping the order stable across refreshes.
// ─────────────────────────────────────────────────────────────────────────

function computeHierarchicalPositions(nodes, W, H){
  window._projOffset = {};  // reset drag offsets on fresh layout

  const nodeIds = new Set(nodes.map(n => n.entity_id));
  const nodeCount = nodes.length;
  const edgeCount = visEdges.length;
  const layoutScale = (() => {
    let scale = 1;
    if(nodeCount <= 40) scale = 2.0;
    else if(nodeCount <= 70) scale = 1.75;
    else if(nodeCount <= 110) scale = 1.55;
    else if(nodeCount <= 160) scale = 1.35;
    else if(nodeCount <= 240) scale = 1.2;
    else if(nodeCount <= 360) scale = 1.08;
    else if(nodeCount >= 700) scale = 0.95;
    const density = edgeCount / Math.max(1, nodeCount);
    if(density > 3) scale += 0.08;
    if(density > 5) scale += 0.08;
    return Math.max(0.9, Math.min(2.1, scale));
  })();

  const NODE_V_GAP_E = Math.round(NODE_V_GAP * layoutScale);
  const BAND_MARGIN_E = Math.round(BAND_MARGIN_V * (layoutScale + 0.1));
  const BAND_GAP_E = Math.round(BAND_GAP * (layoutScale + 0.15));
  const minColSpan = NODE_W * (layoutScale >= 1.6 ? 2.25 : layoutScale >= 1.3 ? 2.0 : 1.7);
  const COL_SPAN_E = Math.round(Math.max(COL_SPAN * layoutScale, minColSpan));
  const CELL_H_E = NODE_H + NODE_V_GAP_E;
  const MIN_BAND_H = Math.max(CELL_H_E * 2, NODE_H * 3 + NODE_V_GAP_E * 2);

  // ── Step 1: build adjacency from ALL currently visible edges ─────────
  // We use visEdges (before collapse remapping) so real relations drive
  // topology; dispEdges remapped edges would work too but visEdges is cleaner.
  const edgeSrc = visEdges.filter(
    e => nodeIds.has(e.source_entity_id) && nodeIds.has(e.target_entity_id)
  );

  // out-edges and in-degree per node
  const outMap   = {};   // id -> Set of target ids
  const inDegree = {};
  nodes.forEach(n => { outMap[n.entity_id] = new Set(); inDegree[n.entity_id] = 0; });
  edgeSrc.forEach(e => {
    if(outMap[e.source_entity_id] && !outMap[e.source_entity_id].has(e.target_entity_id)){
      outMap[e.source_entity_id].add(e.target_entity_id);
      inDegree[e.target_entity_id] = (inDegree[e.target_entity_id]||0) + 1;
    }
  });

  // ── Step 2: longest-path layering (handles cycles via visited guard) ──
  // layer[id] = column index (0 = leftmost / root)
  const layer = {};
  nodes.forEach(n => { layer[n.entity_id] = 0; });

  // BFS forward-pass: for each edge u→v, layer[v] = max(layer[v], layer[u]+1)
  // Repeat until stable (handles back-edges in cycles gracefully)
  // Use LAYER_ORDER rank as initial seed so disconnected nodes keep original order
  const typeRank = {};
  LAYER_ORDER.forEach((t, i) => { typeRank[t] = i; });
  nodes.forEach(n => { layer[n.entity_id] = typeRank[n.entity_type] !== undefined ? typeRank[n.entity_type] : 0; });

  // Topological forward-pass (up to N iterations to handle long chains)
  const maxIter = nodes.length + 1;
  for(let iter = 0; iter < maxIter; iter++){
    let changed = false;
    edgeSrc.forEach(e => {
      const nl = layer[e.source_entity_id] + 1;
      if(nl > layer[e.target_entity_id]){
        layer[e.target_entity_id] = nl;
        changed = true;
      }
    });
    if(!changed) break;
  }

  // ── Step 3: normalise layers per project so each project starts at 0 ──
  // This prevents a project that happens to have deep types from pushing
  // all its nodes far right.
  const projList = [...new Set(
    nodes.filter(n => n.project_id && n.project_id !== 'global').map(n => n.project_id)
  )].sort();

  const projNodes = {};
  projList.forEach(p => { projNodes[p] = nodes.filter(n => n.project_id === p); });

  // Per-project min layer → shift so min = 0
  projList.forEach(proj => {
    const pnodes = projNodes[proj];
    if(!pnodes.length) return;
    const minL = Math.min(...pnodes.map(n => layer[n.entity_id]));
    pnodes.forEach(n => { layer[n.entity_id] -= minL; });
  });

  // Global nodes: keep their layer as-is (they sit in their own row)
  const globalNodes = nodes.filter(n => !n.project_id || n.project_id === 'global');

  // ── Step 4: column X positions (shared across all projects) ───────────
  // Use the max layer across all nodes to define column count
  const maxLayer = Math.max(...nodes.map(n => layer[n.entity_id]), 0);
  const colX = {};   // layer index → x centre
  for(let l = 0; l <= maxLayer; l++){
    colX[l] = MARGIN_L + l * COL_SPAN_E;
  }

  // ── Step 5: band heights ───────────────────────────────────────────────
  function bandHeight(proj){
    // max nodes sharing the same layer within this project
    const layerCounts = {};
    projNodes[proj].forEach(n => {
      const l = layer[n.entity_id];
      layerCounts[l] = (layerCounts[l]||0) + 1;
    });
    const maxCount = Math.max(...Object.values(layerCounts), 1);
    return Math.max(maxCount * CELL_H_E + BAND_MARGIN_E * 2, MIN_BAND_H);
  }

  const bandTopY = {};
  let curY = CANVAS_TOP;
  projList.forEach(proj => {
    bandTopY[proj] = curY;
    curY += bandHeight(proj) + BAND_GAP_E;
  });
  const totalUsedH = curY - BAND_GAP_E;

  // ── Step 6: assign positions ───────────────────────────────────────────
  const positions = {};

  // Global nodes: centred vertically
  globalNodes.forEach(n => {
    positions[n.entity_id] = {
      x: colX[layer[n.entity_id]] !== undefined ? colX[layer[n.entity_id]] : MARGIN_L,
      y: CANVAS_TOP + totalUsedH / 2
    };
  });

  // Project nodes: group by (proj, layer), sort within each cell by
  // LAYER_ORDER type rank for stable ordering, then distribute vertically
  // with a barycentric pass to reduce crossings.
  projList.forEach(proj => {
    const bTop = bandTopY[proj];
    const bH   = bandHeight(proj);

    // group by layer
    const byLayer = {};
    projNodes[proj].forEach(n => {
      const l = layer[n.entity_id];
      (byLayer[l] = byLayer[l]||[]).push(n);
    });

    const applyBarycentricOrder = (layerMap, maxIter = 4) => {
      const layers = Object.keys(layerMap).map(Number).sort((a,b)=>a-b);
      const rankMap = {};
      layers.forEach(l => {
        layerMap[l].forEach((n, idx) => { rankMap[n.entity_id] = idx; });
      });
      if(layers.length < 2) return rankMap;
      const outEdges = {};
      const inEdges = {};
      edgeSrc.forEach(e => {
        if(!outEdges[e.source_entity_id]) outEdges[e.source_entity_id] = [];
        if(!inEdges[e.target_entity_id]) inEdges[e.target_entity_id] = [];
        outEdges[e.source_entity_id].push(e.target_entity_id);
        inEdges[e.target_entity_id].push(e.source_entity_id);
      });
      for(let iter=0; iter<maxIter; iter++){
        // forward pass
        for(let i=1; i<layers.length; i++){
          const l = layers[i];
          layerMap[l].sort((a,b) => {
            const aNeighbors = inEdges[a.entity_id] || [];
            const bNeighbors = inEdges[b.entity_id] || [];
            const aScore = aNeighbors.length ? aNeighbors.reduce((s,id)=>s+(rankMap[id]||0),0)/aNeighbors.length : rankMap[a.entity_id];
            const bScore = bNeighbors.length ? bNeighbors.reduce((s,id)=>s+(rankMap[id]||0),0)/bNeighbors.length : rankMap[b.entity_id];
            if(aScore !== bScore) return aScore - bScore;
            return rankMap[a.entity_id] - rankMap[b.entity_id];
          });
          layerMap[l].forEach((n, idx)=>{ rankMap[n.entity_id] = idx; });
        }
        // backward pass
        for(let i=layers.length-2; i>=0; i--){
          const l = layers[i];
          layerMap[l].sort((a,b) => {
            const aNeighbors = outEdges[a.entity_id] || [];
            const bNeighbors = outEdges[b.entity_id] || [];
            const aScore = aNeighbors.length ? aNeighbors.reduce((s,id)=>s+(rankMap[id]||0),0)/aNeighbors.length : rankMap[a.entity_id];
            const bScore = bNeighbors.length ? bNeighbors.reduce((s,id)=>s+(rankMap[id]||0),0)/bNeighbors.length : rankMap[b.entity_id];
            if(aScore !== bScore) return aScore - bScore;
            return rankMap[a.entity_id] - rankMap[b.entity_id];
          });
          layerMap[l].forEach((n, idx)=>{ rankMap[n.entity_id] = idx; });
        }
      }
      return rankMap;
    };

    const baryRank = applyBarycentricOrder(byLayer);

    Object.entries(byLayer).forEach(([lStr, colNodes]) => {
      const l = Number(lStr);
      const x = colX[l];

    // Use barycentric order first to reduce crossings, then stabilize with type/name
      colNodes.sort((a, b) => {
        const ba = baryRank[a.entity_id] ?? 0;
        const bb = baryRank[b.entity_id] ?? 0;
        if(ba !== bb) return ba - bb;
        const ra = typeRank[a.entity_type] !== undefined ? typeRank[a.entity_type] : 99;
        const rb = typeRank[b.entity_type] !== undefined ? typeRank[b.entity_type] : 99;
        if(ra !== rb) return ra - rb;
        return a.entity_name.localeCompare(b.entity_name);
      });

      // Centre the column vertically within the band
      const colH     = colNodes.length * CELL_H_E - NODE_V_GAP_E;
      const startY   = bTop + (bH - colH) / 2 + NODE_H / 2;

      colNodes.forEach((n, i) => {
        positions[n.entity_id] = {
          x,
          y: startY + i * CELL_H_E
        };
      });
    });
  });

  return positions;
}
